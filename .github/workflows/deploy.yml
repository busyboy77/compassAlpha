name: Deploy CompassAlpha docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}-mkdocs
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs Material
        run: |
          pip install --upgrade pip
          pip install mkdocs-material mkdocs-glightbox

      - name: Build site
        # Portal complete — all nav-referenced pages exist — so --strict is back
        # on to fail the build on broken links, bad refs, or nav drift.
        run: mkdocs build --strict --verbose

      - name: Content safety gate
        # Blocks the deploy if any forbidden/internal/leaked content reached the
        # built site (PMF/business residue, internal meta text, founder name on a
        # page, "open source" misuse, host paths). Nothing publishes if this fails.
        run: bash scripts/content-safety.sh site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
