<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="760" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="1500" height="760" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">The Three Charter Postures</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">When you declare an axis, you pick how it relates to the rulebook: LOCKED and UNLOCKED take turns; DECOUPLED runs alongside</text>

  <!-- LOCKED card -->
  <rect x="70" y="120" width="430" height="300" rx="12" fill="#f1f6f1" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="70" y="120" width="430" height="48" rx="12" fill="#e0f0e0"/><rect x="70" y="150" width="430" height="18" fill="#e0f0e0"/>
  <text x="285" y="151" text-anchor="middle" font-size="17" font-weight="700" fill="#2a5a2a">LOCKED</text>
  <text x="285" y="192" text-anchor="middle" font-size="11.5" fill="#3a6a3a" font-style="italic">build against a frozen rulebook</text>
  <text x="90" y="226" font-size="11.5" fill="#2a5a2a">• runs during a <tspan font-weight="700">build epoch</tspan></text>
  <text x="90" y="252" font-size="11.5" fill="#2a5a2a">• reads the Charter; never changes it</text>
  <text x="90" y="278" font-size="11.5" fill="#2a5a2a">• <tspan font-weight="700">alternates</tspan> with UNLOCKED — never both</text>
  <text x="90" y="304" font-size="11.5" fill="#2a5a2a">• the default for the build axis</text>
  <rect x="90" y="330" width="390" height="68" rx="8" fill="#fff" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="285" y="354" text-anchor="middle" font-size="10.5" fill="#3a6a3a">example: the <tspan font-weight="700">build axis</tspan> writing code while</text>
  <text x="285" y="372" text-anchor="middle" font-size="10.5" fill="#3a6a3a">the doctrine it relies on stays put</text>
  <text x="285" y="390" text-anchor="middle" font-size="10" fill="#5a8a5a" font-style="italic">most cycles are here</text>

  <!-- UNLOCKED card -->
  <rect x="535" y="120" width="430" height="300" rx="12" fill="#fbf3e2" stroke="#c79a3a" stroke-width="2"/>
  <rect x="535" y="120" width="430" height="48" rx="12" fill="#f4e6c6"/><rect x="535" y="150" width="430" height="18" fill="#f4e6c6"/>
  <text x="750" y="151" text-anchor="middle" font-size="17" font-weight="700" fill="#7a5a18">UNLOCKED</text>
  <text x="750" y="192" text-anchor="middle" font-size="11.5" fill="#8a6a28" font-style="italic">change the rulebook itself</text>
  <text x="555" y="226" font-size="11.5" fill="#7a5a18">• runs only during an <tspan font-weight="700">amendment epoch</tspan></text>
  <text x="555" y="252" font-size="11.5" fill="#7a5a18">• this epoch <tspan font-weight="700">is</tspan> the amendment</text>
  <text x="555" y="278" font-size="11.5" fill="#7a5a18">• <tspan font-weight="700">alternates</tspan> with LOCKED — never both</text>
  <text x="555" y="304" font-size="11.5" fill="#7a5a18">• the default for the doctrine axis</text>
  <rect x="555" y="330" width="390" height="68" rx="8" fill="#fff" stroke="#c79a3a" stroke-width="1.2"/>
  <text x="750" y="354" text-anchor="middle" font-size="10.5" fill="#8a6a28">example: the <tspan font-weight="700">doctrine axis</tspan> authoring a new</text>
  <text x="750" y="372" text-anchor="middle" font-size="10.5" fill="#8a6a28">invariant; build is paused so nothing races it</text>
  <text x="750" y="390" text-anchor="middle" font-size="10" fill="#a98c2a" font-style="italic">bounded — then it re-locks</text>

  <!-- DECOUPLED card -->
  <rect x="1000" y="120" width="430" height="300" rx="12" fill="#eef2f6" stroke="#5a6a7a" stroke-width="2"/>
  <rect x="1000" y="120" width="430" height="48" rx="12" fill="#e2e8ee"/><rect x="1000" y="150" width="430" height="18" fill="#e2e8ee"/>
  <text x="1215" y="151" text-anchor="middle" font-size="17" font-weight="700" fill="#2a3a4a">DECOUPLED</text>
  <text x="1215" y="192" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">run alongside, never block</text>
  <text x="1020" y="226" font-size="11.5" fill="#2a3a4a">• runs <tspan font-weight="700">continuously</tspan>, outside the turns</text>
  <text x="1020" y="252" font-size="11.5" fill="#2a3a4a">• reads the Charter <tspan font-weight="700">read-only</tspan></text>
  <text x="1020" y="278" font-size="11.5" fill="#2a3a4a">• never locks or blocks the Charter</text>
  <text x="1020" y="304" font-size="11.5" fill="#2a3a4a">• may only <tspan font-weight="700">request</tspan> an amendment</text>
  <rect x="1020" y="330" width="390" height="68" rx="8" fill="#fff" stroke="#5a6a7a" stroke-width="1.2"/>
  <text x="1215" y="354" text-anchor="middle" font-size="10.5" fill="#3a4a5a">example: Day-2 <tspan font-weight="700">ops · QA · audit</tspan> axes that</text>
  <text x="1215" y="372" text-anchor="middle" font-size="10.5" fill="#3a4a5a">watch the live system without gating it</text>
  <text x="1215" y="390" text-anchor="middle" font-size="10" fill="#6a7a8a" font-style="italic">requests route through the doctrine axis</text>

  <!-- TIMELINE band -->
  <text x="70" y="456" font-size="12" font-weight="700" fill="#33445a">Over time →</text>
  <!-- LOCKED/UNLOCKED alternating -->
  <rect x="70" y="466" width="280" height="34" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/><text x="210" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5a2a">LOCKED · build</text>
  <rect x="356" y="466" width="200" height="34" rx="6" fill="#f4e6c6" stroke="#c79a3a" stroke-width="1.2"/><text x="456" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#7a5a18">UNLOCKED · amend</text>
  <rect x="562" y="466" width="320" height="34" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/><text x="722" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5a2a">LOCKED · build</text>
  <rect x="888" y="466" width="180" height="34" rx="6" fill="#f4e6c6" stroke="#c79a3a" stroke-width="1.2"/><text x="978" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#7a5a18">UNLOCKED</text>
  <rect x="1074" y="466" width="356" height="34" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/><text x="1252" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5a2a">LOCKED · build</text>
  <!-- DECOUPLED continuous bar underneath -->
  <rect x="70" y="508" width="1360" height="30" rx="6" fill="#e2e8ee" stroke="#5a6a7a" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="750" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#2a3a4a">DECOUPLED · ops / QA / audit — runs continuously across every epoch, never blocking</text>

  <!-- CAPTION -->
  <rect x="70" y="560" width="1360" height="140" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="588" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4a3f18">Declaring an axis is choosing its posture toward the rulebook.</text>
  <text x="750" y="616" text-anchor="middle" font-size="12" fill="#5a4d20"><tspan font-weight="700">Why:</tspan> LOCKED and UNLOCKED alternate so a build never races an amendment; DECOUPLED lets day-2 work (ops, QA, audit) run all the time</text>
  <text x="750" y="634" text-anchor="middle" font-size="12" fill="#5a4d20">without ever freezing or blocking the main axes — it can only <tspan font-style="italic">request</tspan> a rule change, never make one directly.</text>
  <text x="750" y="662" text-anchor="middle" font-size="12" fill="#5a4d20"><tspan font-weight="700">Where:</tspan> the posture is a field in the axis declaration — the tunable that says how each axis plugs into the federation's rhythm.</text>
  <text x="750" y="686" text-anchor="middle" font-size="11.5" fill="#6a5a28" font-style="italic">How: full visibility off the table; LOCKED/UNLOCKED never overlap; DECOUPLED reads-only and routes amendment requests through the doctrine axis.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="722" width="6" height="6" rx="1"/><rect x="699" y="718" width="6" height="10" rx="1"/><rect x="708" y="714" width="6" height="14" rx="1"/></g>
    <text x="722" y="728" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
