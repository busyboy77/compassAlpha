<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1440" height="1000" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1440" height="98" fill="#1f2a36"/>
  <text x="720" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The T0 Boot Ritual</text>
  <text x="720" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Every session, every tier, every time &#8212; prove you are grounded in disk before you take any work</text>

  <!-- ============ INTRO ============ -->
  <rect x="56" y="124" width="1328" height="64" rx="9" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="720" y="148" text-anchor="middle" font-size="13" fill="#26425f">A session that skips boot operates on assumptions instead of disk. T0 is what makes &#8220;state of the federation = state of git&#8221; trustworthy at the start of every turn.</text>
  <text x="720" y="170" text-anchor="middle" font-size="11.5" fill="#3b6ea5" font-style="italic">WHY boot-light: each read grounds the session in one artifact &#8212; the order trims what is loaded, never what is knowable. Knowledge stays on disk, reachable on demand; only the working set is kept small.</text>

  <!-- ============ STEP COLUMN (left) + ASSERTION COLUMN (right) ============ -->
  <!-- steps: 8 ordered, vertical flow. left box x56 w560, assertion x660 w724 -->
  <!-- step y positions -->

  <!-- reading-order bracket label (WHY the order: broad rules first, narrowing to this turn's work) -->
  <rect x="40" y="196" width="14" height="430" rx="4" fill="#dfeaf5"/>
  <text x="47" y="412" font-size="11" font-weight="700" fill="#1a4a7a" transform="rotate(-90 47 412)" text-anchor="middle">READING ORDER &#183; BROAD RULES DOWN TO THIS TURN&#8217;S WORK</text>

  <!-- STEP 1 -->
  <rect x="72" y="196" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="221" r="14" fill="#3b6ea5"/><text x="104" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <text x="130" y="217" font-size="13.5" font-weight="700" fill="#1a4a7a">Read the master protocol</text>
  <text x="130" y="234" font-size="10.5" fill="#5a7aa0">COMPASS_ALPHA_FRAMEWORK_v0.1.md &#8212; the substantive rules</text>
  <text x="600" y="234" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: repo root (shared)</text>
  <rect x="660" y="196" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="226" font-size="11.5" fill="#2a5a2a">Asserts &#8212; the rulebook this session runs under is the canonical one on disk</text>

  <!-- STEP 2 -->
  <rect x="72" y="250" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="275" r="14" fill="#3b6ea5"/><text x="104" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <text x="130" y="271" font-size="13.5" font-weight="700" fill="#1a4a7a">Read this tier&#8217;s stamp</text>
  <text x="130" y="288" font-size="10.5" fill="#5a7aa0">its own CLAUDE.md &#8212; who am I, what may I touch, my commit discipline</text>
  <text x="600" y="288" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: tier home</text>
  <rect x="660" y="250" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="280" font-size="11.5" fill="#2a5a2a">Asserts &#8212; identity + jurisdiction are known; the session knows its own tier</text>

  <!-- STEP 3 -->
  <rect x="72" y="304" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="329" r="14" fill="#3b6ea5"/><text x="104" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
  <text x="130" y="325" font-size="13.5" font-weight="700" fill="#1a4a7a">Read the axis declaration</text>
  <text x="130" y="342" font-size="10.5" fill="#5a7aa0">e.g. AXIS_BUILD.md &#8212; the bindings for this axis</text>
  <text x="600" y="342" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: repo root</text>
  <rect x="660" y="304" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="334" font-size="11.5" fill="#2a5a2a">Asserts &#8212; the axis bindings (charter posture, stage taxonomy) are loaded</text>

  <!-- STEP 4 -->
  <rect x="72" y="358" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="383" r="14" fill="#3b6ea5"/><text x="104" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <text x="130" y="379" font-size="13.5" font-weight="700" fill="#1a4a7a">Read the LEDGER</text>
  <text x="130" y="396" font-size="10.5" fill="#5a7aa0">LEDGER.md &#8212; live federation state: in flight, done, next</text>
  <text x="600" y="396" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: repo root (shared)</text>
  <rect x="660" y="358" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="388" font-size="11.5" fill="#2a5a2a">Asserts &#8212; the session knows what is in flight, what closed, what is next</text>

  <!-- STEP 5 -->
  <rect x="72" y="412" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="437" r="14" fill="#3b6ea5"/><text x="104" y="442" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
  <text x="130" y="433" font-size="13.5" font-weight="700" fill="#1a4a7a">Read the memory index</text>
  <text x="130" y="450" font-size="10.5" fill="#5a7aa0">memory/MEMORY.md &#8212; cross-cycle learnings inherited, not re-learned</text>
  <text x="600" y="450" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: tier home /memory</text>
  <rect x="660" y="412" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="442" font-size="11.5" fill="#2a5a2a">Asserts &#8212; hard-won lessons carry forward into this fresh session</text>

  <!-- STEP 6 -->
  <rect x="72" y="466" width="540" height="50" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <circle cx="104" cy="491" r="14" fill="#3b6ea5"/><text x="104" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
  <text x="130" y="487" font-size="13.5" font-weight="700" fill="#1a4a7a">Read the inbox</text>
  <text x="130" y="504" font-size="10.5" fill="#5a7aa0">its own inbox/ &#8212; new files here are this turn&#8217;s work</text>
  <text x="600" y="504" text-anchor="end" font-size="9" fill="#7a8aa0" font-style="italic">from: tier home /inbox</text>
  <rect x="660" y="466" width="724" height="50" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="676" y="496" font-size="11.5" fill="#2a5a2a">Asserts &#8212; the mentor does NOT read down a sub-tier folder; that manufactures false drift</text>

  <!-- VERIFY band -->
  <text x="72" y="552" font-size="12.5" font-weight="700" fill="#33445a">Then verify mutual consistency &#8212; do the artifacts agree with each other and with what the boot file claims?</text>

  <!-- STEP 7 (amber - GH-sync) -->
  <rect x="72" y="566" width="540" height="60" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="2"/>
  <circle cx="104" cy="596" r="14" fill="#b89425"/><text x="104" y="601" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">7</text>
  <text x="130" y="590" font-size="13.5" font-weight="700" fill="#8a6d0a">GH-sync check &#8212; local == origin?</text>
  <text x="130" y="608" font-size="10.5" fill="#9a7a1a">git fetch + status -sb &#8212; expect 0 ahead / 0 behind, clean tree</text>
  <text x="130" y="622" font-size="10.5" fill="#9a7a1a">ahead: push &#183; behind: pull --ff-only &#183; dirty: flush &amp; commit</text>
  <rect x="660" y="566" width="724" height="60" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.4"/>
  <text x="676" y="592" font-size="11.5" fill="#8a6d0a">Asserts &#8212; GH-sync 0/0: local exactly equals the state of record at origin.</text>
  <text x="676" y="612" font-size="11.5" font-weight="700" fill="#8a2a2a">If not 0/0, you are NOT booted on the true state. Reconcile first &#8212; always.</text>

  <!-- flow arrows down the steps -->
  <g stroke="#3b6ea5" stroke-width="2.2">
    <line x1="104" y1="246" x2="104" y2="250" marker-end="url(#ablue)"/>
    <line x1="104" y1="300" x2="104" y2="304" marker-end="url(#ablue)"/>
    <line x1="104" y1="354" x2="104" y2="358" marker-end="url(#ablue)"/>
    <line x1="104" y1="408" x2="104" y2="412" marker-end="url(#ablue)"/>
    <line x1="104" y1="462" x2="104" y2="466" marker-end="url(#ablue)"/>
    <line x1="104" y1="516" x2="104" y2="566" marker-end="url(#aamber)"/>
  </g>

  <!-- ============ STEP 8 · PRINT START GRID (drift-check gate) ============ -->
  <line x1="104" y1="626" x2="104" y2="660" stroke="#b89425" stroke-width="2.2" marker-end="url(#aamber)"/>

  <rect x="72" y="660" width="1312" height="196" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2.4"/>
  <rect x="72" y="660" width="1312" height="34" rx="12" fill="#b89425"/>
  <rect x="72" y="678" width="1312" height="16" fill="#b89425"/>
  <text x="728" y="683" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">8 &#183; PRINT THE START STATUS GRID &#8212; the drift-check gate</text>

  <!-- the grid mock, monospace-look via plain text rows in a panel -->
  <rect x="92" y="706" width="700" height="138" rx="8" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.2"/>
  <g font-size="10.5" fill="#26425f">
    <text x="108" y="728">STATUS GRID &#8212; START &#183; Mentor-1 (build, tenure-1) &#183; MODE: RELAY</text>
    <text x="108" y="748">GATE       Charter v0.1 LOCKED &#183; gates closed &#183; 0/0 units done</text>
    <text x="108" y="768">DISPATCH   none &#8212; last: (none, first cycle)</text>
    <text x="108" y="788">LEFTOVERS  0 open</text>
    <text x="108" y="808">NEXT       T1 &#8212; compose first dispatch brief for Mentor-2</text>
    <text x="108" y="828" font-weight="700" fill="#2a5a2a">DISK       6 artifacts &#183; read-back ok &#183; no unflushed &#183; GH-sync 0/0</text>
  </g>

  <!-- drift-check explanation -->
  <rect x="812" y="706" width="552" height="138" rx="8" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="828" y="728" font-size="12" font-weight="700" fill="#8a2a2a">The grid IS the boot-integrity check</text>
  <text x="828" y="748" font-size="10.5" fill="#9a3a3a">Each line asserts something about disk. If any line cannot be</text>
  <text x="828" y="764" font-size="10.5" fill="#9a3a3a">truthfully filled from what is actually on disk and at origin,</text>
  <text x="828" y="780" font-size="10.5" fill="#9a3a3a">you have drift &#8212; and the rule is halt and reconcile.</text>
  <text x="828" y="804" font-size="10.5" fill="#9a3a3a">The most important line is DISK: GH-sync 0/0 or you are not</text>
  <text x="828" y="820" font-size="10.5" fill="#9a3a3a">booted on the true state.</text>
  <text x="828" y="838" font-size="10.5" font-weight="700" fill="#8a2a2a">Never start work on a non-0/0 boot.</text>

  <!-- gate outcome arrows -->
  <line x1="700" y1="868" x2="1392" y2="868" stroke="#fafaf8" stroke-width="0"/>

  <!-- ============ TWO OUTCOMES ============ -->
  <rect x="72" y="868" width="640" height="44" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <polyline points="100,890 110,900 130,878" fill="none" stroke="#2a5a2a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="430" y="895" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">every line truthfully fillable &#8212; booted clean &#8212; take first action</text>

  <rect x="744" y="868" width="640" height="44" rx="9" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.8"/>
  <path d="M772,878 L760,902 L784,902 Z" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.2" stroke-linejoin="round"/>
  <rect x="770" y="884" width="4" height="9" rx="1.5" fill="#8a2a2a"/><circle cx="772" cy="897" r="2" fill="#8a2a2a"/>
  <text x="1078" y="895" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a2a2a">any line unfillable &#8212; drift &#8212; halt and reconcile before any work</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="924" width="1328" height="40" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="720" y="949" text-anchor="middle" font-size="12.5" fill="#5a4d20">The reading order proves the habit; the START grid proves the state. Only after both does the session take work.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="660" y="976" width="6" height="8" rx="1"/><rect x="669" y="970" width="6" height="14" rx="1"/><rect x="678" y="964" width="6" height="20" rx="1"/></g>
    <text x="692" y="984" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
