<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 1020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="1020" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The Tier Grammar</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Exactly three tiers per axis &#8212; positions invariant, names tunable. Mentors orchestrate; only the Doer labours.</text>

  <!-- ============ LEFT: COLUMN HEADERS ============ -->
  <text x="64" y="150" font-size="13" font-weight="700" fill="#33445a">Each tier declares</text>
  <text x="64" y="170" font-size="11.5" fill="#6a7585">role &#183; labour &#183; session lifecycle &#183; persistence home</text>

  <!-- HOW legend: dispatch down / return up -->
  <rect x="1148" y="132" width="288" height="62" rx="8" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.3"/>
  <text x="1292" y="150" text-anchor="middle" font-size="10.8" font-weight="700" fill="#33445a">How work moves through the stack</text>
  <line x1="1170" y1="162" x2="1170" y2="184" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <text x="1182" y="178" font-size="10.5" fill="#1a4a7a" font-weight="600">dispatch flows DOWN</text>
  <line x1="1322" y1="184" x2="1322" y2="162" stroke="#4a8a4a" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#agreen)"/>
  <text x="1334" y="178" font-size="10.5" fill="#2a5a2a" font-weight="600">return climbs UP</text>

  <!-- ============ TIER 1: MENTOR-1 (top) ============ -->
  <rect x="430" y="196" width="640" height="146" rx="12" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2.4"/>
  <rect x="430" y="196" width="640" height="36" rx="12" fill="#3b6ea5"/>
  <rect x="430" y="214" width="640" height="18" fill="#3b6ea5"/>
  <text x="750" y="221" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">MENTOR-1 &#183; top of the chain</text>
  <text x="454" y="262" font-size="12.5" font-weight="700" fill="#1a4a7a">ROLE</text>
  <text x="454" y="282" font-size="12" fill="#26425f">orchestrates the cycle &#183; ratifies completion &#183; surfaces founder-calls</text>
  <text x="454" y="308" font-size="12.5" font-weight="700" fill="#8a2a2a">LABOUR&#8195;NEVER</text>
  <text x="454" y="328" font-size="12" fill="#26425f">long-lived in tenure (one per major cycle) &#183; rotates at clean seams</text>
  <rect x="868" y="252" width="186" height="78" rx="9" fill="#eaf2fb" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="961" y="276" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">persistence home</text>
  <text x="961" y="297" text-anchor="middle" font-size="10.5" fill="#33597f">own judicial folder</text>
  <text x="961" y="313" text-anchor="middle" font-size="10.5" fill="#33597f">in reviewer-state repo</text>

  <!-- sees-only chip -->
  <rect x="64" y="232" width="332" height="74" rx="9" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="230" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">sees only completion events</text>
  <text x="230" y="278" text-anchor="middle" font-size="11" fill="#26425f">cycle-level granularity &#8212; context</text>
  <text x="230" y="294" text-anchor="middle" font-size="11" fill="#26425f">stays clean for ratification</text>
  <line x1="396" y1="269" x2="426" y2="269" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- dispatch arrow down to mentor-2 -->
  <line x1="750" y1="342" x2="750" y2="386" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <text x="766" y="368" font-size="11" fill="#1a4a7a" font-weight="600">dispatches a unit of work</text>

  <!-- ============ TIER 2: MENTOR-2 (middle) ============ -->
  <rect x="430" y="388" width="640" height="146" rx="12" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2.4"/>
  <rect x="430" y="388" width="640" height="36" rx="12" fill="#3b6ea5"/>
  <rect x="430" y="406" width="640" height="18" fill="#3b6ea5"/>
  <text x="750" y="413" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">MENTOR-2 &#183; the orchestrator</text>
  <text x="454" y="454" font-size="12.5" font-weight="700" fill="#1a4a7a">ROLE</text>
  <text x="454" y="474" font-size="12" fill="#26425f">orchestrates ONE dispatch &#183; slices work &#183; triages tagged returns &#183; gates</text>
  <text x="454" y="500" font-size="12.5" font-weight="700" fill="#8a2a2a">LABOUR&#8195;NEVER</text>
  <text x="454" y="520" font-size="12" fill="#26425f">fresh-per-event &#8212; a new thread booted per bus event</text>
  <rect x="868" y="444" width="186" height="78" rx="9" fill="#eaf2fb" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="961" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">persistence home</text>
  <text x="961" y="489" text-anchor="middle" font-size="10.5" fill="#33597f">confined judicial folder</text>
  <text x="961" y="505" text-anchor="middle" font-size="10.5" fill="#33597f">under Mentor-1&#8217;s home</text>

  <!-- sees-only chip -->
  <rect x="64" y="424" width="332" height="74" rx="9" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="230" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">sees only slice events</text>
  <text x="230" y="470" text-anchor="middle" font-size="11" fill="#26425f">dispatch-level granularity &#8212; never</text>
  <text x="230" y="486" text-anchor="middle" font-size="11" fill="#26425f">live per-slice WIP inside the Doer</text>
  <line x1="396" y1="461" x2="426" y2="461" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- ============ LABOUR-BOUNDARY FIREWALL ============ -->
  <rect x="64" y="566" width="1016" height="62" rx="10" fill="#fef8e7" stroke="#b89425" stroke-width="2.4" stroke-dasharray="10 6"/>
  <path d="M104,580 L92,602 L104,602 L96,620 L122,596 L108,596 L120,580 Z" fill="#f2c200" stroke="#8a6d0a" stroke-width="1.4" stroke-linejoin="round"/>
  <text x="582" y="592" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6d0a">LABOUR-BOUNDARY FIREWALL</text>
  <text x="582" y="614" text-anchor="middle" font-size="12.5" fill="#9a7a1a">Mentors NEVER touch substrate &#183; everything below this line is the only tier that does</text>

  <!-- WHY chip on the labour boundary -->
  <rect x="1092" y="560" width="344" height="74" rx="9" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1112" y="582" font-size="11.5" font-weight="700" fill="#8a2a2a">WHY the boundary exists</text>
  <text x="1112" y="602" font-size="10.8" fill="#9a3a3a">a mentor that labours blurs role &#8212; orchestration and</text>
  <text x="1112" y="618" font-size="10.8" fill="#9a3a3a">substrate detail collide, polluting the clean context</text>
  <text x="1112" y="634" font-size="10.8" fill="#9a3a3a">it needs to ratify. The firewall keeps the two apart.</text>

  <!-- dispatch arrow across the firewall -->
  <line x1="750" y1="534" x2="750" y2="566" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="750" y1="628" x2="750" y2="672" stroke="#b89425" stroke-width="2.4" marker-end="url(#aamber)"/>
  <text x="766" y="656" font-size="11" fill="#8a6d0a" font-weight="600">slice brief crosses the firewall</text>

  <!-- ============ TIER 3: DOER (bottom) ============ -->
  <rect x="430" y="674" width="640" height="146" rx="12" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2.4"/>
  <rect x="430" y="674" width="640" height="36" rx="12" fill="#4a8a4a"/>
  <rect x="430" y="692" width="640" height="18" fill="#4a8a4a"/>
  <text x="750" y="699" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">DOER &#183; the only tier that labours</text>
  <text x="454" y="740" font-size="12.5" font-weight="700" fill="#2a5a2a">ROLE</text>
  <text x="454" y="760" font-size="12" fill="#2a5a2a">takes a bounded slice brief &#183; produces the deliverable &#183; returns tagged</text>
  <text x="454" y="786" font-size="12.5" font-weight="700" fill="#2a5a2a">LABOUR&#8195;ALL the substrate labour</text>
  <text x="454" y="806" font-size="12" fill="#2a5a2a">fresh-per-slice &#183; disposable &#183; never reused across slices</text>
  <rect x="868" y="730" width="186" height="78" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="961" y="754" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">persistence home</text>
  <text x="961" y="775" text-anchor="middle" font-size="10.5" fill="#3a6a3a">worktree-local + the</text>
  <text x="961" y="791" text-anchor="middle" font-size="10.5" fill="#3a6a3a">committed deliverable</text>

  <!-- sees-only chip -->
  <rect x="64" y="710" width="332" height="74" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="230" y="734" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">sees only its own slice</text>
  <text x="230" y="756" text-anchor="middle" font-size="11" fill="#3a6a3a">slice-level granularity &#8212; no</text>
  <text x="230" y="772" text-anchor="middle" font-size="11" fill="#3a6a3a">cross-slice memory by construction</text>
  <line x1="396" y1="747" x2="426" y2="747" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>

  <!-- tagged return arrow up to mentor-2 (routed far right to clear the WHY chip) -->
  <path d="M1074,720 C1466,720 1466,461 1074,461" fill="none" stroke="#4a8a4a" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#agreen)"/>
  <text x="1480" y="590" text-anchor="middle" font-size="11" fill="#2a5a2a" font-weight="600" transform="rotate(90 1480 590)">tagged return climbs back up</text>

  <!-- ============ NUMBER-OF-TIERS NOTE ============ -->
  <rect x="64" y="844" width="660" height="70" rx="9" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.4"/>
  <text x="394" y="868" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33445a">Three is the sweet spot</text>
  <text x="394" y="889" text-anchor="middle" font-size="11" fill="#5a6678">Two &#8212; the lone mentor drowns in orchestration churn.</text>
  <text x="394" y="905" text-anchor="middle" font-size="11" fill="#5a6678">Four &#8212; diminishing returns, more relay surface for no gain.</text>

  <rect x="776" y="844" width="660" height="70" rx="9" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.4"/>
  <text x="1106" y="868" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33445a">Names are tunable</text>
  <text x="1106" y="889" text-anchor="middle" font-size="11" fill="#5a6678">Director / Manager / Engineer &#183; Architect / Lead / Builder</text>
  <text x="1106" y="905" text-anchor="middle" font-size="11" fill="#5a6678">The framework requires only the three positions.</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="64" y="930" width="1372" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="953" text-anchor="middle" font-size="13.5" fill="#5a4d20">Number of tiers is INVARIANT; the names are TUNABLE. Each tier&#8217;s context stays clean for its own granularity &#8212;</text>
  <text x="750" y="972" text-anchor="middle" font-size="13.5" fill="#5a4d20">the firewall between the mentors and the Doer is what keeps orchestration uncontaminated by labour.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="998" width="6" height="8" rx="1"/><rect x="699" y="992" width="6" height="14" rx="1"/><rect x="708" y="986" width="6" height="20" rx="1"/></g>
    <text x="722" y="1006" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
