<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="920" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Codebase Coherence</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">One canonical definition per concept &#8212; every component calls THAT, not its own copy</text>

  <!-- ============ VERTICAL DIVIDER ============ -->
  <line x1="750" y1="128" x2="750" y2="820" stroke="#cfcabc" stroke-width="2" stroke-dasharray="3 5"/>

  <!-- =================================================================== -->
  <!-- ============ LEFT PANEL · WITH CompassAlpha (coherent) ============ -->
  <!-- =================================================================== -->

  <!-- panel header -->
  <rect x="48" y="128" width="654" height="58" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <!-- green check mark (two-segment polyline) -->
  <polyline points="84,158 96,170 120,144" fill="none" stroke="#2a5a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="384" y="156" text-anchor="middle" font-size="20" font-weight="700" fill="#2a5a2a">WITH CompassAlpha &#8212; coherent</text>
  <text x="384" y="177" text-anchor="middle" font-size="12.5" fill="#3a6a3a" font-style="italic">every component calls the one definition</text>

  <!-- three component boxes (top row) -->
  <!-- Auth -->
  <rect x="68" y="230" width="180" height="84" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="158" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Auth</text>
  <text x="158" y="285" text-anchor="middle" font-size="11" fill="#33597f">component</text>
  <text x="158" y="301" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">calls chargeCard()</text>

  <!-- Billing -->
  <rect x="294" y="230" width="180" height="84" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="384" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Billing</text>
  <text x="384" y="285" text-anchor="middle" font-size="11" fill="#33597f">component</text>
  <text x="384" y="301" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">calls chargeCard()</text>

  <!-- Reporting -->
  <rect x="520" y="230" width="180" height="84" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="610" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Reporting</text>
  <text x="610" y="285" text-anchor="middle" font-size="11" fill="#33597f">component</text>
  <text x="610" y="301" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">calls chargeCard()</text>

  <!-- clean arrows into the one canonical box (apex around 384,470) -->
  <line x1="158" y1="318" x2="318" y2="466" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="384" y1="318" x2="384" y2="466" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="610" y1="318" x2="450" y2="466" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>

  <!-- central canonical box -->
  <rect x="148" y="476" width="472" height="150" rx="12" fill="#ffffff" stroke="#4a8a4a" stroke-width="2.6"/>
  <path d="M148,487 a12,12 0 0 1 12,-12 h448 a12,12 0 0 1 12,12 v30 h-472 z" fill="#4a8a4a"/>
  <text x="384" y="503" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Primitive: chargeCard()</text>
  <line x1="180" y1="540" x2="588" y2="540" stroke="#cfe2cf"/>
  <text x="384" y="566" text-anchor="middle" font-size="12.5" fill="#2a5a2a">one canonical definition</text>
  <text x="384" y="589" text-anchor="middle" font-size="12.5" fill="#2a5a2a">accepted args</text>
  <text x="384" y="612" text-anchor="middle" font-size="12.5" fill="#2a5a2a">caller sanitization</text>

  <!-- left summary chip -->
  <rect x="208" y="664" width="352" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="384" y="689" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2a5a2a">one definition &#183; no duplicates &#183; no drift</text>

  <!-- =================================================================== -->
  <!-- ============ RIGHT PANEL · WITHOUT (drift) ======================== -->
  <!-- =================================================================== -->

  <!-- panel header -->
  <rect x="798" y="128" width="654" height="58" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="2"/>
  <!-- amber warning triangle with "!" -->
  <path d="M826,170 L840,142 L854,170 z" fill="#fef8e7" stroke="#b89425" stroke-width="2.4" stroke-linejoin="round"/>
  <rect x="838" y="153" width="4" height="9" rx="1.5" fill="#8a6d0a"/>
  <circle cx="840" cy="166" r="2.2" fill="#8a6d0a"/>
  <text x="1132" y="156" text-anchor="middle" font-size="20" font-weight="700" fill="#8a6d0a">WITHOUT &#8212; drift</text>
  <text x="1132" y="177" text-anchor="middle" font-size="12.5" fill="#9a7a1a" font-style="italic">duplicated, divergent, vague &#8212; drift</text>

  <!-- three component boxes each with its OWN divergent copy -->
  <!-- Auth -->
  <rect x="818" y="230" width="194" height="110" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="915" y="260" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Auth</text>
  <rect x="838" y="278" width="154" height="44" rx="7" fill="#ffffff" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="915" y="298" text-anchor="middle" font-size="11.5" fill="#8a2a2a">own copy:</text>
  <text x="915" y="315" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">chargeCard()</text>

  <!-- Billing -->
  <rect x="1035" y="230" width="194" height="110" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1132" y="260" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Billing</text>
  <rect x="1055" y="278" width="154" height="44" rx="7" fill="#ffffff" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1132" y="298" text-anchor="middle" font-size="11.5" fill="#8a2a2a">own copy:</text>
  <text x="1132" y="315" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">charge_card_v2()</text>

  <!-- Reporting -->
  <rect x="1252" y="230" width="194" height="110" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1349" y="260" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Reporting</text>
  <rect x="1272" y="278" width="154" height="44" rx="7" fill="#ffffff" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1349" y="298" text-anchor="middle" font-size="11.5" fill="#8a2a2a">own copy:</text>
  <text x="1349" y="315" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">doCharge()</text>

  <!-- tangled / crossed arrows between the divergent copies (no shared truth) -->
  <line x1="915" y1="344" x2="1300" y2="470" stroke="#c44a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ared)"/>
  <line x1="1349" y1="344" x2="940" y2="470" stroke="#c44a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ared)"/>
  <line x1="1132" y1="344" x2="1132" y2="470" stroke="#b89425" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aamber)"/>
  <line x1="960" y1="344" x2="1120" y2="468" stroke="#b89425" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#aamber)"/>
  <line x1="1300" y1="344" x2="1145" y2="468" stroke="#c44a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ared)"/>

  <!-- drift cloud / divergent ledger box (lower) -->
  <rect x="848" y="476" width="556" height="150" rx="12" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.4" stroke-dasharray="9 5"/>
  <text x="1126" y="510" text-anchor="middle" font-size="15" font-weight="700" fill="#8a2a2a">three definitions, none authoritative</text>
  <line x1="888" y1="528" x2="1364" y2="528" stroke="#f0cccc"/>
  <text x="1126" y="554" text-anchor="middle" font-size="12.5" fill="#9a3a3a">each team reinvents the concept</text>
  <text x="1126" y="577" text-anchor="middle" font-size="12.5" fill="#9a3a3a">args diverge &#183; sanitization inconsistent</text>
  <text x="1126" y="600" text-anchor="middle" font-size="12.5" fill="#9a3a3a">vague calls &#183; behaviour drifts apart</text>

  <!-- right summary chip -->
  <rect x="950" y="664" width="352" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.4"/>
  <text x="1126" y="689" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a6d0a">duplicated &#183; divergent &#183; vague &#183; drift</text>

  <!-- ============ BOTTOM CAPTION STRIP ============ -->
  <rect x="48" y="752" width="1404" height="48" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="782" text-anchor="middle" font-size="14" fill="#5a4d20">Doctrine names the one canonical concept; every component calls it &#8212; no duplicated or vague re-implementations.</text>

  <!-- ============ FOOTER (Gradus emblem + wordmark) ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="684" y="888" width="6" height="8" rx="1"/><rect x="693" y="882" width="6" height="14" rx="1"/><rect x="702" y="876" width="6" height="20" rx="1"/></g>
    <text x="716" y="896" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
