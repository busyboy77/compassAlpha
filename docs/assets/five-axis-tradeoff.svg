<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 980" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="980" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The Five-Axis Trade-Off Space</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">No combination optimizes all five &#8212; tuning is choosing where to give</text>

  <!-- ============ RADAR ============ -->
  <!-- concentric rings -->
  <polygon points="490,420 537.6,454.5 519.4,510.5 460.6,510.5 442.4,454.5" fill="none" stroke="#d8d2c4" stroke-width="1"/>
  <polygon points="490,370 585.1,439.1 548.8,550.9 431.2,550.9 394.9,439.1" fill="none" stroke="#d8d2c4" stroke-width="1"/>
  <polygon points="490,320 632.7,423.6 578.2,591.4 401.8,591.4 347.3,423.6" fill="none" stroke="#d8d2c4" stroke-width="1"/>
  <polygon points="490,270 680.2,408.2 607.6,631.8 372.4,631.8 299.8,408.2" fill="none" stroke="#b8b0a0" stroke-width="1.4"/>

  <!-- spokes -->
  <line x1="490" y1="470" x2="490" y2="270" stroke="#b8b0a0" stroke-width="1"/>
  <line x1="490" y1="470" x2="680.2" y2="408.2" stroke="#b8b0a0" stroke-width="1"/>
  <line x1="490" y1="470" x2="607.6" y2="631.8" stroke="#b8b0a0" stroke-width="1"/>
  <line x1="490" y1="470" x2="372.4" y2="631.8" stroke="#b8b0a0" stroke-width="1"/>
  <line x1="490" y1="470" x2="299.8" y2="408.2" stroke="#b8b0a0" stroke-width="1"/>

  <!-- axis labels with good/bad tag -->
  <text x="490" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#33445a">Speed</text>
  <text x="490" y="250" text-anchor="middle" font-size="10.5" fill="#4a8a4a">good when high</text>

  <text x="716" y="392" text-anchor="middle" font-size="16" font-weight="700" fill="#33445a">Intelligence</text>
  <text x="716" y="410" text-anchor="middle" font-size="10.5" fill="#4a8a4a">good when high</text>

  <text x="630" y="668" text-anchor="middle" font-size="16" font-weight="700" fill="#33445a">Cost</text>
  <text x="630" y="686" text-anchor="middle" font-size="10.5" fill="#c44a4a">bad when high</text>

  <text x="350" y="668" text-anchor="middle" font-size="16" font-weight="700" fill="#33445a">Risk</text>
  <text x="350" y="686" text-anchor="middle" font-size="10.5" fill="#c44a4a">bad when high</text>

  <text x="264" y="392" text-anchor="middle" font-size="16" font-weight="700" fill="#33445a">Predictability</text>
  <text x="264" y="410" text-anchor="middle" font-size="10.5" fill="#4a8a4a">good when high</text>

  <!-- profile polygons -->
  <!-- regulated / high-stakes : blue -->
  <polygon points="490,400 661.2,414.4 589.9,607.5 457.7,514.5 323.6,415.9" fill="#3b6ea5" fill-opacity="0.16" stroke="#3b6ea5" stroke-width="2.4"/>
  <!-- high-throughput : amber -->
  <polygon points="490,285 604.1,432.9 560.5,567.1 396,599.4 413.9,445.3" fill="#b89425" fill-opacity="0.14" stroke="#b89425" stroke-width="2.4" stroke-dasharray="7 4"/>
  <!-- research / exploratory : green -->
  <polygon points="490,350 656.4,415.9 584,599.4 425.3,559 423.4,448.4" fill="#4a8a4a" fill-opacity="0.12" stroke="#4a8a4a" stroke-width="2.4" stroke-dasharray="2 4"/>

  <!-- center dot -->
  <circle cx="490" cy="470" r="3" fill="#7a7060"/>

  <!-- ============ PROFILE LEGEND ============ -->
  <rect x="40" y="724" width="908" height="120" rx="10" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.3"/>
  <text x="62" y="752" font-size="14" font-weight="700" fill="#1f2a36">Three named project-profile bias points</text>

  <line x1="64" y1="780" x2="110" y2="780" stroke="#3b6ea5" stroke-width="3"/>
  <text x="120" y="784" font-size="12.5" font-weight="700" fill="#1a4a7a">Regulated / high-stakes</text>
  <text x="120" y="802" font-size="11" fill="#5a6678">biases intelligence &#43; predictability, low risk; accepts cost &amp; slower speed</text>

  <line x1="64" y1="822" x2="110" y2="822" stroke="#b89425" stroke-width="3" stroke-dasharray="7 4"/>
  <text x="120" y="826" font-size="12.5" font-weight="700" fill="#8a6d0a">High-throughput</text>

  <line x1="520" y1="780" x2="566" y2="780" stroke="#4a8a4a" stroke-width="3" stroke-dasharray="2 4"/>
  <text x="576" y="784" font-size="12.5" font-weight="700" fill="#2a5a2a">Research / exploratory</text>
  <text x="576" y="802" font-size="11" fill="#5a6678">high intelligence, accepts cost; low predictability, modest risk</text>

  <text x="120" y="838" font-size="11" fill="#5a6678">biases speed, accepts high risk; lower intelligence &amp; predictability</text>

  <!-- ============ COUPLING TENSIONS PANEL ============ -->
  <rect x="980" y="156" width="476" height="380" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="1.8"/>
  <text x="1218" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#8a6d0a">The couplings &#8212; spend one to buy another</text>

  <rect x="1004" y="206" width="428" height="72" rx="9" fill="#ffffff" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="1022" y="232" font-size="13" font-weight="700" fill="#8a2a2a">Speed up</text>
  <line x1="1098" y1="227" x2="1140" y2="227" stroke="#c44a4a" stroke-width="2.4" marker-end="url(#ared)"/>
  <text x="1152" y="232" font-size="13" font-weight="700" fill="#8a2a2a">Risk up &#183; Intelligence down</text>
  <text x="1022" y="258" font-size="11" fill="#9a3a3a">parallel dispatches, skipped verification, concise digests</text>

  <rect x="1004" y="290" width="428" height="72" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="1022" y="316" font-size="13" font-weight="700" fill="#1a4a7a">Intelligence up</text>
  <line x1="1132" y1="311" x2="1174" y2="311" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <text x="1186" y="316" font-size="13" font-weight="700" fill="#1a4a7a">Cost up &#183; Speed down</text>
  <text x="1022" y="342" font-size="11" fill="#5a7aa0">top-tier models, wide context, strict provenance, more invariants</text>

  <rect x="1004" y="374" width="428" height="72" rx="9" fill="#ffffff" stroke="#b89425" stroke-width="1.4"/>
  <text x="1022" y="400" font-size="13" font-weight="700" fill="#8a6d0a">Cost down</text>
  <line x1="1098" y1="395" x2="1140" y2="395" stroke="#b89425" stroke-width="2.4" marker-end="url(#aamber)"/>
  <text x="1152" y="400" font-size="13" font-weight="700" fill="#8a6d0a">Founder load up &#183; Risk up</text>
  <text x="1022" y="426" font-size="11" fill="#9a7a1a">cheaper models or fewer toolings shift verification onto the human</text>

  <rect x="1004" y="458" width="428" height="58" rx="9" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="1022" y="484" font-size="13" font-weight="700" fill="#2a5a2a">Predictability up</text>
  <line x1="1146" y1="479" x2="1188" y2="479" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <text x="1200" y="484" font-size="13" font-weight="700" fill="#2a5a2a">Speed down</text>
  <text x="1022" y="506" font-size="11" fill="#3a6a3a">LAYGO one-at-a-time is estimable but slow</text>

  <!-- ============ INVARIANT FLOOR NOTE ============ -->
  <rect x="980" y="556" width="476" height="166" rx="11" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1218" y="584" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">The invariant floor &#8212; below every point</text>
  <text x="1002" y="612" font-size="11.5" fill="#26425f">Firewall &#183; hard-labour &#183; bus protocol &#183; persistence law &#183;</text>
  <text x="1002" y="632" font-size="11.5" fill="#26425f">dual validation are not on any axis. You cannot trade</text>
  <text x="1002" y="652" font-size="11.5" fill="#26425f">them for speed or cost &#8212; they make state trustworthy</text>
  <text x="1002" y="672" font-size="11.5" fill="#26425f">in the first place.</text>
  <text x="1002" y="700" font-size="12" font-weight="700" fill="#1a4a7a">Tuning happens on top of a fixed correctness floor.</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="40" y="862" width="1416" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="748" y="885" text-anchor="middle" font-size="13.5" fill="#5a4d20">The dials are coupled: every tuning decision spends one axis to buy another. There is no single optimum.</text>
  <text x="748" y="904" text-anchor="middle" font-size="13.5" fill="#5a4d20">Tuning is picking the bias point your project profile can most afford &#8212; deliberately, not by accident.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="940" width="6" height="8" rx="1"/><rect x="699" y="934" width="6" height="14" rx="1"/><rect x="708" y="928" width="6" height="20" rx="1"/></g>
    <text x="722" y="948" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
