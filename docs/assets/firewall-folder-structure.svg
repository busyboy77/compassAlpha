<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 980" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="980" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The Firewall &#8212; Confined, Not Banished</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Each tier writes only inside its own folder &#183; reads only its own inbox &#183; the parent stays opaque to the child during routine flow</text>

  <!-- intro label -->
  <text x="64" y="146" font-size="15" font-weight="700" fill="#1f2a36">The reviewer-state repo &#8212; spatial containment IS the firewall</text>
  <text x="64" y="167" font-size="12.5" fill="#5a6678" font-style="italic">nesting on disk encodes the boundary: the deeper folder is opaque to the one that contains it</text>

  <!-- =================================================================== -->
  <!-- ============ FOLDER TREE (left, nested boxes) ===================== -->
  <!-- =================================================================== -->

  <!-- repo root label -->
  <text x="80" y="206" font-size="13.5" font-weight="700" fill="#33445a">reviewer-state-repo/</text>

  <!-- TIER-1 MENTOR outer box -->
  <rect x="80" y="220" width="780" height="624" rx="12" fill="#eef4fb" stroke="#3b6ea5" stroke-width="2.4"/>
  <rect x="80" y="220" width="780" height="36" rx="12" fill="#3b6ea5"/>
  <rect x="80" y="238" width="780" height="18" fill="#3b6ea5"/>
  <text x="104" y="244" font-size="14.5" font-weight="700" fill="#ffffff">tier-1-mentor/&#8195;&#8212;&#8195;Mentor-1 home</text>

  <!-- mentor-1 own files -->
  <rect x="104" y="272" width="240" height="118" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="224" y="296" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">own judicial state</text>
  <text x="224" y="318" text-anchor="middle" font-size="11" fill="#26425f">LEDGER.md (cycle-level)</text>
  <text x="224" y="336" text-anchor="middle" font-size="11" fill="#26425f">LEFTOVERS &#183; HANDOVER_LOG</text>
  <text x="224" y="354" text-anchor="middle" font-size="11" fill="#26425f">CLAUDE.md</text>
  <text x="224" y="378" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">single-live-writer: Mentor-1 only</text>

  <!-- mentor-1 inbox -->
  <rect x="360" y="272" width="476" height="62" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="384" y="296" font-size="12" font-weight="700" fill="#1a4a7a">inbox/</text>
  <text x="384" y="316" font-size="11" fill="#26425f">messages from Mentor-2 &#8212; Mentor-1 reads ONLY here</text>

  <!-- TIER-2 ORCHESTRATOR nested box -->
  <rect x="124" y="356" width="712" height="468" rx="11" fill="#e6eefb" stroke="#3b6ea5" stroke-width="2.2"/>
  <rect x="124" y="356" width="712" height="34" rx="11" fill="#5687bf"/>
  <rect x="124" y="373" width="712" height="17" fill="#5687bf"/>
  <text x="148" y="380" font-size="13.5" font-weight="700" fill="#ffffff">tier-2-orchestrator-A/&#8195;&#8212;&#8195;Mentor-2 home (per dispatch)</text>

  <!-- mentor-2 own files -->
  <rect x="148" y="406" width="232" height="100" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="264" y="430" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">own judicial state</text>
  <text x="264" y="452" text-anchor="middle" font-size="11" fill="#26425f">LEDGER.md (dispatch-level)</text>
  <text x="264" y="470" text-anchor="middle" font-size="11" fill="#26425f">CLAUDE.md</text>
  <text x="264" y="494" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">single-live-writer: Mentor-2 only</text>

  <!-- mentor-2 inbox -->
  <rect x="396" y="406" width="416" height="60" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="420" y="430" font-size="12" font-weight="700" fill="#1a4a7a">inbox/</text>
  <text x="420" y="450" font-size="11" fill="#26425f">from Doer (or Mentor-1) &#8212; Mentor-2 reads ONLY here</text>

  <!-- SLICE nested box -->
  <rect x="168" y="524" width="644" height="280" rx="10" fill="#eaf4ea" stroke="#4a8a4a" stroke-width="2.2"/>
  <rect x="168" y="524" width="644" height="32" rx="10" fill="#4a8a4a"/>
  <rect x="168" y="540" width="644" height="16" fill="#4a8a4a"/>
  <text x="192" y="546" font-size="13" font-weight="700" fill="#ffffff">slice-1/&#8195;&#8212;&#8195;Doer&#8217;s workspace for this slice</text>

  <rect x="192" y="572" width="596" height="56" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="216" y="595" font-size="12" font-weight="700" fill="#2a5a2a">inbox/</text>
  <text x="216" y="614" font-size="11" fill="#3a6a3a">the slice brief &#8212; the Doer reads ONLY its own slice inbox</text>

  <!-- second slice peer -->
  <rect x="192" y="644" width="596" height="48" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="216" y="667" font-size="12" font-weight="700" fill="#2a5a2a">slice-2/ inbox/</text>
  <text x="216" y="684" font-size="10.5" fill="#3a6a3a" font-style="italic">a sibling slice &#8212; opaque to slice-1; each Doer sees only its own</text>

  <text x="490" y="730" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">live per-slice WIP lives HERE</text>
  <text x="490" y="750" text-anchor="middle" font-size="11" fill="#3a6a3a">it reaches the mentor only via a tagged return or at close &#8212;</text>
  <text x="490" y="767" text-anchor="middle" font-size="11" fill="#3a6a3a">the sub-tier moves on without telling the mentor, by design</text>
  <text x="490" y="790" text-anchor="middle" font-size="11" fill="#3a6a3a" font-style="italic">&#8220;current WIP&#8221; in any mentor&#8217;s notes means &#8220;as of the last tagged return&#8221;</text>

  <!-- =================================================================== -->
  <!-- ============ RIGHT: THE THREE FIREWALL RULES ===================== -->
  <!-- =================================================================== -->

  <!-- rule 1: reads only own inbox -->
  <rect x="908" y="220" width="528" height="118" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2"/>
  <text x="932" y="248" font-size="14" font-weight="700" fill="#1a4a7a">Reads ONLY its own inbox</text>
  <text x="932" y="272" font-size="11.5" fill="#26425f">During routine flow a tier reads its own folder + inbox.</text>
  <text x="932" y="292" font-size="11.5" fill="#26425f">Auto-reading a sub-tier&#8217;s folder manufactures false</text>
  <text x="932" y="310" font-size="11.5" fill="#26425f">drift &#8212; the child&#8217;s snapshot contradicts the parent&#8217;s</text>
  <text x="932" y="328" font-size="11.5" fill="#26425f">higher-granularity snapshot by design.</text>
  <line x1="908" y1="300" x2="844" y2="303" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- rule 2: opaque to parent -->
  <rect x="908" y="354" width="528" height="118" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="2"/>
  <text x="932" y="382" font-size="14" font-weight="700" fill="#8a6d0a">Opaque to the parent during routine flow</text>
  <text x="932" y="406" font-size="11.5" fill="#9a7a1a">A mentor tracks only the granularity it owns.</text>
  <text x="932" y="426" font-size="11.5" fill="#9a7a1a">It does NOT track live sub-tier WIP. The nested</text>
  <text x="932" y="444" font-size="11.5" fill="#9a7a1a">folder is a sealed room until a tagged return or</text>
  <text x="932" y="462" font-size="11.5" fill="#9a7a1a">cycle-close opens the door.</text>
  <line x1="908" y1="436" x2="844" y2="436" stroke="#b89425" stroke-width="2" marker-end="url(#aamber)"/>

  <!-- rule 3: transient descend only on trigger -->
  <rect x="908" y="488" width="528" height="118" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <text x="932" y="516" font-size="14" font-weight="700" fill="#2a5a2a">Transient descend ONLY on explicit trigger</text>
  <text x="932" y="540" font-size="11.5" fill="#3a6a3a">On escalation or exit-study a mentor MAY descend &#8212;</text>
  <text x="932" y="560" font-size="11.5" fill="#3a6a3a">reading narrowly + transiently, never mirrored into</text>
  <text x="932" y="578" font-size="11.5" fill="#3a6a3a">its canonical state. Anything read is ephemeral and</text>
  <text x="932" y="596" font-size="11.5" fill="#3a6a3a">discarded after the descent.</text>
  <path d="M908,560 C870,560 850,640 812,668" fill="none" stroke="#4a8a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#agreen)"/>

  <!-- two pathologies prevented -->
  <rect x="908" y="624" width="528" height="220" rx="11" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <text x="1172" y="650" text-anchor="middle" font-size="13.5" font-weight="700" fill="#8a2a2a">The two pathologies this prevents</text>
  <text x="932" y="680" font-size="12" font-weight="700" fill="#8a2a2a">A &#183; Context pollution</text>
  <text x="932" y="700" font-size="11" fill="#9a3a3a">auto-reading a child folder floods the parent with</text>
  <text x="932" y="717" font-size="11" fill="#9a3a3a">slice detail it doesn&#8217;t own &#8212; judgment degrades.</text>
  <text x="932" y="744" font-size="12" font-weight="700" fill="#8a2a2a">B &#183; Stale-snapshot drift (the firewall leak)</text>
  <text x="932" y="764" font-size="11" fill="#9a3a3a">recording a point-in-time child snapshot then</text>
  <text x="932" y="781" font-size="11" fill="#9a3a3a">treating it as live &#8212; the mentor cites stale state as</text>
  <text x="932" y="798" font-size="11" fill="#9a3a3a">fact. Cure: strict &#8220;as of &lt;date&gt; per tag&#8221; framing.</text>
  <text x="932" y="824" font-size="11" fill="#9a3a3a" font-style="italic">the mentor&#8217;s job is to NOT pretend to know.</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="64" y="864" width="1372" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="887" text-anchor="middle" font-size="13.5" fill="#5a4d20">Confined, not banished: a tier may descend across the boundary, but only on a deliberate trigger and only transiently.</text>
  <text x="750" y="906" text-anchor="middle" font-size="13.5" fill="#5a4d20">Routine flow keeps every tier in its own room &#8212; that spatial containment is the structural defense against pollution.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="934" width="6" height="8" rx="1"/><rect x="699" y="928" width="6" height="14" rx="1"/><rect x="708" y="922" width="6" height="20" rx="1"/></g>
    <text x="722" y="942" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
