<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- ==================== DEFS ==================== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/></marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b89425"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b6ea5"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4a8a4a"/></marker>
    <marker id="arrowGhost" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a8a"/></marker>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1600" height="1000" fill="#fafaf8"/>

  <!-- faint distribution globe (physical spread) -->
  <g opacity="0.10" stroke="#5a8aa8" fill="none" stroke-width="1.5">
    <circle cx="800" cy="780" r="290"/>
    <ellipse cx="800" cy="780" rx="290" ry="100"/>
    <ellipse cx="800" cy="780" rx="290" ry="190"/>
    <ellipse cx="800" cy="780" rx="120" ry="290"/>
    <ellipse cx="800" cy="780" rx="230" ry="290"/>
    <line x1="510" y1="780" x2="1090" y2="780"/>
  </g>

  <!-- ==================== HEADER ==================== -->
  <g>
    <rect x="0" y="0" width="1600" height="120" fill="#1f2a36"/>
    <text x="800" y="46" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">Physical Federation</text>
    <text x="800" y="74" text-anchor="middle" font-size="15" fill="#a0aabb" font-style="italic">One Charter · many distributed teams · Git is the glue — this is GitAI</text>
    <text x="800" y="98" text-anchor="middle" font-size="12" fill="#7a8493">Source-available federation framework · A <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank"><tspan fill="#9fc3e8" text-decoration="underline">gradus.pk</tspan></a> project — brand credit only, never a host</text>
  </g>

  <!-- ============================================================ -->
  <!-- THE ONE CHARTER (crown) -->
  <!-- ============================================================ -->
  <g transform="translate(560,150)">
    <!-- crown -->
    <path d="M 130 -8 L 160 18 L 240 -8 L 320 18 L 350 -8 L 350 30 L 130 30 Z" fill="#b89425" opacity="0.9"/>
    <circle cx="130" cy="-8" r="6" fill="#d4af37"/>
    <circle cx="240" cy="-8" r="6" fill="#d4af37"/>
    <circle cx="350" cy="-8" r="6" fill="#d4af37"/>

    <rect x="0" y="20" width="480" height="120" fill="#1f2a36" rx="10"/>
    <text x="240" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="white">FEDERATION CHARTER</text>
    <text x="240" y="76" text-anchor="middle" font-size="12" fill="#cdd5e0">the one constitution · master · single source of truth</text>
    <line x1="30" y1="88" x2="450" y2="88" stroke="#3a4a5a"/>
    <text x="240" y="108" text-anchor="middle" font-size="11" fill="#a0aabb">Tier grammar (Mentor-1 / Mentor-2 / Doer) · invariants · bus protocol</text>
    <text x="240" y="126" text-anchor="middle" font-size="11" fill="#a0aabb">persistence + provenance laws · gates · hygiene — inherited by ALL</text>
  </g>

  <!-- Compasses + axis annexes hanging under the Charter -->
  <g transform="translate(420,180)">
    <rect width="118" height="64" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.5" rx="8"/>
    <text x="59" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">Compass</text>
    <text x="59" y="40" text-anchor="middle" font-size="9.5" fill="#33526a">per-component</text>
    <text x="59" y="55" text-anchor="middle" font-size="9.5" fill="#33526a">orientation</text>
    <line x1="118" y1="20" x2="150" y2="0" stroke="#3b6ea5" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>
  <g transform="translate(1062,180)">
    <rect width="118" height="64" fill="#eee0f5" stroke="#7a5b9c" stroke-width="1.5" rx="8"/>
    <text x="59" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3a7a">Axis annex</text>
    <text x="59" y="40" text-anchor="middle" font-size="9.5" fill="#5a3a7a">LOCKED ·</text>
    <text x="59" y="55" text-anchor="middle" font-size="9.5" fill="#5a3a7a">UNLOCKED · DECOUPLED</text>
    <line x1="0" y1="20" x2="-32" y2="0" stroke="#7a5b9c" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <!-- Charter -> Git glue: inherit propagation -->
  <line x1="800" y1="320" x2="800" y2="408" stroke="#3b6ea5" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="816" y="368" font-size="13" font-weight="600" font-style="italic" fill="#3b6ea5">propagate (inherit)</text>

  <!-- callout: inherit -->
  <g transform="translate(40,300)">
    <rect width="300" height="56" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.5" rx="8"/>
    <text x="150" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">Inherit the one Charter</text>
    <text x="150" y="42" text-anchor="middle" font-size="11" fill="#33526a" font-style="italic">— wherever they sit</text>
  </g>

  <!-- ============================================================ -->
  <!-- GIT GLUE BUS (the connective tissue) -->
  <!-- ============================================================ -->
  <g transform="translate(80,410)">
    <rect width="1440" height="92" fill="#fef8e7" stroke="#b89425" stroke-width="2.5" rx="10"/>
    <rect x="0" y="0" width="1440" height="34" fill="#b89425" rx="10"/>
    <rect x="0" y="24" width="1440" height="10" fill="#b89425"/>
    <text x="720" y="23" text-anchor="middle" font-size="16" font-weight="700" fill="white">GIT — the glue · state of record · this is GitAI</text>
    <text x="720" y="58" text-anchor="middle" font-size="12" fill="#5a4d20" font-style="italic">git as the coordination + durability + audit layer for AI-agent federations — the Charter propagates DOWN through it; every team syncs UP through it</text>
    <text x="720" y="78" text-anchor="middle" font-size="11" fill="#7a6a30">commit · push · pull --ff-only · tags · audit trail in git log · resume-from-anywhere · power-down resilient</text>
  </g>

  <!-- callout: git glue -->
  <g transform="translate(1260,300)">
    <rect width="300" height="56" fill="#fef8e7" stroke="#b89425" stroke-width="1.5" rx="8"/>
    <text x="150" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5a4d20">Git is the glue</text>
    <text x="150" y="42" text-anchor="middle" font-size="11" fill="#7a6a30" font-style="italic">→ coherence, zero drift</text>
  </g>

  <!-- ============================================================ -->
  <!-- DISTRIBUTED TEAMS (cohorts, wherever they sit) -->
  <!-- ============================================================ -->

  <!-- inherit arrows down from bus to each team, commit arrows up -->
  <!-- Team A -->
  <line x1="220" y1="502" x2="220" y2="620" stroke="#3b6ea5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="232" y="548" font-size="11" font-style="italic" fill="#3b6ea5" font-weight="600">inherit</text>
  <line x1="180" y1="620" x2="180" y2="504" stroke="#4a8a4a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="60" y="548" font-size="10.5" font-style="italic" fill="#3a7a3a" font-weight="600">commit/push</text>
  <text x="76" y="563" font-size="9.5" font-style="italic" fill="#3a7a3a">segment (sub-bump)</text>

  <!-- Team B -->
  <line x1="540" y1="502" x2="540" y2="620" stroke="#3b6ea5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="552" y="548" font-size="11" font-style="italic" fill="#3b6ea5" font-weight="600">inherit</text>
  <line x1="500" y1="620" x2="500" y2="504" stroke="#4a8a4a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

  <!-- Team C -->
  <line x1="860" y1="502" x2="860" y2="620" stroke="#3b6ea5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="872" y="548" font-size="11" font-style="italic" fill="#3b6ea5" font-weight="600">inherit</text>
  <line x1="820" y1="620" x2="820" y2="504" stroke="#4a8a4a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

  <!-- Team D (decoupled, read-only) -->
  <line x1="1310" y1="502" x2="1310" y2="620" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowGhost)"/>
  <text x="1322" y="548" font-size="11" font-style="italic" fill="#8a8a8a" font-weight="600">read-only</text>
  <text x="1322" y="563" font-size="9.5" font-style="italic" fill="#8a8a8a">(no write-up)</text>

  <!-- ===== Team A · Auth ===== -->
  <g transform="translate(60,624)">
    <rect width="320" height="208" fill="#ffffff" stroke="#3b6ea5" stroke-width="2.5" rx="10"/>
    <rect x="0" y="0" width="320" height="40" fill="#3b6ea5" rx="10"/>
    <rect x="0" y="30" width="320" height="10" fill="#3b6ea5"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="white">Team A · Auth</text>
    <!-- location pin -->
    <g transform="translate(20,58)"><path d="M 8 0 C 3 0 -1 4 -1 9 C -1 16 8 24 8 24 C 8 24 17 16 17 9 C 17 4 13 0 8 0 Z" fill="#3b6ea5"/><circle cx="8" cy="9" r="3.5" fill="#fff"/></g>
    <text x="44" y="74" font-size="10.5" fill="#33526a" font-style="italic">sits in location 1</text>
    <!-- person cohort -->
    <g transform="translate(40,100)" fill="#3b6ea5">
      <circle cx="0" cy="0" r="8"/><rect x="-9" y="10" width="18" height="20" rx="6"/>
      <circle cx="28" cy="0" r="8"/><rect x="19" y="10" width="18" height="20" rx="6"/>
      <circle cx="56" cy="0" r="8"/><rect x="47" y="10" width="18" height="20" rx="6"/>
    </g>
    <text x="160" y="108" font-size="10" fill="#555">human cohort</text>
    <line x1="16" y1="148" x2="304" y2="148" stroke="#dde6ee"/>
    <text x="160" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">owns one component (its Compass)</text>
    <text x="160" y="188" text-anchor="middle" font-size="10.5" fill="#444">bound to the one Charter</text>
    <text x="160" y="202" text-anchor="middle" font-size="10" fill="#3a7a3a" font-style="italic">commits its segment under the Charter</text>
  </g>

  <!-- ===== Team B · Billing ===== -->
  <g transform="translate(400,648)">
    <rect width="320" height="208" fill="#ffffff" stroke="#7a5b9c" stroke-width="2.5" rx="10"/>
    <rect x="0" y="0" width="320" height="40" fill="#7a5b9c" rx="10"/>
    <rect x="0" y="30" width="320" height="10" fill="#7a5b9c"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="white">Team B · Billing</text>
    <g transform="translate(20,58)"><path d="M 8 0 C 3 0 -1 4 -1 9 C -1 16 8 24 8 24 C 8 24 17 16 17 9 C 17 4 13 0 8 0 Z" fill="#7a5b9c"/><circle cx="8" cy="9" r="3.5" fill="#fff"/></g>
    <text x="44" y="74" font-size="10.5" fill="#5a3a7a" font-style="italic">sits in location 2</text>
    <g transform="translate(40,100)" fill="#7a5b9c">
      <circle cx="0" cy="0" r="8"/><rect x="-9" y="10" width="18" height="20" rx="6"/>
      <circle cx="28" cy="0" r="8"/><rect x="19" y="10" width="18" height="20" rx="6"/>
      <circle cx="56" cy="0" r="8"/><rect x="47" y="10" width="18" height="20" rx="6"/>
    </g>
    <text x="160" y="108" font-size="10" fill="#555">human cohort</text>
    <line x1="16" y1="148" x2="304" y2="148" stroke="#e8e0f0"/>
    <text x="160" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#5a3a7a">owns one component (its Compass)</text>
    <text x="160" y="188" text-anchor="middle" font-size="10.5" fill="#444">bound to the one Charter</text>
    <text x="160" y="202" text-anchor="middle" font-size="10" fill="#3a7a3a" font-style="italic">commits its segment under the Charter</text>
  </g>

  <!-- ===== Team C · Reporting ===== -->
  <g transform="translate(740,648)">
    <rect width="320" height="208" fill="#ffffff" stroke="#4a8a4a" stroke-width="2.5" rx="10"/>
    <rect x="0" y="0" width="320" height="40" fill="#4a8a4a" rx="10"/>
    <rect x="0" y="30" width="320" height="10" fill="#4a8a4a"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="white">Team C · Reporting</text>
    <g transform="translate(20,58)"><path d="M 8 0 C 3 0 -1 4 -1 9 C -1 16 8 24 8 24 C 8 24 17 16 17 9 C 17 4 13 0 8 0 Z" fill="#4a8a4a"/><circle cx="8" cy="9" r="3.5" fill="#fff"/></g>
    <text x="44" y="74" font-size="10.5" fill="#2a5a2a" font-style="italic">sits in location 3</text>
    <g transform="translate(40,100)" fill="#4a8a4a">
      <circle cx="0" cy="0" r="8"/><rect x="-9" y="10" width="18" height="20" rx="6"/>
      <circle cx="28" cy="0" r="8"/><rect x="19" y="10" width="18" height="20" rx="6"/>
      <circle cx="56" cy="0" r="8"/><rect x="47" y="10" width="18" height="20" rx="6"/>
    </g>
    <text x="160" y="108" font-size="10" fill="#555">human cohort</text>
    <line x1="16" y1="148" x2="304" y2="148" stroke="#d8e8d8"/>
    <text x="160" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">owns one component (its Compass)</text>
    <text x="160" y="188" text-anchor="middle" font-size="10.5" fill="#444">bound to the one Charter</text>
    <text x="160" y="202" text-anchor="middle" font-size="10" fill="#3a7a3a" font-style="italic">commits its segment under the Charter</text>
  </g>

  <!-- ===== Team D · Ops (DECOUPLED, Day-2) ===== -->
  <g transform="translate(1150,624)">
    <rect width="320" height="208" fill="#f5f5f5" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="6 4" rx="10"/>
    <rect x="0" y="0" width="320" height="40" fill="#8a8a8a" rx="10"/>
    <rect x="0" y="30" width="320" height="10" fill="#8a8a8a"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="white">Team D · Ops</text>
    <g transform="translate(20,58)"><path d="M 8 0 C 3 0 -1 4 -1 9 C -1 16 8 24 8 24 C 8 24 17 16 17 9 C 17 4 13 0 8 0 Z" fill="#8a8a8a"/><circle cx="8" cy="9" r="3.5" fill="#fff"/></g>
    <text x="44" y="74" font-size="10.5" fill="#5a5a5a" font-style="italic">sits in location 4 · Day-2</text>
    <g transform="translate(40,100)" fill="#8a8a8a">
      <circle cx="0" cy="0" r="8"/><rect x="-9" y="10" width="18" height="20" rx="6"/>
      <circle cx="28" cy="0" r="8"/><rect x="19" y="10" width="18" height="20" rx="6"/>
      <circle cx="56" cy="0" r="8"/><rect x="47" y="10" width="18" height="20" rx="6"/>
    </g>
    <text x="160" y="108" font-size="10" fill="#666">human cohort</text>
    <line x1="16" y1="148" x2="304" y2="148" stroke="#dddddd"/>
    <text x="160" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#5a5a5a">DECOUPLED axis — read-only on Charter</text>
    <text x="160" y="188" text-anchor="middle" font-size="10.5" fill="#555">inherits, observes · does not write the Charter</text>
    <text x="160" y="202" text-anchor="middle" font-size="10" fill="#777" font-style="italic">plug-and-play, joins on Day 2</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM MESSAGE CALLOUT BAR -->
  <!-- ============================================================ -->
  <g transform="translate(80,888)">
    <rect width="1440" height="56" fill="#f0ede4" stroke="#a89968" stroke-width="1.5" rx="8"/>
    <text x="720" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#5a4d20">Federate PHYSICALLY (distributed teams), not just logically.</text>
    <text x="720" y="44" text-anchor="middle" font-size="11.5" fill="#7a6a30" font-style="italic">One Charter at the top → each team inherits it wherever it sits → Git binds them all into one coherent federation, zero drift.</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <text x="800" y="978" text-anchor="middle" font-size="9" fill="#999">CompassAlpha · Physical Federation · the reference framework for GitAI · v0.1 DRAFT · A <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank"><tspan fill="#7a8aa0" text-decoration="underline">gradus.pk</tspan></a> project (brand credit only)</text>

</svg>
