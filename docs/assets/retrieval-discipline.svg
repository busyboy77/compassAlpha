<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 960" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="960" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Retrieval Discipline</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Retrieval narrows where to look &#8212; it never decides what is true. The index is a finding-aid, not a source of truth.</text>

  <!-- vertical divider -->
  <line x1="750" y1="124" x2="750" y2="812" stroke="#cfcabc" stroke-width="2" stroke-dasharray="3 5"/>

  <!-- =================================================================== -->
  <!-- ============ LEFT PANEL · DISCIPLINED RETRIEVAL ================== -->
  <!-- =================================================================== -->
  <rect x="44" y="124" width="660" height="58" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <polyline points="82,154 94,166 118,140" fill="none" stroke="#2a5a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="396" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#2a5a2a">FINDING-AID &#8212; partitioned &#183; as-of &#183; grounded</text>
  <text x="396" y="172" text-anchor="middle" font-size="12.5" fill="#3a6a3a" font-style="italic">pull the minimal-sufficient slice, then verify against substrate</text>

  <!-- WHERE: tier with its OWN partitioned index -->
  <rect x="80" y="212" width="200" height="86" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="180" y="242" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Receiver tier</text>
  <text x="180" y="263" text-anchor="middle" font-size="11" fill="#5a7aa0" font-style="italic">needs one slice to decide</text>
  <text x="180" y="284" text-anchor="middle" font-size="10.5" fill="#5a7aa0">queries its OWN index</text>

  <!-- own partitioned index -->
  <rect x="372" y="212" width="288" height="86" rx="10" fill="#eef6ee" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="516" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5a2a">own partitioned index</text>
  <text x="516" y="258" text-anchor="middle" font-size="10.5" fill="#3a6a3a">own folder &#183; received inboxes</text>
  <text x="516" y="274" text-anchor="middle" font-size="10.5" fill="#3a6a3a">owned substrate &#183; own memories</text>
  <text x="516" y="290" text-anchor="middle" font-size="10" fill="#7a8a6a" font-style="italic">inherits the firewall boundary</text>

  <!-- HOW: query arrow -->
  <line x1="280" y1="255" x2="372" y2="255" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#agreen)"/>
  <text x="326" y="246" text-anchor="middle" font-size="10" fill="#2a5a2a" font-weight="600">query</text>

  <!-- as-of pointer hit -->
  <rect x="372" y="328" width="288" height="64" rx="9" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="516" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">hit = pointer, not answer</text>
  <text x="516" y="372" text-anchor="middle" font-size="11" fill="#3a6a3a" font-family="JetBrains Mono, monospace">file @ tag &#167; chunk</text>
  <text x="516" y="387" text-anchor="middle" font-size="10" fill="#7a8a6a" font-style="italic">stamped &#8220;as of &lt;commit&gt;&#8221;</text>
  <line x1="516" y1="298" x2="516" y2="328" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>

  <!-- frozen blob in git -->
  <path d="M398,430 h150 l28,28 v92 h-178 z" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.8"/>
  <path d="M548,430 v28 h28 z" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="487" y="466" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">frozen blob</text>
  <text x="487" y="486" text-anchor="middle" font-size="10.5" fill="#3a6a3a">git @ tag &#8212; the</text>
  <text x="487" y="501" text-anchor="middle" font-size="10.5" fill="#3a6a3a">authoritative source</text>
  <text x="487" y="516" text-anchor="middle" font-size="10" fill="#7a8a6a" font-style="italic">re-read before cite</text>
  <!-- re-verify arrow pointer->blob -->
  <line x1="516" y1="392" x2="500" y2="430" stroke="#4a8a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#agreen)"/>
  <text x="610" y="416" text-anchor="middle" font-size="10" fill="#2a5a2a" font-weight="600">re-verify</text>

  <!-- WHY: light context meter -->
  <rect x="80" y="430" width="260" height="92" rx="10" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="210" y="456" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">receiver context</text>
  <rect x="104" y="470" width="212" height="20" rx="6" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.2"/>
  <rect x="106" y="472" width="52" height="16" rx="5" fill="#4a8a4a"/>
  <text x="210" y="508" text-anchor="middle" font-size="10.5" fill="#3a6a3a">light &#8212; only the slice loaded</text>

  <!-- left summary chip -->
  <rect x="120" y="566" width="468" height="46" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="354" y="586" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">low pollution &#183; current &#183; grounded cite</text>
  <text x="354" y="604" text-anchor="middle" font-size="11" fill="#3a6a3a" font-style="italic">firewall + staleness + provenance all upheld</text>

  <!-- =================================================================== -->
  <!-- ============ RIGHT PANEL · THE BACK-DOOR ========================= -->
  <!-- =================================================================== -->
  <rect x="796" y="124" width="660" height="58" rx="11" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <path d="M824,166 L838,138 L852,166 z" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.4" stroke-linejoin="round"/>
  <rect x="836" y="149" width="4" height="9" rx="1.5" fill="#8a2a2a"/>
  <circle cx="838" cy="162" r="2.2" fill="#8a2a2a"/>
  <text x="1140" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#8a2a2a">THE BACK-DOOR &#8212; global &#183; stale &#183; ungrounded</text>
  <text x="1140" y="172" text-anchor="middle" font-size="12.5" fill="#9a3a3a" font-style="italic">one global index, queried freely, chunk pasted as truth</text>

  <!-- tier querying a GLOBAL index -->
  <rect x="832" y="212" width="200" height="86" rx="10" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="932" y="242" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Receiver tier</text>
  <text x="932" y="263" text-anchor="middle" font-size="11" fill="#9a3a3a" font-style="italic">queries the global index</text>
  <text x="932" y="284" text-anchor="middle" font-size="10.5" fill="#9a3a3a">reads what it doesn't own</text>

  <!-- global index spanning all tiers -->
  <rect x="1124" y="212" width="288" height="86" rx="10" fill="#fde0e0" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1268" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#8a2a2a">one global index</text>
  <text x="1268" y="256" text-anchor="middle" font-size="10.5" fill="#9a3a3a">Mentor-1 + Mentor-2 + Doer folders</text>
  <text x="1268" y="272" text-anchor="middle" font-size="10.5" fill="#9a3a3a">all tiers' detail, one pool</text>
  <text x="1268" y="289" text-anchor="middle" font-size="10" fill="#b06a6a" font-style="italic">crosses the firewall by index</text>

  <!-- query arrow crossing the firewall -->
  <line x1="1032" y1="255" x2="1124" y2="255" stroke="#c44a4a" stroke-width="2.2" marker-end="url(#ared)"/>
  <text x="1078" y="246" text-anchor="middle" font-size="10" fill="#8a2a2a" font-weight="600">query</text>
  <!-- firewall line being crossed -->
  <line x1="1078" y1="206" x2="1078" y2="306" stroke="#8a2a2a" stroke-width="1.4" stroke-dasharray="3 4"/>
  <text x="1078" y="320" text-anchor="middle" font-size="9.5" fill="#8a2a2a" font-style="italic">firewall</text>

  <!-- stale chunk treated as answer -->
  <rect x="1124" y="328" width="288" height="64" rx="9" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1268" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">chunk pasted as the answer</text>
  <text x="1268" y="372" text-anchor="middle" font-size="11" fill="#9a3a3a">stale &#183; no &#8220;as of&#8221; &#183; no re-read</text>
  <text x="1268" y="387" text-anchor="middle" font-size="10" fill="#b06a6a" font-style="italic">snapshot rotted, cited as live</text>
  <line x1="1268" y1="298" x2="1268" y2="328" stroke="#c44a4a" stroke-width="2" marker-end="url(#ared)"/>

  <!-- substrate ignored -->
  <path d="M1150,430 h150 l28,28 v92 h-178 z" fill="#ffffff" stroke="#c44a4a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M1300,430 v28 h28 z" fill="#fde0e0" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="1239" y="470" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a3a3a">frozen blob</text>
  <text x="1239" y="492" text-anchor="middle" font-size="10.5" fill="#9a3a3a">never opened</text>
  <text x="1239" y="508" text-anchor="middle" font-size="10" fill="#b06a6a" font-style="italic">provenance skipped</text>

  <!-- WHY: flooded context meter -->
  <rect x="832" y="430" width="260" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.6"/>
  <text x="962" y="456" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">receiver context</text>
  <rect x="856" y="470" width="212" height="20" rx="6" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.2"/>
  <rect x="858" y="472" width="208" height="16" rx="5" fill="#c44a4a"/>
  <text x="962" y="508" text-anchor="middle" font-size="10.5" fill="#9a3a3a">flooded &#8212; cross-tier detail pulled in</text>

  <!-- right summary chip -->
  <rect x="912" y="566" width="468" height="46" rx="8" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="1146" y="586" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a2a2a">pollution &#183; stale &#183; ungrounded cite</text>
  <text x="1146" y="604" text-anchor="middle" font-size="11" fill="#9a3a3a" font-style="italic">firewall + staleness + provenance all breached</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="44" y="648" width="1412" height="92" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="678" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Three constraints turn a back-door into a finding-aid</text>
  <text x="750" y="702" text-anchor="middle" font-size="12.5" fill="#5a4d20"><tspan font-weight="700">Partition</tspan> (index inherits the firewall) &#183; <tspan font-weight="700">as-of + re-verify</tspan> (the index is a snapshot; re-read the frozen blob) &#183; <tspan font-weight="700">pointer, not truth</tspan> (a rebuildable cache, never a source of record).</text>
  <text x="750" y="723" text-anchor="middle" font-size="12.5" fill="#6a5a28" font-style="italic">Retrieval is the mechanization of pull-on-demand &#8212; it narrows where to look; provenance still governs what you cite.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="900" width="6" height="8" rx="1"/><rect x="699" y="894" width="6" height="14" rx="1"/><rect x="708" y="888" width="6" height="20" rx="1"/></g>
    <text x="722" y="908" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
