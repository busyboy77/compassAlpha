<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 940" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>

  <rect width="1500" height="940" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Bounded Disaster Implication</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Whatever the disaster, the loss is bounded to the unflushed sliver &#8212; on every persisted plane</text>

  <!-- ============ UNCLEAN EVENT CHIP ============ -->
  <rect x="56" y="124" width="344" height="56" rx="11" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <path d="M96,138 L82,165 L98,165 L86,190 L120,156 L102,156 L116,138 Z" fill="#f2c200" stroke="#8a2a2a" stroke-width="1.6" stroke-linejoin="round"/>
  <text x="250" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#8a2a2a">UNCLEAN EVENT</text>
  <text x="250" y="168" text-anchor="middle" font-size="11.5" fill="#9a3a3a">power-loss &#183; hard-kill &#183; host crash &#183; disk fault</text>

  <!-- ============ TWO PLANES ============ -->
  <!-- lightning strike (behind the bars; bars paint over the lower segments) -->
  <path d="M806,150 L778,250 L812,250 L786,360 L854,250 L820,250 L846,150 Z" fill="#f2c200" stroke="#c44a4a" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- plane A: work substrate -->
  <text x="60" y="262" font-size="13.5" font-weight="700" fill="#33445a">Work substrate</text>
  <text x="60" y="280" font-size="11" fill="#6a7585">the codebase repo</text>
  <rect x="232" y="236" width="618" height="86" rx="9" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.4"/>
  <rect x="234" y="238" width="520" height="82" rx="8" fill="#e0f0e0"/>
  <text x="494" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5a2a">pushed to origin</text>
  <text x="494" y="296" text-anchor="middle" font-size="11.5" fill="#3a6a3a">intact &#183; recoverable</text>
  <rect x="760" y="238" width="88" height="82" rx="8" fill="#fef0c8"/>
  <text x="804" y="272" text-anchor="middle" font-size="10.5" fill="#8a6d0a">in-flight</text>
  <text x="804" y="288" text-anchor="middle" font-size="10.5" fill="#8a6d0a">unflushed</text>

  <!-- plane B: control-plane -->
  <text x="60" y="382" font-size="13.5" font-weight="700" fill="#33445a">Control-plane</text>
  <text x="60" y="400" font-size="11" fill="#6a7585">LEDGER &#183; bus &#183; reviewer-state</text>
  <rect x="232" y="356" width="618" height="86" rx="9" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.4"/>
  <rect x="234" y="358" width="520" height="82" rx="8" fill="#e0f0e0"/>
  <text x="494" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5a2a">pushed to origin</text>
  <text x="494" y="416" text-anchor="middle" font-size="11.5" fill="#3a6a3a">intact &#183; recoverable</text>
  <rect x="760" y="358" width="88" height="82" rx="8" fill="#fef0c8"/>
  <text x="804" y="392" text-anchor="middle" font-size="10.5" fill="#8a6d0a">in-flight</text>
  <text x="804" y="408" text-anchor="middle" font-size="10.5" fill="#8a6d0a">unflushed</text>

  <!-- unflushed callout -->
  <rect x="872" y="300" width="232" height="78" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="988" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a6d0a">the only loss surface</text>
  <text x="988" y="346" text-anchor="middle" font-size="11" fill="#9a7a1a">just the in-flight turn,</text>
  <text x="988" y="362" text-anchor="middle" font-size="11" fill="#9a7a1a">if flush=push was honored</text>
  <line x1="872" y1="328" x2="850" y2="300" stroke="#b89425" stroke-width="1.6" marker-end="url(#aamber)"/>

  <!-- ORIGIN backstop cylinder -->
  <rect x="1158" y="246" width="232" height="150" fill="#dfeaf5"/>
  <line x1="1158" y1="246" x2="1158" y2="396" stroke="#3b6ea5" stroke-width="2"/>
  <line x1="1390" y1="246" x2="1390" y2="396" stroke="#3b6ea5" stroke-width="2"/>
  <ellipse cx="1274" cy="396" rx="116" ry="28" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2"/>
  <ellipse cx="1274" cy="246" rx="116" ry="28" fill="#eaf2fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="1274" y="244" text-anchor="middle" font-size="15" font-weight="700" fill="#1a4a7a">ORIGIN</text>
  <text x="1274" y="296" text-anchor="middle" font-size="12" fill="#1a4a7a">state of record</text>
  <text x="1274" y="320" text-anchor="middle" font-size="11" fill="#33597f">every pushed commit</text>
  <text x="1274" y="340" text-anchor="middle" font-size="11" fill="#33597f">both planes &#183; the backstop</text>

  <!-- push arrows from green segments to origin -->
  <path d="M754,262 C980,236 1010,300 1150,300" fill="none" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <path d="M754,396 C980,420 1010,352 1150,344" fill="none" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <text x="978" y="244" text-anchor="middle" font-size="11" fill="#2a5a2a" font-weight="600">flush = push = durable</text>

  <!-- ============ RECOVERY PIPELINE ============ -->
  <text x="60" y="498" font-size="16" font-weight="700" fill="#1f2a36">After any unclean event &#8212; the dual-plane reconciliation</text>
  <text x="60" y="520" font-size="12.5" fill="#5a6678" font-style="italic">run in full, read-only, before any tier boots</text>

  <!-- step 1 FREEZE -->
  <rect x="56" y="540" width="312" height="150" rx="12" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.8"/>
  <rect x="56" y="540" width="312" height="34" rx="12" fill="#3b6ea5"/>
  <rect x="56" y="558" width="312" height="16" fill="#3b6ea5"/>
  <text x="212" y="563" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1 &#183; FREEZE</text>
  <text x="212" y="602" text-anchor="middle" font-size="11.5" fill="#26425f">no tier boots</text>
  <text x="212" y="624" text-anchor="middle" font-size="11.5" fill="#26425f">no gc &#183; no prune</text>
  <text x="212" y="646" text-anchor="middle" font-size="11.5" fill="#26425f">back up .git on each plane</text>
  <text x="212" y="668" text-anchor="middle" font-size="11.5" fill="#26425f">copy out uncommitted files</text>

  <!-- step 2 RECON x2 (highlighted) -->
  <rect x="404" y="540" width="312" height="150" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2.4"/>
  <rect x="404" y="540" width="312" height="34" rx="12" fill="#b89425"/>
  <rect x="404" y="558" width="312" height="16" fill="#b89425"/>
  <text x="560" y="563" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2 &#183; RECON &#215;2 PLANES</text>
  <text x="560" y="600" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6d0a">EVERY persisted plane &#8212; either can be hit</text>
  <text x="560" y="624" text-anchor="middle" font-size="11.5" fill="#7a5e12">fsck &#183; empty-objects</text>
  <text x="560" y="646" text-anchor="middle" font-size="11.5" fill="#7a5e12">ahead/behind &#183; refs &#183; index</text>
  <text x="560" y="668" text-anchor="middle" font-size="11.5" fill="#7a5e12">leaked-secret sweep</text>

  <!-- step 3 REPAIR -->
  <rect x="752" y="540" width="312" height="150" rx="12" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.8"/>
  <rect x="752" y="540" width="312" height="34" rx="12" fill="#3b6ea5"/>
  <rect x="752" y="558" width="312" height="16" fill="#3b6ea5"/>
  <text x="908" y="563" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3 &#183; REPAIR IN-BOUND</text>
  <text x="908" y="602" text-anchor="middle" font-size="11.5" fill="#26425f">refill objects from origin</text>
  <text x="908" y="624" text-anchor="middle" font-size="11.5" fill="#26425f">push unflushed to rescue/ refs</text>
  <text x="908" y="646" text-anchor="middle" font-size="11.5" fill="#26425f">rebuild broken ref + index</text>
  <text x="908" y="668" text-anchor="middle" font-size="11.5" fill="#26425f">repair-in-place &#8805; fresh-clone</text>

  <!-- step 4 RESUME -->
  <rect x="1100" y="540" width="312" height="150" rx="12" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <rect x="1100" y="540" width="312" height="34" rx="12" fill="#4a8a4a"/>
  <rect x="1100" y="558" width="312" height="16" fill="#4a8a4a"/>
  <text x="1256" y="563" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4 &#183; RESUME</text>
  <text x="1256" y="606" text-anchor="middle" font-size="11.5" fill="#2a5a2a">boot at the seam the</text>
  <text x="1256" y="626" text-anchor="middle" font-size="11.5" fill="#2a5a2a">LEDGER dictates</text>
  <text x="1256" y="656" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">loss &#8804; the unflushed sliver</text>

  <!-- pipeline arrows -->
  <line x1="368" y1="615" x2="404" y2="615" stroke="#5a6678" stroke-width="2.6" marker-end="url(#ablue)"/>
  <line x1="716" y1="615" x2="752" y2="615" stroke="#5a6678" stroke-width="2.6" marker-end="url(#ablue)"/>
  <line x1="1064" y1="615" x2="1100" y2="615" stroke="#5a6678" stroke-width="2.6" marker-end="url(#agreen)"/>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="724" width="1356" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="734" y="747" text-anchor="middle" font-size="13.5" fill="#5a4d20">Disaster implication on the substrate is minimized by design: flush-before-disclose bounds the loss;</text>
  <text x="734" y="766" text-anchor="middle" font-size="13.5" fill="#5a4d20">dual-plane reconciliation verifies the bound held and repairs within it. Origin is the durability backstop.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="884" width="6" height="8" rx="1"/><rect x="699" y="878" width="6" height="14" rx="1"/><rect x="708" y="872" width="6" height="20" rx="1"/></g>
    <text x="722" y="892" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
