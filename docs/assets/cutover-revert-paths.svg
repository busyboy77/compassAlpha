<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 1020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="1020" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Cutover &#8212; Every Step Is Revertible</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">No big bang: CompassAlpha runs alongside the legacy workflow; the parallel-track boundary shifts one step at a time</text>

  <!-- ============ COLUMN HEADERS ============ -->
  <text x="120" y="136" font-size="13" font-weight="700" fill="#33445a">STEP</text>
  <text x="420" y="136" font-size="13" font-weight="700" fill="#2a5a2a">FORWARD ACTION</text>
  <rect x="826" y="120" width="242" height="24" rx="6" fill="#fdf3f3"/>
  <text x="947" y="137" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a2a2a">REVERT PATH &#8212; the undo move</text>
  <rect x="1086" y="120" width="356" height="24" rx="6" fill="#eef4fa"/>
  <text x="1264" y="137" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">PARALLEL-TRACK BOUNDARY (legacy &#183; managed)</text>

  <!-- ===================== STEP ROWS ===================== -->
  <!-- geometry: row y-top, height 96, gap 12 -->

  <!-- STEP 1 -->
  <rect x="56" y="152" width="62" height="92" rx="10" fill="#3b6ea5"/>
  <text x="87" y="206" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">1</text>
  <rect x="130" y="152" width="680" height="92" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="150" y="184" font-size="14" font-weight="700" fill="#1a4a7a">Stand up reviewer-state beside the existing substrate</text>
  <text x="150" y="206" font-size="11.5" fill="#5a7aa0">Existing repo becomes the substrate; add a sibling reviewer-state. CI + PR untouched.</text>
  <rect x="826" y="152" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="194" text-anchor="middle" font-size="11" fill="#9a3a3a">Delete reviewer-state;</text>
  <text x="947" y="212" text-anchor="middle" font-size="11" fill="#9a3a3a">substrate never changed</text>

  <!-- STEP 2 -->
  <rect x="56" y="256" width="62" height="92" rx="10" fill="#3b6ea5"/>
  <text x="87" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">2</text>
  <rect x="130" y="256" width="680" height="92" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="150" y="288" font-size="14" font-weight="700" fill="#1a4a7a">Inventory modules; pick the pilot</text>
  <text x="150" y="310" font-size="11.5" fill="#5a7aa0">Map dependencies + change rates. Auth chosen: well-bounded, widely depended-on.</text>
  <rect x="826" y="256" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="298" text-anchor="middle" font-size="11" fill="#9a3a3a">Nothing changed &#8212;</text>
  <text x="947" y="316" text-anchor="middle" font-size="11" fill="#9a3a3a">analysis only</text>

  <!-- STEP 3 -->
  <rect x="56" y="360" width="62" height="92" rx="10" fill="#b89425"/>
  <text x="87" y="414" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">3</text>
  <rect x="130" y="360" width="680" height="92" rx="10" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="150" y="392" font-size="14" font-weight="700" fill="#8a6d0a">Run the Discovery Doctrine Cycle on Auth</text>
  <text x="150" y="414" font-size="11.5" fill="#9a7a1a">SURVEY, DRAFT, CROSS-REFERENCE, REVIEW, FREEZE-AS-v0.1. Compass frozen + tagged.</text>
  <rect x="826" y="360" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="394" text-anchor="middle" font-size="11" fill="#9a3a3a">Discard the compass;</text>
  <text x="947" y="412" text-anchor="middle" font-size="11" fill="#9a3a3a">Auth code only read,</text>
  <text x="947" y="428" text-anchor="middle" font-size="11" fill="#9a3a3a">never modified</text>

  <!-- STEP 4 -->
  <rect x="56" y="464" width="62" height="92" rx="10" fill="#b89425"/>
  <text x="87" y="518" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">4</text>
  <rect x="130" y="464" width="680" height="92" rx="10" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="150" y="496" font-size="14" font-weight="700" fill="#8a6d0a">Author and LOCK Charter v0.1</text>
  <text x="150" y="518" font-size="11.5" fill="#9a7a1a">Minimal cross-cutting rules. LOCK is the precondition for the build axis to run.</text>
  <rect x="826" y="464" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="506" text-anchor="middle" font-size="11" fill="#9a3a3a">Unlock / discard;</text>
  <text x="947" y="524" text-anchor="middle" font-size="11" fill="#9a3a3a">no module forced to comply</text>

  <!-- STEP 5 -->
  <rect x="56" y="568" width="62" height="92" rx="10" fill="#4a8a4a"/>
  <text x="87" y="622" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">5</text>
  <rect x="130" y="568" width="680" height="92" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="150" y="600" font-size="14" font-weight="700" fill="#2a5a2a">Route Auth through CompassAlpha; Billing/Reporting stay legacy</text>
  <text x="150" y="622" font-size="11.5" fill="#3a6a3a">The parallel-track. Auth flows through the bus; cross-boundary calls recorded.</text>
  <rect x="826" y="568" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="610" text-anchor="middle" font-size="11" fill="#9a3a3a">Route Auth back to the old</text>
  <text x="947" y="628" text-anchor="middle" font-size="11" fill="#9a3a3a">PR flow; tags remain as history</text>

  <!-- STEP 6 -->
  <rect x="56" y="672" width="62" height="92" rx="10" fill="#4a8a4a"/>
  <text x="87" y="726" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">6</text>
  <rect x="130" y="672" width="680" height="92" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="150" y="704" font-size="14" font-weight="700" fill="#2a5a2a">Graduate Billing, then Reporting</text>
  <text x="150" y="726" font-size="11.5" fill="#3a6a3a">Repeat per module. Induct pre-existing debt into LEFTOVERS as PRE-EXISTING.</text>
  <rect x="826" y="672" width="242" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="947" y="714" text-anchor="middle" font-size="11" fill="#9a3a3a">Each graduation independent;</text>
  <text x="947" y="732" text-anchor="middle" font-size="11" fill="#9a3a3a">roll one module back alone</text>

  <!-- STEP 7 -->
  <rect x="56" y="776" width="62" height="92" rx="10" fill="#8a2a2a"/>
  <text x="87" y="830" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">7</text>
  <rect x="130" y="776" width="680" height="92" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.2"/>
  <text x="150" y="808" font-size="14" font-weight="700" fill="#8a2a2a">Retire the legacy workflow</text>
  <text x="150" y="830" font-size="11.5" fill="#9a3a3a">The ONE deliberately one-way step &#8212; taken last, after every module has proven itself.</text>
  <rect x="826" y="776" width="242" height="92" rx="10" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="947" y="800" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">The only one-way step</text>
  <text x="947" y="818" text-anchor="middle" font-size="10" fill="#9a3a3a">WHY: no parallel legacy track is left</text>
  <text x="947" y="831" text-anchor="middle" font-size="10" fill="#9a3a3a">to fall back to once it is gone.</text>
  <text x="947" y="850" text-anchor="middle" font-size="10" fill="#9a3a3a">Softened: &#8220;retire&#8221; = stop using, not</text>
  <text x="947" y="862" text-anchor="middle" font-size="10" fill="#9a3a3a">delete &#8212; old CI + PR history remain.</text>

  <!-- forward-flow arrows down the step column -->
  <line x1="36" y1="244" x2="36" y2="256" stroke="#5a6678" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="36" y1="348" x2="36" y2="360" stroke="#5a6678" stroke-width="2.4" marker-end="url(#aamber)"/>
  <line x1="36" y1="452" x2="36" y2="464" stroke="#5a6678" stroke-width="2.4" marker-end="url(#aamber)"/>
  <line x1="36" y1="556" x2="36" y2="568" stroke="#5a6678" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="36" y1="660" x2="36" y2="672" stroke="#5a6678" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="36" y1="764" x2="36" y2="776" stroke="#5a6678" stroke-width="2.4" marker-end="url(#ared)"/>

  <!-- HOW the revert works: a dashed undo arrow from the REVERT chip back to the FORWARD action it reverses -->
  <path d="M826,228 C816,238 820,238 810,238" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <path d="M826,332 C816,342 820,342 810,342" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <path d="M826,436 C816,446 820,446 810,446" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <path d="M826,540 C816,550 820,550 810,550" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <path d="M826,644 C816,654 820,654 810,654" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <path d="M826,748 C816,758 820,758 810,758" fill="none" stroke="#c44a4a" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <!-- step 7: the revert is BLOCKED — one-way. A barred return instead of an undo arrow -->
  <g stroke="#8a2a2a" stroke-width="2.4">
    <line x1="818" y1="846" x2="804" y2="860"/>
    <line x1="804" y1="846" x2="818" y2="860"/>
  </g>
  <text x="811" y="838" text-anchor="middle" font-size="9" font-weight="700" fill="#8a2a2a">no undo</text>

  <!-- ============ PARALLEL-TRACK BOUNDARY PANEL (right) ============ -->
  <rect x="1086" y="152" width="356" height="716" rx="12" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.6"/>

  <!-- legacy region (top, shrinking) and managed region (bottom, growing) -->
  <!-- step1: all legacy -->
  <rect x="1098" y="164" width="332" height="80" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1264" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#8a2a2a">Auth &#183; Billing &#183; Reporting</text>
  <text x="1264" y="216" text-anchor="middle" font-size="10.5" fill="#9a3a3a">all on the legacy PR workflow</text>
  <text x="1264" y="234" text-anchor="middle" font-size="10" fill="#9a3a3a" font-style="italic">managed: nothing yet</text>

  <!-- steps 3-4: still all legacy, doctrine forming -->
  <rect x="1098" y="372" width="332" height="56" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1264" y="396" text-anchor="middle" font-size="10.5" fill="#9a3a3a">all three still legacy;</text>
  <text x="1264" y="414" text-anchor="middle" font-size="10.5" fill="#9a3a3a">Auth doctrine + Charter forming</text>

  <!-- step5: boundary moves - Auth managed -->
  <rect x="1098" y="568" width="332" height="44" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1264" y="595" text-anchor="middle" font-size="10.5" fill="#9a3a3a">Billing &#183; Reporting &#8212; legacy</text>
  <rect x="1098" y="616" width="332" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="1264" y="641" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">Auth &#8212; CompassAlpha-managed</text>

  <!-- step6: boundary moves further -->
  <rect x="1098" y="672" width="332" height="34" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="1264" y="694" text-anchor="middle" font-size="10.5" fill="#9a3a3a">Reporting &#8212; legacy (last)</text>
  <rect x="1098" y="710" width="332" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="1264" y="735" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">Auth &#183; Billing &#8212; managed</text>

  <!-- step7: all managed -->
  <rect x="1098" y="776" width="332" height="80" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="1264" y="808" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">Auth &#183; Billing &#183; Reporting</text>
  <text x="1264" y="828" text-anchor="middle" font-size="10.5" fill="#3a6a3a">all CompassAlpha-managed</text>
  <text x="1264" y="846" text-anchor="middle" font-size="10" fill="#3a6a3a" font-style="italic">legacy workflow retired</text>

  <!-- moving boundary tick label (WHERE/WHEN): the legacy/managed line descends as modules graduate -->
  <text x="1110" y="510" font-size="10.5" font-weight="700" fill="#8a6d0a" font-style="italic" transform="rotate(-90 1110 510)">WHERE/WHEN &#8212; the legacy / managed boundary descends as modules graduate</text>

  <!-- the migrating boundary drawn as a descending dashed staircase between legacy (above) and managed (below) -->
  <path d="M1098,612 L1430,612 L1430,668 L1098,668 L1098,706 L1430,706"
        fill="none" stroke="#b89425" stroke-width="2.6" stroke-dasharray="7 4"/>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="888" width="1386" height="74" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="749" y="916" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Every step is additive or parallel &#8212; stop, observe, and roll back at any boundary without losing your existing process.</text>
  <text x="749" y="940" text-anchor="middle" font-size="13" fill="#5a4d20">CompassAlpha runs alongside the workflow until you&#8217;re confident; only Step 7 (retire) is one-way, and even then &#8220;retire&#8221; means stop using, not delete.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="982" width="6" height="8" rx="1"/><rect x="699" y="976" width="6" height="14" rx="1"/><rect x="708" y="970" width="6" height="20" rx="1"/></g>
    <text x="722" y="990" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
