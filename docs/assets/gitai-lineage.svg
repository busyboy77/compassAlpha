<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="700" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/></marker>
  </defs>

  <rect width="1500" height="700" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Where GitAI Comes From</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">A lineage: GitOps used git as the source of truth for operations; AIOps put AI into operations; GitAI does both for multi-agent AI work</text>

  <!-- GitOps -->
  <rect x="70" y="150" width="400" height="280" rx="12" fill="#eef2f6" stroke="#5a6a7a" stroke-width="2"/>
  <rect x="70" y="150" width="400" height="50" rx="12" fill="#e2e8ee"/><rect x="70" y="182" width="400" height="18" fill="#e2e8ee"/>
  <text x="270" y="182" text-anchor="middle" font-size="17" font-weight="700" fill="#2a3a4a">GitOps</text>
  <text x="430" y="178" text-anchor="end" font-size="11" fill="#5a6a7a">~2017</text>
  <text x="270" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#2a3a4a">git as the source of truth</text>
  <text x="270" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#2a3a4a">for operations</text>
  <text x="270" y="284" text-anchor="middle" font-size="11" fill="#3a4a5a">declare the desired infra state in git;</text>
  <text x="270" y="302" text-anchor="middle" font-size="11" fill="#3a4a5a">the system reconciles reality to match.</text>
  <text x="270" y="334" text-anchor="middle" font-size="11" fill="#3a4a5a">the commit is the deploy; the history</text>
  <text x="270" y="352" text-anchor="middle" font-size="11" fill="#3a4a5a">is the audit trail.</text>
  <rect x="100" y="378" width="340" height="34" rx="7" fill="#fff" stroke="#5a6a7a" stroke-width="1.2"/>
  <text x="270" y="400" text-anchor="middle" font-size="10.5" fill="#3a4a5a" font-style="italic">contributed: git as durable, audited state</text>

  <!-- AIOps -->
  <rect x="550" y="150" width="400" height="280" rx="12" fill="#eef2f6" stroke="#5a6a7a" stroke-width="2"/>
  <rect x="550" y="150" width="400" height="50" rx="12" fill="#e2e8ee"/><rect x="550" y="182" width="400" height="18" fill="#e2e8ee"/>
  <text x="750" y="182" text-anchor="middle" font-size="17" font-weight="700" fill="#2a3a4a">AIOps</text>
  <text x="910" y="178" text-anchor="end" font-size="11" fill="#5a6a7a">~2017</text>
  <text x="750" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#2a3a4a">AI applied to operations</text>
  <text x="750" y="284" text-anchor="middle" font-size="11" fill="#3a4a5a">use machine intelligence to detect,</text>
  <text x="750" y="302" text-anchor="middle" font-size="11" fill="#3a4a5a">diagnose, and act on operational signals</text>
  <text x="750" y="334" text-anchor="middle" font-size="11" fill="#3a4a5a">at a scale humans can't watch by hand.</text>
  <rect x="580" y="378" width="340" height="34" rx="7" fill="#fff" stroke="#5a6a7a" stroke-width="1.2"/>
  <text x="750" y="400" text-anchor="middle" font-size="10.5" fill="#3a4a5a" font-style="italic">contributed: AI as a first-class operator</text>

  <!-- GitAI -->
  <rect x="1030" y="150" width="400" height="280" rx="12" fill="#eef4f9" stroke="#3b6ea5" stroke-width="2.4"/>
  <rect x="1030" y="150" width="400" height="50" rx="12" fill="#dce8f4"/><rect x="1030" y="182" width="400" height="18" fill="#dce8f4"/>
  <text x="1230" y="182" text-anchor="middle" font-size="17" font-weight="700" fill="#1a4a7a">GitAI</text>
  <text x="1390" y="178" text-anchor="end" font-size="11" fill="#3b6ea5">2026 · CompassAlpha</text>
  <text x="1230" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">git as the coordination layer</text>
  <text x="1230" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">for multi-agent AI federations</text>
  <text x="1230" y="284" text-anchor="middle" font-size="11" fill="#26425f">AI tiers coordinate, persist, hand off, and</text>
  <text x="1230" y="302" text-anchor="middle" font-size="11" fill="#26425f">audit their work entirely through git —</text>
  <text x="1230" y="334" text-anchor="middle" font-size="11" fill="#26425f">no specialized databases, no chat-only state.</text>
  <rect x="1060" y="378" width="340" height="34" rx="7" fill="#cfe0f0" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="1230" y="400" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4a7a">the synthesis of both</text>

  <!-- arrows -->
  <line x1="470" y1="290" x2="548" y2="290" stroke="#5a6a7a" stroke-width="2.6" marker-end="url(#ad)"/>
  <line x1="950" y1="290" x2="1028" y2="290" stroke="#5a6a7a" stroke-width="2.6" marker-end="url(#ad)"/>

  <!-- CAPTION -->
  <rect x="70" y="470" width="1360" height="186" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.3"/>
  <text x="750" y="500" text-anchor="middle" font-size="14" font-weight="700" fill="#2a3a4a">State of the federation = state of git.</text>
  <text x="750" y="528" text-anchor="middle" font-size="12.5" fill="#3a4a5a"><tspan font-weight="700">Where it fits:</tspan> GitOps proved git could be the durable, audited source of truth for a running system; AIOps proved AI could be a first-class operator.</text>
  <text x="750" y="548" text-anchor="middle" font-size="12.5" fill="#3a4a5a">GitAI combines them — the operators are AI agents, and the layer that coordinates, durably stores, and audits everything they do is git.</text>
  <text x="750" y="578" text-anchor="middle" font-size="12.5" fill="#3a4a5a"><tspan font-weight="700">Why it matters:</tspan> it means a federation needs no bespoke coordination database — every handoff, decision, and deliverable is a commit, replayable and auditable.</text>
  <text x="750" y="606" text-anchor="middle" font-size="12.5" fill="#3a4a5a"><tspan font-weight="700">How CompassAlpha embodies it:</tspan> the bus is git, the memory is git, the audit trail is git — and the founder reads the federation's state by reading the repo.</text>
  <text x="750" y="634" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">GitAI is the category; CompassAlpha is its reference framework.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="670" width="6" height="6" rx="1"/><rect x="699" y="666" width="6" height="10" rx="1"/><rect x="708" y="662" width="6" height="14" rx="1"/></g>
    <text x="722" y="676" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
