<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="1500" height="720" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">The Three Enrichment Surfaces</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">A federation buys quality with rules, automation, and specialised AI roles — each compounds intelligence, and each costs upkeep</text>

  <!-- three surface cards -->
  <rect x="60" y="124" width="430" height="210" rx="12" fill="#f1f6f1" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="60" y="124" width="430" height="46" rx="12" fill="#e0f0e0"/><rect x="60" y="152" width="430" height="18" fill="#e0f0e0"/>
  <text x="275" y="154" text-anchor="middle" font-size="16" font-weight="700" fill="#2a5a2a">Invariants</text>
  <text x="275" y="196" text-anchor="middle" font-size="11.5" fill="#3a6a3a" font-style="italic">correctness rules enforced everywhere</text>
  <text x="275" y="226" text-anchor="middle" font-size="11" fill="#2a5a2a">domain truths + federation-contract</text>
  <text x="275" y="244" text-anchor="middle" font-size="11" fill="#2a5a2a">rules in the Charter</text>
  <text x="275" y="274" text-anchor="middle" font-size="10.5" fill="#3a6a3a">each is a gate, checked wherever it applies</text>
  <text x="275" y="292" text-anchor="middle" font-size="10.5" fill="#3a6a3a">(authoring · review · audit)</text>
  <text x="275" y="320" text-anchor="middle" font-size="10" fill="#5a8a5a" font-style="italic">+ quality floor · + rules to maintain</text>

  <rect x="535" y="124" width="430" height="210" rx="12" fill="#eef4f9" stroke="#3b6ea5" stroke-width="2"/>
  <rect x="535" y="124" width="430" height="46" rx="12" fill="#dce8f4"/><rect x="535" y="152" width="430" height="18" fill="#dce8f4"/>
  <text x="750" y="154" text-anchor="middle" font-size="16" font-weight="700" fill="#1a4a7a">Toolings</text>
  <text x="750" y="196" text-anchor="middle" font-size="11.5" fill="#3b6ea5" font-style="italic">automation the tiers wield</text>
  <text x="750" y="226" text-anchor="middle" font-size="11" fill="#26425f">audits · validators · dashboards</text>
  <text x="750" y="256" text-anchor="middle" font-size="10.5" fill="#26425f">more leverage per tier — catch more,</text>
  <text x="750" y="274" text-anchor="middle" font-size="10.5" fill="#26425f">faster, with less manual effort</text>
  <text x="750" y="320" text-anchor="middle" font-size="10" fill="#5a7aa0" font-style="italic">+ leverage · + automation to maintain</text>

  <rect x="1010" y="124" width="430" height="210" rx="12" fill="#fbf3e2" stroke="#c79a3a" stroke-width="2"/>
  <rect x="1010" y="124" width="430" height="46" rx="12" fill="#f4e6c6"/><rect x="1010" y="152" width="430" height="18" fill="#f4e6c6"/>
  <text x="1225" y="154" text-anchor="middle" font-size="16" font-weight="700" fill="#7a5a18">Specialised Agents</text>
  <text x="1225" y="196" text-anchor="middle" font-size="11.5" fill="#8a6a28" font-style="italic">AI roles tuned for a work type</text>
  <text x="1225" y="226" text-anchor="middle" font-size="11" fill="#7a5a18">a reviewer, a test-author, an auditor</text>
  <text x="1225" y="256" text-anchor="middle" font-size="10.5" fill="#7a5a18">higher IQ where it's aimed — depth on</text>
  <text x="1225" y="274" text-anchor="middle" font-size="10.5" fill="#7a5a18">the work that warrants it</text>
  <text x="1225" y="320" text-anchor="middle" font-size="10" fill="#a98c2a" font-style="italic">+ depth · + roles &amp; tokens to maintain</text>

  <!-- compounding curve -->
  <rect x="60" y="360" width="1380" height="210" rx="12" fill="#fff" stroke="#5a6a7a" stroke-width="1.4"/>
  <text x="84" y="386" font-size="12.5" font-weight="700" fill="#2a3a4a">they compound: intelligence ↑ with cost ↑</text>
  <!-- axes -->
  <line x1="180" y1="540" x2="1360" y2="540" stroke="#9aa3b0" stroke-width="1.6"/>
  <line x1="180" y1="540" x2="180" y2="410" stroke="#9aa3b0" stroke-width="1.6"/>
  <text x="770" y="562" text-anchor="middle" font-size="11" fill="#5a6a7a">cost / maintenance →</text>
  <text x="150" y="475" text-anchor="middle" font-size="11" fill="#5a6a7a" transform="rotate(-90 150 475)">intelligence floor →</text>
  <!-- compounding curve (accelerating) -->
  <path d="M180,532 C520,520 760,470 1000,430 C1140,408 1260,400 1340,416" fill="none" stroke="#3b6ea5" stroke-width="3"/>
  <!-- markers along curve -->
  <circle cx="320" cy="520" r="6" fill="#4a8a4a"/><text x="320" y="510" text-anchor="middle" font-size="9.5" fill="#2a5a2a">lean</text>
  <circle cx="700" cy="478" r="6" fill="#3b6ea5"/><text x="700" y="468" text-anchor="middle" font-size="9.5" fill="#1a4a7a">+ invariants + toolings</text>
  <circle cx="1000" cy="430" r="6" fill="#c79a3a"/><text x="1000" y="420" text-anchor="middle" font-size="9.5" fill="#7a5a18">+ specialised agents</text>
  <text x="1250" y="448" text-anchor="middle" font-size="9.5" fill="#9aa3b0" font-style="italic">diminishing returns at the top</text>

  <!-- CAPTION -->
  <rect x="60" y="586" width="1380" height="84" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.3"/>
  <text x="750" y="612" text-anchor="middle" font-size="12.5" fill="#3a4a5a"><tspan font-weight="700">Why:</tspan> the three are independent levers but compound — invest in all three for a high-intelligence, high-cost federation; in none for a lean, cheap, lower-floor one.</text>
  <text x="750" y="632" text-anchor="middle" font-size="12.5" fill="#3a4a5a"><tspan font-weight="700">How:</tspan> start lean and earn each addition — add an invariant, tooling, or agent only when a pattern has repeated about three times and the benefit is observable.</text>
  <text x="750" y="654" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">Where: every project, every cycle, decides how much of each to add — the customization surface that sets its quality-vs-cost posture.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="686" width="6" height="6" rx="1"/><rect x="699" y="682" width="6" height="10" rx="1"/><rect x="708" y="678" width="6" height="14" rx="1"/></g>
    <text x="722" y="692" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
