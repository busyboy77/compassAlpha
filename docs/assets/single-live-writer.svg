<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="700" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="700" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Single Live Writer · fetch before push</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">One writer holds jurisdiction over the state-of-record; anyone overlapping fetches the latest first, so nothing gets clobbered</text>

  <line x1="750" y1="118" x2="750" y2="556" stroke="#cfcabc" stroke-width="2" stroke-dasharray="3 5"/>

  <!-- WRONG: blind concurrent push -->
  <rect x="44" y="124" width="660" height="44" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <text x="374" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#8a2a2a">BLIND CONCURRENT PUSH — clobber</text>

  <rect x="80" y="196" width="240" height="64" rx="9" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.6"/><text x="200" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#8a2a2a">Writer A</text><text x="200" y="242" text-anchor="middle" font-size="10" fill="#9a3a3a">pushes return.md</text>
  <rect x="430" y="196" width="240" height="64" rx="9" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.6"/><text x="550" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#8a2a2a">Writer B</text><text x="550" y="242" text-anchor="middle" font-size="10" fill="#9a3a3a">pushes return.md (same path)</text>

  <rect x="220" y="320" width="280" height="58" rx="9" fill="#fff" stroke="#c44a4a" stroke-width="1.6"/>
  <text x="360" y="344" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">origin · return.md</text>
  <text x="360" y="362" text-anchor="middle" font-size="10" fill="#9a3a3a">holds only B — A's push is overwritten</text>
  <line x1="200" y1="260" x2="320" y2="318" stroke="#c44a4a" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="550" y1="260" x2="400" y2="318" stroke="#c44a4a" stroke-width="2" marker-end="url(#ar)"/>

  <path d="M120,430 L134,402 L148,430 z" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.4" stroke-linejoin="round"/><rect x="132" y="413" width="4" height="9" rx="1.5" fill="#8a2a2a"/><circle cx="134" cy="426" r="2.2" fill="#8a2a2a"/>
  <text x="374" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#8a2a2a">A's entire return evaporates</text>
  <text x="374" y="438" text-anchor="middle" font-size="10.5" fill="#9a3a3a">integration proceeds as if only B reported — state corrupts silently</text>

  <!-- SAFE: one live writer / fetch-before-push -->
  <rect x="796" y="124" width="660" height="44" rx="10" fill="#eef6ee" stroke="#4a8a4a" stroke-width="2"/>
  <text x="1126" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#2a5a2a">ONE LIVE WRITER · FETCH FIRST — safe</text>

  <rect x="836" y="196" width="240" height="64" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/><text x="956" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">jurisdiction-holder</text><text x="956" y="238" text-anchor="middle" font-size="10" fill="#3a5a7a">writes the state-of-record</text>
  <rect x="1176" y="196" width="240" height="64" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/><text x="1296" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">overlapping writer</text><text x="1296" y="232" text-anchor="middle" font-size="10" fill="#3a6a3a">1 · fetch latest</text><text x="1296" y="248" text-anchor="middle" font-size="10" fill="#3a6a3a">2 · rebase, then push</text>

  <rect x="976" y="320" width="280" height="58" rx="9" fill="#fff" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="1116" y="344" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">origin · return.md</text>
  <text x="1116" y="362" text-anchor="middle" font-size="10" fill="#3a6a3a">holds both — B builds on A, no overwrite</text>
  <line x1="956" y1="260" x2="1076" y2="318" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="1296" y1="260" x2="1156" y2="318" stroke="#4a8a4a" stroke-width="2" marker-end="url(#ag)"/>

  <polyline points="860,418 872,430 896,404" fill="none" stroke="#2a5a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1126" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">both returns preserved</text>
  <text x="1126" y="438" text-anchor="middle" font-size="10.5" fill="#3a6a3a">distinct paths or fetch-rebase-push — no write is ever lost</text>

  <!-- CAPTION -->
  <rect x="44" y="470" width="1412" height="186" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.3"/>
  <text x="750" y="500" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2a3a4a">Only one writer holds the pen at a time — everyone else reconciles with the latest before they write.</text>
  <text x="750" y="528" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Why:</tspan> when parallel doers or overlapping sessions push to the same path without coordinating, the second push silently clobbers the first — a whole return vanishes and integration corrupts without an error.</text>
  <text x="750" y="548" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">How:</tspan> the current jurisdiction-holder writes the state-of-record; any overlapping writer fetches the latest and rebases before pushing, and parallel doers write to distinct paths — never a shared filename.</text>
  <text x="750" y="576" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Where:</tspan> at every push to the reviewer-state repo. Git makes the storage safe; this discipline keeps the <tspan font-style="italic">semantics</tspan> safe.</text>
  <text x="750" y="604" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">This is strict and not relaxable — loosening it re-opens the clobber-on-push failure mode.</text>
  <text x="750" y="630" text-anchor="middle" font-size="11" fill="#5a6a7a">It also keeps a tier's context clean: you reconcile with the substrate, not by absorbing another writer's whole session.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="670" width="6" height="6" rx="1"/><rect x="699" y="666" width="6" height="10" rx="1"/><rect x="708" y="662" width="6" height="14" rx="1"/></g>
    <text x="722" y="676" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
