<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="800" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Incident Response Timeline</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">The fastest lane &#8212; one narrow, time-bounded relaxation of flush-before-disclose, closed out by the postmortem reflush</text>

  <!-- ============ RELAXED-WINDOW BAND (behind MITIGATE) ============ -->
  <rect x="510" y="150" width="240" height="430" rx="12" fill="#fdf6e3" stroke="#b89425" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="630" y="174" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a6d0a">RELAXED WINDOW</text>
  <text x="630" y="192" text-anchor="middle" font-size="10.5" fill="#9a7a1a" font-style="italic">the only exception to the persistence law</text>

  <!-- ============ WHY chip (top-left rationale) ============ -->
  <rect x="92" y="148" width="356" height="80" rx="10" fill="#fbeaea" stroke="#c44a4a" stroke-width="1.5"/>
  <text x="108" y="170" font-size="11.5" font-weight="700" fill="#8a2a2a">WHY a window at all &#8212; the pathology it prevents</text>
  <text x="108" y="189" font-size="10.5" fill="#7a3030">strict flush-first at 02:00 would trade live downtime for paperwork:</text>
  <text x="108" y="205" font-size="10.5" fill="#7a3030">seconds of outage cost more than the flush delay. The danger it</text>
  <text x="108" y="221" font-size="10.5" fill="#7a3030">guards against &#8212; a permanent audit hole &#8212; is closed at postmortem.</text>

  <!-- ============ TIMELINE SPINE + CLOCK (WHERE / WHEN) ============ -->
  <line x1="120" y1="300" x2="1400" y2="300" stroke="#9aa3b0" stroke-width="3"/>
  <text x="120" y="262" font-size="13" font-weight="700" fill="#33445a">02:00 &#8212; alert fires</text>
  <text x="1400" y="262" text-anchor="end" font-size="13" font-weight="700" fill="#33445a">postmortem &#8212; trail complete</text>
  <!-- live-response duration bracket: 02:01 -> 02:23 (22 min MTTR) -->
  <line x1="190" y1="246" x2="850" y2="246" stroke="#5a6678" stroke-width="1.6"/>
  <line x1="190" y1="242" x2="190" y2="250" stroke="#5a6678" stroke-width="1.6"/>
  <line x1="850" y1="242" x2="850" y2="250" stroke="#5a6678" stroke-width="1.6"/>
  <text x="520" y="240" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5a6678">live response &#8212; 22 min MTTR (the meter is running)</text>
  <!-- gap marker: postmortem is later, off the live clock -->
  <line x1="948" y1="246" x2="1110" y2="246" stroke="#4a8a4a" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="1029" y="240" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3a6a3a">later &#8212; off the live clock</text>

  <!-- ===== STAGE 1 · ALERT ===== -->
  <circle cx="190" cy="300" r="9" fill="#3b6ea5"/>
  <rect x="92" y="318" width="196" height="120" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <rect x="92" y="318" width="196" height="30" rx="11" fill="#3b6ea5"/>
  <rect x="92" y="334" width="196" height="14" fill="#3b6ea5"/>
  <text x="190" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1 &#183; ALERT</text>
  <text x="190" y="289" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">02:01</text>
  <text x="190" y="372" text-anchor="middle" font-size="11" fill="#26425f">monitor fires</text>
  <text x="190" y="390" text-anchor="middle" font-size="11" fill="#26425f">incident stub</text>
  <text x="190" y="408" text-anchor="middle" font-size="11" fill="#26425f">machine-written</text>
  <text x="190" y="427" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">persistence holds</text>

  <!-- ===== STAGE 2 · INVESTIGATE ===== -->
  <circle cx="410" cy="300" r="9" fill="#3b6ea5"/>
  <rect x="312" y="318" width="196" height="120" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <rect x="312" y="318" width="196" height="30" rx="11" fill="#3b6ea5"/>
  <rect x="312" y="334" width="196" height="14" fill="#3b6ea5"/>
  <text x="410" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2 &#183; INVESTIGATE</text>
  <text x="410" y="289" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">02:08</text>
  <text x="410" y="372" text-anchor="middle" font-size="11" fill="#26425f">on-call Doer</text>
  <text x="410" y="390" text-anchor="middle" font-size="11" fill="#26425f">triages logs fast</text>
  <text x="410" y="408" text-anchor="middle" font-size="11" fill="#26425f">finds renamed</text>
  <text x="410" y="426" text-anchor="middle" font-size="11" fill="#26425f">payload field</text>

  <!-- ===== STAGE 3 · MITIGATE (relaxed, amber) ===== -->
  <circle cx="630" cy="300" r="10" fill="#b89425"/>
  <rect x="532" y="318" width="196" height="120" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="2.4"/>
  <rect x="532" y="318" width="196" height="30" rx="11" fill="#b89425"/>
  <rect x="532" y="334" width="196" height="14" fill="#b89425"/>
  <text x="630" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3 &#183; MITIGATE</text>
  <text x="630" y="289" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a6d0a">02:15</text>
  <text x="630" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5e12">act first,</text>
  <text x="630" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5e12">flush in parallel</text>
  <text x="630" y="409" text-anchor="middle" font-size="11" fill="#8a6d0a">hotfix + redeploy</text>
  <text x="630" y="427" text-anchor="middle" font-size="11" fill="#8a6d0a">bleeding stopped</text>

  <!-- ===== STAGE 4 · RESOLVE ===== -->
  <circle cx="850" cy="300" r="9" fill="#3b6ea5"/>
  <rect x="752" y="318" width="196" height="120" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <rect x="752" y="318" width="196" height="30" rx="11" fill="#3b6ea5"/>
  <rect x="752" y="334" width="196" height="14" fill="#3b6ea5"/>
  <text x="850" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4 &#183; RESOLVE</text>
  <text x="850" y="289" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">02:23</text>
  <text x="850" y="372" text-anchor="middle" font-size="11" fill="#26425f">confirm recovery</text>
  <text x="850" y="390" text-anchor="middle" font-size="11" fill="#26425f">callbacks replayed</text>
  <text x="850" y="408" text-anchor="middle" font-size="11" fill="#26425f">subscriptions fixed</text>

  <!-- ===== STAGE 5 · POSTMORTEM ===== -->
  <circle cx="1110" cy="300" r="10" fill="#4a8a4a"/>
  <rect x="1000" y="318" width="220" height="120" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="1000" y="318" width="220" height="30" rx="11" fill="#4a8a4a"/>
  <rect x="1000" y="334" width="220" height="14" fill="#4a8a4a"/>
  <text x="1110" y="339" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5 &#183; POSTMORTEM</text>
  <text x="1110" y="289" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">after the fact</text>
  <text x="1110" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">REFLUSH everything</text>
  <text x="1110" y="390" text-anchor="middle" font-size="11" fill="#3a6a3a">full timeline to disk</text>
  <text x="1110" y="408" text-anchor="middle" font-size="11" fill="#3a6a3a">root cause + blast radius</text>
  <text x="1110" y="426" text-anchor="middle" font-size="11" fill="#3a6a3a">tag incident resolved</text>

  <!-- spine connecting arrows -->
  <line x1="288" y1="378" x2="312" y2="378" stroke="#5a6678" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="508" y1="378" x2="532" y2="378" stroke="#b89425" stroke-width="2.4" marker-end="url(#aamber)"/>
  <line x1="728" y1="378" x2="752" y2="378" stroke="#5a6678" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="948" y1="378" x2="1000" y2="378" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>

  <!-- ===== founder post-fact notification (from RESOLVE) ===== -->
  <rect x="752" y="478" width="196" height="68" rx="9" fill="#f4f6fa" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="850" y="502" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">founder notified</text>
  <text x="850" y="520" text-anchor="middle" font-size="11" fill="#3a5a7a">POST-FACT &#8212; informed,</text>
  <text x="850" y="536" text-anchor="middle" font-size="11" fill="#3a5a7a">not gating mid-incident</text>
  <line x1="850" y1="438" x2="850" y2="478" stroke="#3b6ea5" stroke-width="1.8" marker-end="url(#ablue)"/>

  <!-- ===== deferred-writes buffer (the mechanism: writes queue here, not lost) ===== -->
  <rect x="540" y="452" width="180" height="72" rx="9" fill="#fff6df" stroke="#b89425" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="630" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5e12">deferred-writes buffer</text>
  <text x="630" y="491" text-anchor="middle" font-size="10" fill="#8a6d0a">incident-ID on each commit;</text>
  <text x="630" y="507" text-anchor="middle" font-size="10" fill="#8a6d0a">full ceremony queued,</text>
  <text x="630" y="521" text-anchor="middle" font-size="10" fill="#8a6d0a">recoverable from git meanwhile</text>
  <!-- MITIGATE feeds the buffer -->
  <line x1="630" y1="438" x2="630" y2="452" stroke="#b89425" stroke-width="1.8" marker-end="url(#aamber)"/>

  <!-- ===== re-flush arrow: buffer drains into POSTMORTEM (the close mechanism) ===== -->
  <path d="M630,540 C630,628 1110,634 1110,468" fill="none" stroke="#4a8a4a" stroke-width="2.6" stroke-dasharray="7 5" marker-end="url(#agreen)"/>
  <rect x="772" y="606" width="320" height="48" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="932" y="626" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">REFLUSH &#8212; buffer drains to disk, hole closes</text>
  <text x="932" y="644" text-anchor="middle" font-size="10.5" fill="#3a6a3a">every deferred write lands; the audit trail is made complete</text>

  <!-- 'latency-deferred, never permanently off-disk' note on the window -->
  <text x="630" y="566" text-anchor="middle" font-size="10.5" fill="#8a6d0a" font-style="italic">latency-deferred, not lost</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="690" width="1388" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="713" text-anchor="middle" font-size="13.5" fill="#5a4d20">The persistence law is relaxed on exactly one side &#8212; the live MITIGATE window &#8212; because seconds of downtime cost more than the flush delay.</text>
  <text x="750" y="732" text-anchor="middle" font-size="13.5" fill="#5a4d20">Bounded in time, scope, and firewall; the founder is informed post-fact and the POSTMORTEM reflush makes the trail complete.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="764" width="6" height="8" rx="1"/><rect x="699" y="758" width="6" height="14" rx="1"/><rect x="708" y="752" width="6" height="20" rx="1"/></g>
    <text x="722" y="772" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
