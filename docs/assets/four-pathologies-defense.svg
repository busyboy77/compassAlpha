<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="880" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="880" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Four Pathologies &#183; Four Defenses</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Every recurring failure of ad-hoc multi-agent work is met by a named axiom carved to stop it</text>

  <!-- ============ COLUMN HEADERS ============ -->
  <rect x="56" y="124" width="476" height="44" rx="9" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <text x="294" y="152" text-anchor="middle" font-size="16" font-weight="700" fill="#8a2a2a">THE FAILURE &#8212; what rots the work</text>

  <rect x="552" y="124" width="316" height="44" rx="9" fill="#eef1f6" stroke="#3b6ea5" stroke-width="2"/>
  <text x="710" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#1a4a7a">THE MECHANISM &#8212; how the defense works</text>
  <text x="710" y="162" text-anchor="middle" font-size="10.5" fill="#5a7aa0" font-style="italic">the working dynamic, not a label</text>

  <rect x="888" y="124" width="556" height="44" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <text x="1166" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#2a5a2a">THE DEFENSE &#8212; the named rule that holds</text>
  <text x="1166" y="162" text-anchor="middle" font-size="10.5" fill="#3a6a3a" font-style="italic">and where it lives in the constitution</text>

  <!-- ============ ROW 1 · CONTEXT POLLUTION ============ -->
  <rect x="56" y="192" width="476" height="118" rx="11" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <circle cx="92" cy="222" r="15" fill="#c44a4a"/>
  <text x="92" y="227" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1</text>
  <text x="122" y="228" font-size="16" font-weight="700" fill="#8a2a2a">Context pollution</text>
  <text x="80" y="256" font-size="11.5" fill="#9a3a3a">A tier absorbs detail it doesn&#8217;t own &#8212; the &#8220;helpful mentor&#8221;</text>
  <text x="80" y="276" font-size="11.5" fill="#9a3a3a">opens the substrate, fills with diffs &amp; traces.</text>
  <text x="80" y="296" font-size="11.5" font-style="italic" fill="#9a3a3a">Judgement degrades; it can no longer orchestrate.</text>

  <!-- mechanism: spatial containment — a wall between mentor altitude and substrate -->
  <rect x="552" y="192" width="316" height="118" rx="11" fill="#f7f9fc" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="710" y="212" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">Spatial containment</text>
  <rect x="572" y="228" width="92" height="26" rx="6" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="618" y="245" text-anchor="middle" font-size="10" font-weight="700" fill="#26425f">mentor</text>
  <rect x="756" y="228" width="92" height="26" rx="6" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="802" y="245" text-anchor="middle" font-size="10" font-weight="700" fill="#8a2a2a">substrate</text>
  <line x1="710" y1="222" x2="710" y2="298" stroke="#4a8a4a" stroke-width="3.5"/>
  <text x="710" y="218" text-anchor="middle" font-size="8.5" fill="#2a5a2a">firewall</text>
  <line x1="664" y1="241" x2="700" y2="241" stroke="#c44a4a" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#ared)"/>
  <text x="710" y="276" text-anchor="middle" font-size="9.5" fill="#9a3a3a" font-style="italic">detail blocked at the wall</text>
  <text x="710" y="292" text-anchor="middle" font-size="9.5" fill="#3a6a3a">altitude stays clean &#8212; can still orchestrate</text>

  <rect x="888" y="192" width="556" height="118" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="908" y="220" font-size="15.5" font-weight="700" fill="#2a5a2a">Firewall &#43; hard-labour rule</text>
  <rect x="1300" y="204" width="128" height="22" rx="6" fill="#26425f"/>
  <text x="1364" y="219" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">AXIOM LAYER</text>
  <text x="908" y="246" font-size="11.5" fill="#3a6a3a">Each tier carries only its own granularity; mentors</text>
  <text x="908" y="266" font-size="11.5" fill="#3a6a3a">orchestrate and never touch substrate.</text>
  <text x="908" y="290" font-size="11.5" font-weight="600" fill="#2a5a2a">Lives in: firewall &#183; hard-labour axioms</text>

  <!-- ============ ROW 2 · HALLUCINATION DRIFT ============ -->
  <rect x="56" y="330" width="476" height="118" rx="11" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <circle cx="92" cy="360" r="15" fill="#c44a4a"/>
  <text x="92" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2</text>
  <text x="122" y="366" font-size="16" font-weight="700" fill="#8a2a2a">Hallucination drift</text>
  <text x="80" y="394" font-size="11.5" fill="#9a3a3a">&#8220;We decided last cycle to denormalize Reporting&#8221; &#8212;</text>
  <text x="80" y="414" font-size="11.5" fill="#9a3a3a">except no such decision exists on disk.</text>
  <text x="80" y="434" font-size="11.5" font-style="italic" fill="#9a3a3a">A false memory propagates downstream as fact.</text>

  <!-- mechanism: cite-substrate-before-acting gate -->
  <rect x="552" y="330" width="316" height="118" rx="11" fill="#f7f9fc" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="710" y="350" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">Cite substrate before acting</text>
  <rect x="568" y="364" width="74" height="26" rx="6" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="605" y="381" text-anchor="middle" font-size="9.5" font-weight="700" fill="#26425f">claim</text>
  <rect x="668" y="362" width="60" height="30" rx="6" fill="#fef8e7" stroke="#b89425" stroke-width="1.4"/>
  <text x="698" y="375" text-anchor="middle" font-size="8.5" font-weight="700" fill="#8a6d0a">on disk?</text>
  <text x="698" y="387" text-anchor="middle" font-size="8.5" font-weight="700" fill="#8a6d0a">gate</text>
  <rect x="752" y="364" width="96" height="26" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="800" y="381" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2a5a2a">file/tag/Ledger</text>
  <line x1="642" y1="377" x2="666" y2="377" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="728" y1="377" x2="750" y2="377" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <text x="710" y="412" text-anchor="middle" font-size="9.5" fill="#9a3a3a" font-style="italic">no substrate &#8212; claim rejected, not propagated</text>
  <text x="710" y="430" text-anchor="middle" font-size="9.5" fill="#3a6a3a">memory can never out-rank the disk</text>

  <rect x="888" y="330" width="556" height="118" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="908" y="358" font-size="15.5" font-weight="700" fill="#2a5a2a">Provenance law</text>
  <rect x="1300" y="342" width="128" height="22" rx="6" fill="#26425f"/>
  <text x="1364" y="357" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">AXIOM LAYER</text>
  <text x="908" y="386" font-size="11.5" fill="#3a6a3a">Cite by substrate, never by memory; every load-bearing</text>
  <text x="908" y="406" font-size="11.5" fill="#3a6a3a">claim re-derivable from a committed file, tag, or Ledger.</text>
  <text x="908" y="430" font-size="11.5" font-weight="600" fill="#2a5a2a">Lives in: provenance-law axiom</text>

  <!-- ============ ROW 3 · ROLE CONFUSION ============ -->
  <rect x="56" y="468" width="476" height="118" rx="11" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <circle cx="92" cy="498" r="15" fill="#c44a4a"/>
  <text x="92" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3</text>
  <text x="122" y="504" font-size="16" font-weight="700" fill="#8a2a2a">Role confusion</text>
  <text x="80" y="532" font-size="11.5" fill="#9a3a3a">A mentor does labour; a doer improvises authority;</text>
  <text x="80" y="552" font-size="11.5" fill="#9a3a3a">a brief that was almost complete gets filled from imagination.</text>
  <text x="80" y="572" font-size="11.5" font-style="italic" fill="#9a3a3a">Coordination integrity dissolves.</text>

  <!-- mechanism: labour separation — three fixed tiers, one writer -->
  <text x="710" y="487" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">Labour separation</text>
  <rect x="552" y="494" width="316" height="86" rx="11" fill="#f7f9fc" stroke="#3b6ea5" stroke-width="1.4"/>
  <rect x="566" y="506" width="88" height="24" rx="6" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="610" y="522" text-anchor="middle" font-size="9" font-weight="700" fill="#26425f">Mentor-1</text>
  <rect x="566" y="534" width="88" height="24" rx="6" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="610" y="550" text-anchor="middle" font-size="9" font-weight="700" fill="#26425f">Mentor-2</text>
  <rect x="700" y="518" width="100" height="30" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="750" y="537" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2a5a2a">Doer &#8212; sole writer</text>
  <line x1="654" y1="518" x2="698" y2="528" stroke="#3b6ea5" stroke-width="1.6" stroke-dasharray="3 2" marker-end="url(#ablue)"/>
  <line x1="654" y1="546" x2="698" y2="538" stroke="#3b6ea5" stroke-width="1.6" stroke-dasharray="3 2" marker-end="url(#ablue)"/>
  <rect x="808" y="508" width="50" height="50" rx="6" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.2"/>
  <text x="833" y="529" text-anchor="middle" font-size="9" font-weight="700" fill="#8a2a2a">sub-</text>
  <text x="833" y="541" text-anchor="middle" font-size="9" font-weight="700" fill="#8a2a2a">strate</text>
  <line x1="800" y1="533" x2="806" y2="533" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <text x="710" y="572" text-anchor="middle" font-size="8.5" fill="#3a6a3a">one live writer holds jurisdiction; gaps escalate, never improvised</text>

  <rect x="888" y="468" width="556" height="118" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="908" y="496" font-size="15.5" font-weight="700" fill="#2a5a2a">Tier grammar &#43; brief completeness</text>
  <rect x="1268" y="480" width="160" height="22" rx="6" fill="#26425f"/>
  <text x="1348" y="495" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">AXIOM &#43; GUARDRAIL</text>
  <text x="908" y="524" font-size="11.5" fill="#3a6a3a">Three fixed tiers &#8212; Mentor-1 / Mentor-2 / Doer; only one</text>
  <text x="908" y="544" font-size="11.5" fill="#3a6a3a">touches substrate. No placeholders &#8212; escalate, never improvise.</text>
  <text x="908" y="568" font-size="11.5" font-weight="600" fill="#2a5a2a">Lives in: tier-grammar axiom &#183; role-confusion guardrail</text>

  <!-- ============ ROW 4 · TRUST EROSION ============ -->
  <rect x="56" y="606" width="476" height="118" rx="11" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <circle cx="92" cy="636" r="15" fill="#c44a4a"/>
  <text x="92" y="641" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4</text>
  <text x="122" y="642" font-size="16" font-weight="700" fill="#8a2a2a">Trust erosion</text>
  <text x="80" y="670" font-size="11.5" fill="#9a3a3a">&#8220;Done, committed and pushed&#8221; &#8212; but the disk disagrees.</text>
  <text x="80" y="690" font-size="11.5" fill="#9a3a3a">Twice, and the human must verify everything by hand.</text>
  <text x="80" y="710" font-size="11.5" font-style="italic" fill="#9a3a3a">The trust anchor is gone; delegation collapses.</text>

  <!-- mechanism: ordering — flush (commit+push) BEFORE disclose -->
  <text x="710" y="625" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">Ordering: flush before disclose</text>
  <rect x="552" y="632" width="316" height="86" rx="11" fill="#f7f9fc" stroke="#3b6ea5" stroke-width="1.4"/>
  <rect x="566" y="648" width="120" height="28" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="626" y="666" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2a5a2a">commit &#43; push</text>
  <rect x="732" y="648" width="120" height="28" rx="6" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="792" y="666" text-anchor="middle" font-size="9.5" font-weight="700" fill="#26425f">say &#8220;done&#8221;</text>
  <line x1="686" y1="662" x2="730" y2="662" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <text x="709" y="657" text-anchor="middle" font-size="8" fill="#2a5a2a">then</text>
  <text x="710" y="696" text-anchor="middle" font-size="9.5" fill="#9a3a3a" font-style="italic">disclosure can never run ahead of the disk</text>
  <text x="710" y="711" text-anchor="middle" font-size="9.5" fill="#3a6a3a">so &#8220;done&#8221; always means origin already agrees</text>

  <rect x="888" y="606" width="556" height="118" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="908" y="634" font-size="15.5" font-weight="700" fill="#2a5a2a">Persistence law</text>
  <rect x="1300" y="618" width="128" height="22" rx="6" fill="#26425f"/>
  <text x="1364" y="633" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">AXIOM LAYER</text>
  <text x="908" y="662" font-size="11.5" fill="#3a6a3a">Flush before disclose &#8212; state reaches disk and origin</text>
  <text x="908" y="682" font-size="11.5" fill="#3a6a3a">before it is disclosed. When a tier says &#8220;done,&#8221; disk agrees.</text>
  <text x="908" y="706" font-size="11.5" font-weight="600" fill="#2a5a2a">Lives in: persistence-law axiom &#183; bounded-loss recovery</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="752" width="1388" height="52" rx="9" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="775" text-anchor="middle" font-size="13.5" fill="#5a4d20">Each axiom is a scar. Weaken a defense and you re-introduce its pathology &#8212; every time.</text>
  <text x="750" y="794" text-anchor="middle" font-size="13.5" fill="#5a4d20">The four defenses share one substrate: a single durable, inspectable, append-only state of record &#8212; git.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="836" width="6" height="8" rx="1"/><rect x="699" y="830" width="6" height="14" rx="1"/><rect x="708" y="824" width="6" height="20" rx="1"/></g>
    <text x="722" y="844" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
