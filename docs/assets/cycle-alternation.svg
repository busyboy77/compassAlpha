<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="780" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>

  <rect width="1500" height="780" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">The Charter Alternation — LOCKED ↔ UNLOCKED</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">Two states, one at a time: build under a LOCKED rulebook, then amend it UNLOCKED, then re-lock — they never run together</text>

  <!-- STATE: LOCKED (left) -->
  <rect x="110" y="170" width="520" height="300" rx="18" fill="#f1f6f1" stroke="#4a8a4a" stroke-width="2.4"/>
  <text x="370" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#2a5a2a">LOCKED</text>
  <text x="370" y="244" text-anchor="middle" font-size="13" fill="#3a6a3a" font-style="italic">the rulebook is frozen</text>
  <rect x="150" y="272" width="440" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.3"/><text x="370" y="297" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2a5a2a">BUILD axis runs — code gets written</text>
  <rect x="150" y="322" width="440" height="40" rx="8" fill="#fff" stroke="#9aa3b0" stroke-width="1.2"/><text x="370" y="347" text-anchor="middle" font-size="12" fill="#5a6a7a">doctrine axis is dormant</text>
  <text x="370" y="404" text-anchor="middle" font-size="11.5" fill="#3a6a3a">build against settled compasses + a Charter</text>
  <text x="370" y="420" text-anchor="middle" font-size="11.5" fill="#3a6a3a">that cannot change underneath you</text>
  <text x="370" y="448" text-anchor="middle" font-size="10.5" fill="#5a8a5a" font-style="italic">most of the time the federation lives here</text>

  <!-- STATE: UNLOCKED (right) -->
  <rect x="870" y="170" width="520" height="300" rx="18" fill="#fbf3e2" stroke="#c79a3a" stroke-width="2.4"/>
  <text x="1130" y="214" text-anchor="middle" font-size="22" font-weight="700" fill="#7a5a18">UNLOCKED</text>
  <text x="1130" y="244" text-anchor="middle" font-size="13" fill="#8a6a28" font-style="italic">the rulebook is open to change</text>
  <rect x="910" y="272" width="440" height="40" rx="8" fill="#f4e6c6" stroke="#c79a3a" stroke-width="1.3"/><text x="1130" y="297" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7a5a18">DOCTRINE axis runs — rules get changed</text>
  <rect x="910" y="322" width="440" height="40" rx="8" fill="#fff" stroke="#9aa3b0" stroke-width="1.2"/><text x="1130" y="347" text-anchor="middle" font-size="12" fill="#5a6a7a">build axis is dormant</text>
  <text x="1130" y="404" text-anchor="middle" font-size="11.5" fill="#8a6a28">author new primitives, invariants, and</text>
  <text x="1130" y="420" text-anchor="middle" font-size="11.5" fill="#8a6a28">compasses — this epoch IS the amendment</text>
  <text x="1130" y="448" text-anchor="middle" font-size="10.5" fill="#a98c2a" font-style="italic">a bounded amendment epoch, then it ends</text>

  <!-- transition: LOCKED -> UNLOCKED (top arc) -->
  <path d="M630,250 C720,200 780,200 870,250" fill="none" stroke="#b89425" stroke-width="2.6" marker-end="url(#am)"/>
  <text x="750" y="196" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a6d0a">engage a doctrine cycle</text>
  <text x="750" y="212" text-anchor="middle" font-size="10.5" fill="#9a7a1a">open the amendment epoch · UNLOCK</text>

  <!-- transition: UNLOCKED -> LOCKED (bottom arc) -->
  <path d="M870,400 C780,452 720,452 630,400" fill="none" stroke="#3b6ea5" stroke-width="2.6" marker-end="url(#ab)"/>
  <text x="750" y="446" text-anchor="middle" font-size="10.5" fill="#3a5a7a">ratify the amendment package · bump to charter-v(n+1)</text>
  <text x="750" y="430" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">cycle close — RE-LOCK</text>

  <!-- one-at-a-time emphasis -->
  <rect x="560" y="498" width="380" height="44" rx="10" fill="#1f2a36"/>
  <text x="750" y="525" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">only ONE state at a time — never concurrent</text>

  <!-- DECOUPLED note -->
  <rect x="110" y="498" width="430" height="44" rx="9" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.2"/>
  <text x="325" y="519" text-anchor="middle" font-size="10.5" fill="#2a3a4a">DECOUPLED axes (ops · QA · audit) run continuously</text>
  <text x="325" y="534" text-anchor="middle" font-size="10" fill="#5a6a7a">alongside — read-only on the Charter, they never lock it</text>

  <!-- CAPTION -->
  <rect x="110" y="566" width="1280" height="160" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="596" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4a3f18">Build, then amend, then re-lock — and never both at once.</text>
  <text x="750" y="624" text-anchor="middle" font-size="12" fill="#5a4d20"><tspan font-weight="700">Why never concurrent:</tspan> if the build axis ran while the Charter was UNLOCKED, the rules a build relies on could change mid-flight —</text>
  <text x="750" y="642" text-anchor="middle" font-size="12" fill="#5a4d20">work started against one rulebook, finished against another. The alternation is what stops the build from racing the amendment.</text>
  <text x="750" y="670" text-anchor="middle" font-size="12" fill="#5a4d20"><tspan font-weight="700">How:</tspan> the Charter posture is the switch. UNLOCK to amend; ratify + bump the charter version; RE-LOCK; the build axis resumes under the new version.</text>
  <text x="750" y="694" text-anchor="middle" font-size="11.5" fill="#6a5a28" font-style="italic">Where: this is the doctrine ↔ build epoch boundary — the cycle toggle that paces the whole federation.</text>
  <text x="750" y="714" text-anchor="middle" font-size="11" fill="#6a5a28">A LOCKED→UNLOCKED flip is a deliberate cycle-boundary act, not a runtime convenience.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="744" width="6" height="6" rx="1"/><rect x="699" y="740" width="6" height="10" rx="1"/><rect x="708" y="736" width="6" height="14" rx="1"/></g>
    <text x="722" y="750" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
