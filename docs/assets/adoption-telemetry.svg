<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="880" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="blu" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="gry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a8a8a"/></marker>
  </defs>

  <rect width="1500" height="880" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Adoption Telemetry — consent-first · anonymized · GitHub-native</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">the ecosystem's own state, in git</text>

  <!-- ============ MAIN PIPELINE ============ -->
  <!-- card centres: x ~ 195 / 545 / 895 / 1245 ; row top y=210 -->

  <!-- ===== 1. ADOPTER (amber) ===== -->
  <rect x="48" y="210" width="294" height="270" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2.2"/>
  <path d="M48,222 a12,12 0 0 1 12,-12 h270 a12,12 0 0 1 12,12 v30 h-294 z" fill="#b89425"/>
  <text x="195" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Adopter</text>
  <text x="195" y="284" text-anchor="middle" font-size="11.5" fill="#5a4d20">the federation running</text>
  <text x="195" y="301" text-anchor="middle" font-size="11.5" fill="#5a4d20">CompassAlpha</text>

  <!-- drawn toggle switch (OFF position: knob left) -->
  <rect x="120" y="332" width="60" height="28" rx="14" fill="#e5ddc2" stroke="#b89425" stroke-width="1.6"/>
  <circle cx="136" cy="346" r="11" fill="#ffffff" stroke="#b89425" stroke-width="1.6"/>
  <text x="196" y="350" font-size="11" font-weight="600" fill="#8a6d0a">default OFF</text>

  <text x="195" y="392" text-anchor="middle" font-size="11" fill="#5a4d20">telemetry: opt-in</text>
  <text x="195" y="409" text-anchor="middle" font-size="11" fill="#5a4d20">revocable at any time</text>

  <rect x="86" y="432" width="218" height="30" rx="7" fill="#ffffff" stroke="#b89425" stroke-width="1.2"/>
  <text x="195" y="451" text-anchor="middle" font-size="10.5" fill="#8a6d0a" font-style="italic">explicit, informed consent</text>

  <!-- arrow 1 -> 2 -->
  <line x1="346" y1="345" x2="394" y2="345" stroke="#b89425" stroke-width="2.6" marker-end="url(#amb)"/>

  <!-- ===== 2. ANONYMIZE (amber/neutral) ===== -->
  <rect x="398" y="210" width="294" height="270" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2.2"/>
  <path d="M398,222 a12,12 0 0 1 12,-12 h270 a12,12 0 0 1 12,12 v30 h-294 z" fill="#b89425"/>
  <text x="545" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Anonymize</text>
  <text x="545" y="282" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a6d0a">drop PII</text>
  <text x="545" y="304" text-anchor="middle" font-size="11" fill="#5a4d20">coarse buckets only:</text>

  <rect x="426" y="318" width="238" height="148" rx="8" fill="#ffffff" stroke="#b89425" stroke-width="1.2"/>
  <text x="545" y="340" text-anchor="middle" font-size="11" fill="#5a4d20">project type</text>
  <text x="545" y="362" text-anchor="middle" font-size="11" fill="#5a4d20"># axes</text>
  <text x="545" y="384" text-anchor="middle" font-size="11" fill="#5a4d20"># compasses (range)</text>
  <text x="545" y="406" text-anchor="middle" font-size="11" fill="#5a4d20">preset</text>
  <text x="545" y="428" text-anchor="middle" font-size="11" fill="#5a4d20">version</text>
  <text x="545" y="454" text-anchor="middle" font-size="10" fill="#a98b2a" font-style="italic">no free text · no identifiers</text>

  <!-- arrow 2 -> 3 -->
  <line x1="696" y1="345" x2="744" y2="345" stroke="#4a8a4a" stroke-width="2.6" marker-end="url(#grn)"/>

  <!-- ===== 3. SUBMIT (GitHub) (green) ===== -->
  <rect x="748" y="210" width="294" height="270" rx="12" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2.2"/>
  <path d="M748,222 a12,12 0 0 1 12,-12 h270 a12,12 0 0 1 12,12 v30 h-294 z" fill="#4a8a4a"/>
  <text x="895" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Submit (GitHub)</text>

  <!-- small git node glyph -->
  <g stroke="#4a8a4a" stroke-width="2.2" fill="none">
    <line x1="895" y1="288" x2="895" y2="336"/>
    <circle cx="895" cy="288" r="7" fill="#4a8a4a"/>
    <circle cx="895" cy="336" r="7" fill="#e0f0e0"/>
  </g>

  <rect x="776" y="360" width="238" height="36" rx="8" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="895" y="383" text-anchor="middle" font-size="11.5" fill="#2a5a2a">GitHub Issue Form</text>
  <rect x="776" y="404" width="238" height="36" rx="8" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="895" y="427" text-anchor="middle" font-size="11.5" fill="#2a5a2a">or data repo</text>
  <text x="895" y="462" text-anchor="middle" font-size="10" fill="#3a6a3a" font-style="italic">recorded in the open</text>

  <!-- arrow 3 -> 4 -->
  <line x1="1046" y1="345" x2="1094" y2="345" stroke="#3b6ea5" stroke-width="2.6" marker-end="url(#blu)"/>

  <!-- ===== 4. PUBLIC DASHBOARD (blue) ===== -->
  <rect x="1098" y="210" width="294" height="270" rx="12" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2.2"/>
  <path d="M1098,222 a12,12 0 0 1 12,-12 h270 a12,12 0 0 1 12,12 v30 h-294 z" fill="#3b6ea5"/>
  <text x="1245" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Public dashboard</text>

  <!-- tiny bar-chart glyph -->
  <g fill="#3b6ea5">
    <rect x="1180" y="300" width="20" height="46" rx="2"/>
    <rect x="1208" y="282" width="20" height="64" rx="2"/>
    <rect x="1236" y="312" width="20" height="34" rx="2"/>
    <rect x="1264" y="292" width="20" height="54" rx="2"/>
    <rect x="1292" y="320" width="20" height="26" rx="2"/>
  </g>
  <line x1="1172" y1="350" x2="1318" y2="350" stroke="#3b6ea5" stroke-width="1.6"/>

  <text x="1245" y="380" text-anchor="middle" font-size="11.5" fill="#1a4a7a">GitHub Pages</text>
  <text x="1245" y="402" text-anchor="middle" font-size="11" fill="#1a4a7a">aggregate stats</text>
  <rect x="1126" y="420" width="238" height="34" rx="8" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="1245" y="442" text-anchor="middle" font-size="11" fill="#1a4a7a" font-style="italic">public by design</text>

  <!-- band label above pipeline arrows -->
  <text x="370" y="194" text-anchor="middle" font-size="10.5" fill="#a98b2a" font-style="italic">opt-in flows out</text>
  <text x="720" y="194" text-anchor="middle" font-size="10.5" fill="#3a6a3a" font-style="italic">anonymized only</text>
  <text x="1070" y="194" text-anchor="middle" font-size="10.5" fill="#3a6e9a" font-style="italic">aggregate only</text>

  <!-- ============ SEPARATE DASHED COMMERCIAL SIDE-PATH (grey) ============ -->
  <!-- drop from Adopter, then run right to the side box -->
  <line x1="195" y1="482" x2="195" y2="600" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="6 5"/>
  <line x1="195" y1="600" x2="478" y2="600" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#gry)"/>
  <text x="206" y="540" font-size="10.5" fill="#8a8a8a" font-style="italic">optional</text>
  <text x="206" y="556" font-size="10.5" fill="#8a8a8a" font-style="italic">separate path</text>

  <rect x="486" y="540" width="430" height="120" rx="11" fill="#ffffff" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="701" y="568" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5a5a5a">optional: &quot;contact me&quot; for commercial</text>
  <text x="701" y="592" text-anchor="middle" font-size="11.5" fill="#777">a separate, second consent</text>
  <text x="701" y="614" text-anchor="middle" font-size="11.5" fill="#777">never joined to the anonymous stats</text>
  <rect x="556" y="626" width="290" height="24" rx="6" fill="#efefef" stroke="#8a8a8a" stroke-width="1"/>
  <text x="701" y="643" text-anchor="middle" font-size="10" fill="#555" font-style="italic">distinct data store · distinct purpose</text>

  <!-- explicit no-join barrier marker between the two paths -->
  <text x="970" y="600" font-size="11" fill="#8a8a8a" font-style="italic">kept apart by design — no join key</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="48" y="724" width="1404" height="44" rx="8" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="752" text-anchor="middle" font-size="13.5" fill="#5a4d20">Opt-in&#160;&#160;·&#160;&#160;minimal published schema&#160;&#160;·&#160;&#160;anonymized&#160;&#160;·&#160;&#160;revocable&#160;&#160;·&#160;&#160;public aggregate.&#160;&#160;No PII, ever.</text>

  <!-- ============ FOOTER (Gradus emblem + wordmark) ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="688" y="824" width="6" height="8" rx="1"/><rect x="697" y="818" width="6" height="14" rx="1"/><rect x="706" y="812" width="6" height="20" rx="1"/></g>
    <text x="720" y="832" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
