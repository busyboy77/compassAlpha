<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 960" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="960" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The Minimal-Sufficient Bus</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Relay the least the receiver needs to act &#8212; keep the detail in substrate, pulled only on demand</text>

  <!-- vertical divider -->
  <line x1="750" y1="124" x2="750" y2="800" stroke="#cfcabc" stroke-width="2" stroke-dasharray="3 5"/>

  <!-- =================================================================== -->
  <!-- ============ LEFT PANEL · MINIMAL-SUFFICIENT (clean) ============== -->
  <!-- =================================================================== -->
  <rect x="44" y="124" width="660" height="58" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <polyline points="82,154 94,166 118,140" fill="none" stroke="#2a5a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="392" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#2a5a2a">MINIMAL-SUFFICIENT &#8212; lightly loaded</text>
  <text x="392" y="172" text-anchor="middle" font-size="12.5" fill="#3a6a3a" font-style="italic">concise bus-message; detail stays in substrate</text>

  <!-- sender tier -->
  <rect x="96" y="214" width="216" height="78" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="204" y="246" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Sender tier</text>
  <text x="204" y="268" text-anchor="middle" font-size="11" fill="#5a7aa0" font-style="italic">e.g. Mentor-2</text>

  <!-- receiver tier -->
  <rect x="96" y="470" width="216" height="78" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="204" y="502" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1a4a7a">Receiver tier</text>
  <text x="204" y="524" text-anchor="middle" font-size="11" fill="#5a7aa0" font-style="italic">e.g. Mentor-1</text>

  <!-- thin bus with concise chip -->
  <line x1="204" y1="292" x2="204" y2="470" stroke="#4a8a4a" stroke-width="3"/>
  <rect x="120" y="346" width="168" height="70" rx="9" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="204" y="372" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">concise message</text>
  <text x="204" y="390" text-anchor="middle" font-size="10.5" fill="#3a6a3a">pointer / delta digest</text>
  <text x="204" y="406" text-anchor="middle" font-size="10.5" fill="#3a6a3a">enough to act &#183; no more</text>
  <!-- up-bump / sub-bump direction ticks -->
  <line x1="318" y1="430" x2="318" y2="338" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <text x="332" y="356" font-size="10.5" fill="#2a5a2a" font-weight="600">up-bump</text>
  <line x1="90" y1="338" x2="90" y2="430" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <text x="34" y="356" font-size="10.5" fill="#2a5a2a" font-weight="600">sub-bump</text>

  <!-- substrate detail file -->
  <path d="M396,214 h150 l28,28 v126 h-178 z" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.8"/>
  <path d="M546,214 v28 h28 z" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="485" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">detail file</text>
  <text x="485" y="284" text-anchor="middle" font-size="10.5" fill="#3a6a3a">full explanatory</text>
  <text x="485" y="300" text-anchor="middle" font-size="10.5" fill="#3a6a3a">reasoning, kept in</text>
  <text x="485" y="316" text-anchor="middle" font-size="10.5" fill="#3a6a3a">the sender's own</text>
  <text x="485" y="332" text-anchor="middle" font-size="10.5" fill="#3a6a3a">substrate</text>
  <!-- pull-on-demand arrow from receiver to detail -->
  <path d="M312,500 C470,500 500,420 500,372" fill="none" stroke="#4a8a4a" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#agreen)"/>
  <text x="470" y="468" text-anchor="middle" font-size="10.5" fill="#2a5a2a" font-style="italic">pull only when needed</text>

  <!-- receiver context meter: light -->
  <rect x="372" y="470" width="280" height="78" rx="10" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="512" y="494" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">receiver context</text>
  <rect x="396" y="506" width="232" height="20" rx="6" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.2"/>
  <rect x="398" y="508" width="58" height="16" rx="5" fill="#4a8a4a"/>
  <text x="512" y="540" text-anchor="middle" font-size="10.5" fill="#3a6a3a">light &#8212; room to think</text>

  <!-- left summary chip -->
  <rect x="160" y="592" width="408" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="364" y="617" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2a5a2a">low pollution &#183; full intelligence retained</text>

  <!-- =================================================================== -->
  <!-- ============ RIGHT PANEL · BUMP-EVERYTHING (flooded) ============== -->
  <!-- =================================================================== -->
  <rect x="796" y="124" width="660" height="58" rx="11" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <path d="M824,166 L838,138 L852,166 z" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2.4" stroke-linejoin="round"/>
  <rect x="836" y="149" width="4" height="9" rx="1.5" fill="#8a2a2a"/>
  <circle cx="838" cy="162" r="2.2" fill="#8a2a2a"/>
  <text x="1136" y="151" text-anchor="middle" font-size="19" font-weight="700" fill="#8a2a2a">BUMP-EVERYTHING &#8212; flooded</text>
  <text x="1136" y="172" text-anchor="middle" font-size="12.5" fill="#9a3a3a" font-style="italic">full detail shoved across the bus, verbatim</text>

  <!-- sender tier -->
  <rect x="848" y="214" width="216" height="78" rx="10" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="956" y="246" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Sender tier</text>
  <text x="956" y="268" text-anchor="middle" font-size="11" fill="#9a3a3a" font-style="italic">relays its whole context</text>

  <!-- receiver tier -->
  <rect x="848" y="470" width="216" height="78" rx="10" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="956" y="502" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a2a2a">Receiver tier</text>
  <text x="956" y="524" text-anchor="middle" font-size="11" fill="#9a3a3a" font-style="italic">absorbs all of it</text>

  <!-- fat bus dumping everything -->
  <path d="M912,292 L1000,292 L1000,470 L912,470 Z" fill="#fde0e0" stroke="#c44a4a" stroke-width="1.6"/>
  <line x1="930" y1="300" x2="930" y2="462" stroke="#c44a4a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="948" y1="300" x2="948" y2="462" stroke="#c44a4a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="966" y1="300" x2="966" y2="462" stroke="#c44a4a" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="984" y1="300" x2="984" y2="462" stroke="#c44a4a" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="956" y="386" text-anchor="middle" font-size="11" font-weight="700" fill="#8a2a2a" transform="rotate(90 956 386)">full transcript on the bus</text>

  <!-- spill into receiver -->
  <path d="M1064,292 C1180,300 1220,420 1230,470" fill="none" stroke="#c44a4a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ared)"/>
  <text x="1210" y="356" text-anchor="middle" font-size="10.5" fill="#9a3a3a" font-style="italic">sibling churn, dead-ends,</text>
  <text x="1210" y="372" text-anchor="middle" font-size="10.5" fill="#9a3a3a" font-style="italic">sub-tier reasoning &#8212; all of it</text>

  <!-- receiver context meter: flooded -->
  <rect x="1124" y="470" width="280" height="78" rx="10" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.6"/>
  <text x="1264" y="494" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a2a2a">receiver context</text>
  <rect x="1148" y="506" width="232" height="20" rx="6" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.2"/>
  <rect x="1150" y="508" width="228" height="16" rx="5" fill="#c44a4a"/>
  <text x="1264" y="540" text-anchor="middle" font-size="10.5" fill="#9a3a3a">flooded &#8212; judgment degrades</text>

  <!-- right summary chip -->
  <rect x="932" y="592" width="408" height="40" rx="8" fill="#fdf3f3" stroke="#c44a4a" stroke-width="1.4"/>
  <text x="1136" y="617" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a2a2a">heavy pollution &#183; resources lost &#183; no gain</text>

  <!-- ============ SYMMETRY / CAPTION STRIP ============ -->
  <rect x="44" y="676" width="1412" height="80" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="706" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Same machine in both directions &#8212; sub-bump (down) and up-bump (up)</text>
  <text x="750" y="730" text-anchor="middle" font-size="13" fill="#5a4d20">The bus carries the minimal-sufficient message; the substrate carries the detail; the receiver reconstructs on demand.</text>
  <text x="750" y="749" text-anchor="middle" font-size="12.5" fill="#6a5a28" font-style="italic">Lightly loaded but intelligent threads at every tier &#8212; this is the bus vector of pollution containment.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="900" width="6" height="8" rx="1"/><rect x="699" y="894" width="6" height="14" rx="1"/><rect x="708" y="888" width="6" height="20" rx="1"/></g>
    <text x="722" y="908" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
