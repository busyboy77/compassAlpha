<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 840" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>

  <rect width="1500" height="840" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Phase 3 Dispatch &#8212; the build swimlane</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Slices run parallel through CP2, then converge on a single freeze &#183; gate &#183; tag tail &#8212; full build-axis ceremony</text>

  <!-- ============ CHECKPOINT COLUMN HEADERS ============ -->
  <!-- CP1 -->
  <rect x="240" y="124" width="170" height="46" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="325" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP1</text>
  <text x="325" y="162" text-anchor="middle" font-size="10.5" fill="#3a5a7a">plan &#183; premise</text>
  <!-- CP2 -->
  <rect x="430" y="124" width="430" height="46" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="645" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP2 &#8212; implementation, slice by slice (parallel)</text>
  <text x="645" y="162" text-anchor="middle" font-size="10.5" fill="#3a5a7a">fresh Doer per slice &#183; substrate + control-plane commits never cross-committed</text>
  <!-- CP3 -->
  <rect x="880" y="124" width="170" height="46" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="965" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP3</text>
  <text x="965" y="162" text-anchor="middle" font-size="10.5" fill="#3a5a7a">exit report &#183; audit</text>
  <!-- FREEZE -->
  <rect x="1070" y="124" width="120" height="46" rx="10" fill="#fef8e7" stroke="#b89425" stroke-width="1.8"/>
  <text x="1130" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6d0a">FREEZE</text>
  <text x="1130" y="162" text-anchor="middle" font-size="10" fill="#9a7a1a">T7 onboard</text>
  <!-- GATE -->
  <rect x="1200" y="124" width="120" height="46" rx="10" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="1260" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#1a4a7a">GATE</text>
  <text x="1260" y="162" text-anchor="middle" font-size="10" fill="#3a5a7a">4 gates GREEN</text>
  <!-- TAG -->
  <rect x="1330" y="124" width="120" height="46" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="1390" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5a2a">TAG</text>
  <text x="1390" y="162" text-anchor="middle" font-size="10" fill="#3a6a3a">reporting-v1.3</text>

  <!-- ============ PARALLEL BAND backdrop for CP2 ============ -->
  <rect x="430" y="196" width="430" height="384" rx="12" fill="#f4f8fc" stroke="#b9c8da" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="645" y="572" text-anchor="middle" font-size="11" fill="#5a7aa0" font-style="italic">three slices proceed in parallel here</text>

  <!-- ===== CP1 launch chip (spanning, left) ===== -->
  <rect x="240" y="288" width="170" height="200" rx="11" fill="#eef3fa" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="325" y="316" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">Plan + premise check</text>
  <text x="325" y="348" text-anchor="middle" font-size="10.5" fill="#3a5a7a">Mentor-2 plans the</text>
  <text x="325" y="364" text-anchor="middle" font-size="10.5" fill="#3a5a7a">three slices, re-checks</text>
  <text x="325" y="380" text-anchor="middle" font-size="10.5" fill="#3a5a7a">the inherited compass</text>
  <text x="325" y="410" text-anchor="middle" font-size="10.5" fill="#3a5a7a">founder-call surfaced</text>
  <text x="325" y="426" text-anchor="middle" font-size="10.5" fill="#3a5a7a">at CP1, before code:</text>
  <text x="325" y="442" text-anchor="middle" font-size="10.5" fill="#3a5a7a">fixed cadence set;</text>
  <text x="325" y="458" text-anchor="middle" font-size="10.5" fill="#3a5a7a">arbitrary cron parked</text>
  <text x="325" y="474" text-anchor="middle" font-size="10.5" fill="#3a5a7a">to the &#167;9 queue</text>

  <!-- ============ SLICE ROWS ============ -->
  <!-- row labels -->
  <text x="64" y="248" font-size="13" font-weight="700" fill="#33445a">Parallel slices</text>

  <!-- S1 row -->
  <text x="64" y="304" font-size="13" font-weight="700" fill="#2a5a2a">S1</text>
  <text x="64" y="320" font-size="10" fill="#3a6a3a">schema</text>
  <rect x="460" y="270" width="370" height="62" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="645" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">S1 &#183; scheduled_export schema + migration</text>
  <text x="645" y="314" text-anchor="middle" font-size="10.5" fill="#3a6a3a">fresh Doer &#183; commits to substrate, digest to Mentor-2</text>

  <!-- S2 row -->
  <text x="64" y="388" font-size="13" font-weight="700" fill="#2a5a2a">S2</text>
  <text x="64" y="404" font-size="10" fill="#3a6a3a">routes</text>
  <rect x="460" y="354" width="370" height="62" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="645" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">S2 &#183; CRUD routes</text>
  <text x="645" y="398" text-anchor="middle" font-size="10.5" fill="#3a6a3a">create / list / delete schedule</text>

  <!-- S3 row -->
  <text x="64" y="472" font-size="13" font-weight="700" fill="#2a5a2a">S3</text>
  <text x="64" y="488" font-size="10" fill="#3a6a3a">runner</text>
  <rect x="460" y="438" width="370" height="62" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="645" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">S3 &#183; runner + Notifications wiring</text>
  <text x="645" y="482" text-anchor="middle" font-size="10.5" fill="#3a6a3a">call Notifications &#8212; do NOT build a new mailer</text>

  <!-- CP1 -> each slice arrows (fan out) -->
  <path d="M410,388 C432,388 438,301 458,301" fill="none" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#agreen)"/>
  <line x1="410" y1="388" x2="458" y2="385" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#agreen)"/>
  <path d="M410,388 C432,388 438,469 458,469" fill="none" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#agreen)"/>

  <!-- ===== CP3 exit-report chip (converge, right) ===== -->
  <rect x="880" y="288" width="170" height="200" rx="11" fill="#eef3fa" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="965" y="316" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">EXIT_REPORT</text>
  <text x="965" y="346" text-anchor="middle" font-size="10.5" fill="#3a5a7a">all three slices fold</text>
  <text x="965" y="362" text-anchor="middle" font-size="10.5" fill="#3a5a7a">into one report</text>
  <text x="965" y="392" text-anchor="middle" font-size="10.5" fill="#3a5a7a">built &#183; tested &#183; audited</text>
  <text x="965" y="412" text-anchor="middle" font-size="10.5" fill="#3a5a7a">18 tests green</text>
  <text x="965" y="428" text-anchor="middle" font-size="10.5" fill="#3a5a7a">typecheck clean</text>
  <text x="965" y="448" text-anchor="middle" font-size="10.5" fill="#3a5a7a">14 anchored, 0 dangling</text>
  <text x="965" y="468" text-anchor="middle" font-size="10.5" fill="#3a5a7a">2 leftovers tracked</text>

  <!-- each slice -> CP3 arrows (fan in) -->
  <path d="M830,301 C854,301 858,388 878,388" fill="none" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#ablue)"/>
  <line x1="830" y1="385" x2="878" y2="388" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#ablue)"/>
  <path d="M830,469 C854,469 858,388 878,388" fill="none" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#ablue)"/>

  <!-- ============ FREEZE / GATE / TAG BARRIERS (tail) ============ -->
  <!-- FREEZE barrier -->
  <rect x="1070" y="288" width="120" height="200" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="2.2"/>
  <line x1="1130" y1="200" x2="1130" y2="560" stroke="#b89425" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="1130" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#8a6d0a">CP-FREEZE</text>
  <text x="1130" y="366" text-anchor="middle" font-size="10.5" fill="#7a5e12">trigger T7:</text>
  <text x="1130" y="384" text-anchor="middle" font-size="10.5" fill="#7a5e12">every leftover</text>
  <text x="1130" y="402" text-anchor="middle" font-size="10.5" fill="#7a5e12">onboarded to</text>
  <text x="1130" y="420" text-anchor="middle" font-size="10.5" fill="#7a5e12">LEFTOVERS</text>
  <text x="1130" y="448" text-anchor="middle" font-size="10.5" fill="#7a5e12">before freeze is</text>
  <text x="1130" y="466" text-anchor="middle" font-size="10.5" fill="#7a5e12">ratification-ready</text>

  <!-- GATE barrier -->
  <rect x="1200" y="288" width="120" height="200" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="2.2"/>
  <line x1="1260" y1="200" x2="1260" y2="560" stroke="#3b6ea5" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="1260" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">GATE-CHECK</text>
  <text x="1260" y="366" text-anchor="middle" font-size="10.5" fill="#26425f">1 complete</text>
  <text x="1260" y="386" text-anchor="middle" font-size="10.5" fill="#26425f">2 coverage</text>
  <text x="1260" y="406" text-anchor="middle" font-size="10.5" fill="#26425f">3 tally reconciles</text>
  <text x="1260" y="426" text-anchor="middle" font-size="10.5" fill="#26425f">4 onboarded</text>
  <text x="1260" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">all GREEN</text>
  <text x="1260" y="474" text-anchor="middle" font-size="10.5" fill="#26425f">GO-TAG</text>

  <!-- TAG -->
  <rect x="1330" y="288" width="120" height="200" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2.2"/>
  <text x="1390" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">TAGS-APPLIED</text>
  <text x="1390" y="366" text-anchor="middle" font-size="10.5" fill="#3a6a3a">reporting-v1.3</text>
  <text x="1390" y="384" text-anchor="middle" font-size="10.5" fill="#3a6a3a">tagged + pushed</text>
  <text x="1390" y="404" text-anchor="middle" font-size="10.5" fill="#3a6a3a">+ verified</text>
  <text x="1390" y="434" text-anchor="middle" font-size="10.5" fill="#3a6a3a">CLOSED &#183; FROZEN</text>
  <text x="1390" y="458" text-anchor="middle" font-size="10.5" fill="#3a6a3a">founder signs in a</text>
  <text x="1390" y="474" text-anchor="middle" font-size="10.5" fill="#3a6a3a">follow-up commit</text>

  <!-- tail arrows -->
  <line x1="1050" y1="388" x2="1070" y2="388" stroke="#b89425" stroke-width="2.4" marker-end="url(#aamber)"/>
  <line x1="1190" y1="388" x2="1200" y2="388" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="1320" y1="388" x2="1330" y2="388" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>

  <!-- LAUNCHED entry note (far left) -->
  <rect x="64" y="540" width="346" height="40" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="237" y="565" text-anchor="middle" font-size="11" fill="#1a4a7a">Entry: PRE-STAMP &#183; STAMPED &#183; LAUNCHED handled before CP1</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="56" y="700" width="1388" height="80" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Parallel where it pays, sequential where it must &#8212; slices fan out at CP2, then converge on one ordered freeze &#183; gate &#183; tag tail.</text>
  <text x="750" y="754" text-anchor="middle" font-size="13" fill="#5a4d20">Each barrier is objective: T7 onboards every leftover, four gates must read GREEN, and only then does the exit tag land and verify.</text>
  <text x="750" y="773" text-anchor="middle" font-size="12.5" fill="#6a5a28" font-style="italic">Same three tiers and the same gate tail as the doctrine cycle &#8212; but the deliverable is code, inside a locked Charter.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="822" width="6" height="8" rx="1"/><rect x="699" y="816" width="6" height="14" rx="1"/><rect x="708" y="810" width="6" height="20" rx="1"/></g>
    <text x="722" y="830" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
