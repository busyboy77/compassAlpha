<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="840" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 840" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>

  <rect width="1500" height="840" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="92" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="29" font-weight="700" fill="#ffffff">Phase 3 Dispatch — the build checkpoints</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">CP1 → CP2 → CP3, then a single freeze · gate · tag tail. CP2 fans out into parallel slices; everything else runs once.</text>

  <!-- entry + tail notes -->
  <text x="358" y="110" text-anchor="middle" font-size="10.5" fill="#5a6678" font-style="italic">Entry: PRE-STAMP · STAMPED · LAUNCHED handled before CP1</text>
  <text x="1178" y="110" text-anchor="middle" font-size="10.5" fill="#5a6678" font-style="italic">the tail fires once — after fan-in, in this fixed order, never per-slice</text>

  <!-- ============ TOP AXIS — CHECKPOINT COLUMN HEADERS ============ -->
  <rect x="48" y="120" width="120" height="46" rx="8" fill="#eceadf" stroke="#a89968" stroke-width="1.4"/>
  <text x="108" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4a3f18">build stage →</text>
  <text x="108" y="158" text-anchor="middle" font-size="9.5" fill="#6a5a28">slice ↓ (CP2)</text>

  <rect x="176" y="120" width="200" height="46" rx="8" fill="#cdddee" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="276" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP1</text>
  <text x="276" y="158" text-anchor="middle" font-size="10" fill="#3a5a7a">plan · premise</text>

  <rect x="384" y="120" width="300" height="46" rx="8" fill="#cdddee" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="534" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP2</text>
  <text x="534" y="158" text-anchor="middle" font-size="10" fill="#3a5a7a">implementation — slice by slice (parallel)</text>

  <rect x="692" y="120" width="200" height="46" rx="8" fill="#cdddee" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="792" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">CP3</text>
  <text x="792" y="158" text-anchor="middle" font-size="10" fill="#3a5a7a">exit report · audit</text>

  <rect x="900" y="120" width="176" height="46" rx="8" fill="#fbeec4" stroke="#b89425" stroke-width="1.8"/>
  <text x="988" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6d0a">CP-FREEZE</text>
  <text x="988" y="158" text-anchor="middle" font-size="10" fill="#9a7a1a">trigger T7</text>

  <rect x="1084" y="120" width="184" height="46" rx="8" fill="#cdddee" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="1176" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1a4a7a">GATE-CHECK</text>
  <text x="1176" y="158" text-anchor="middle" font-size="10" fill="#3a5a7a">4 gates GREEN</text>

  <rect x="1276" y="120" width="184" height="46" rx="8" fill="#d4ecd4" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="1368" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5a2a">TAG</text>
  <text x="1368" y="158" text-anchor="middle" font-size="10" fill="#3a6a3a">reporting-v1.3</text>

  <!-- ============ LEFT AXIS — slice row labels (align with CP2 rows) ============ -->
  <rect x="48" y="172" width="120" height="412" rx="8" fill="#f4f2ea" stroke="#a89968" stroke-width="1.2"/>
  <text x="108" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#4a3f18">parallel</text>
  <text x="108" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#4a3f18">slices</text>
  <text x="108" y="246" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">S1</text><text x="108" y="262" text-anchor="middle" font-size="9.5" fill="#3a6a3a">schema</text>
  <text x="108" y="384" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">S2</text><text x="108" y="400" text-anchor="middle" font-size="9.5" fill="#3a6a3a">routes</text>
  <text x="108" y="522" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">S3</text><text x="108" y="538" text-anchor="middle" font-size="9.5" fill="#3a6a3a">runner</text>

  <!-- ============ CP1 — one merged cell (spans the 3 slice rows) ============ -->
  <rect x="176" y="172" width="200" height="412" rx="9" fill="#eef3fa" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="276" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">Plan + premise check</text>
  <text x="276" y="238" text-anchor="middle" font-size="10" fill="#3a5a7a">Mentor-2 plans the three</text>
  <text x="276" y="253" text-anchor="middle" font-size="10" fill="#3a5a7a">slices and re-checks the</text>
  <text x="276" y="268" text-anchor="middle" font-size="10" fill="#3a5a7a">inherited compass.</text>
  <text x="276" y="306" text-anchor="middle" font-size="10" fill="#3a5a7a">Founder-call surfaced</text>
  <text x="276" y="321" text-anchor="middle" font-size="10" fill="#3a5a7a">at CP1, before any code:</text>
  <text x="276" y="344" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">fixed cadence set;</text>
  <text x="276" y="359" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">arbitrary cron parked</text>
  <text x="276" y="374" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">to the §9 queue.</text>
  <text x="276" y="556" text-anchor="middle" font-size="9.5" fill="#5a7aa0" font-style="italic">think before build</text>

  <!-- ============ CP2 — three stacked slice cells (merged under one header) ============ -->
  <!-- backdrop for the parallel band -->
  <rect x="384" y="172" width="300" height="412" rx="9" fill="#f4f8fc" stroke="#b9c8da" stroke-width="1.3" stroke-dasharray="5 4"/>
  <!-- S1 -->
  <rect x="396" y="182" width="276" height="124" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="534" y="214" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">S1 · scheduled_export</text>
  <text x="534" y="230" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">schema + migration</text>
  <text x="534" y="256" text-anchor="middle" font-size="9.5" fill="#3a6a3a">fresh Doer · commits to</text>
  <text x="534" y="270" text-anchor="middle" font-size="9.5" fill="#3a6a3a">substrate, digest to Mentor-2</text>
  <!-- S2 -->
  <rect x="396" y="320" width="276" height="116" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="534" y="354" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">S2 · CRUD routes</text>
  <text x="534" y="380" text-anchor="middle" font-size="9.5" fill="#3a6a3a">create / list / delete</text>
  <text x="534" y="394" text-anchor="middle" font-size="9.5" fill="#3a6a3a">a schedule</text>
  <!-- S3 -->
  <rect x="396" y="450" width="276" height="124" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="534" y="486" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">S3 · runner + Notifications</text>
  <text x="534" y="512" text-anchor="middle" font-size="9.5" fill="#3a6a3a">call Notifications —</text>
  <text x="534" y="526" text-anchor="middle" font-size="9.5" fill="#3a6a3a">do NOT build a new mailer</text>

  <!-- ============ CP3 — one merged cell ============ -->
  <rect x="692" y="172" width="200" height="412" rx="9" fill="#eef3fa" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="792" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">EXIT_REPORT</text>
  <text x="792" y="240" text-anchor="middle" font-size="10" fill="#3a5a7a">all three slices fold</text>
  <text x="792" y="255" text-anchor="middle" font-size="10" fill="#3a5a7a">into one report —</text>
  <text x="792" y="270" text-anchor="middle" font-size="10" fill="#3a5a7a">built · tested · audited</text>
  <text x="792" y="320" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">18 tests green</text>
  <text x="792" y="338" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">typecheck clean</text>
  <text x="792" y="356" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">14 anchored, 0 dangling</text>
  <text x="792" y="374" text-anchor="middle" font-size="10" fill="#26425f" font-weight="600">2 leftovers tracked</text>
  <text x="792" y="556" text-anchor="middle" font-size="9.5" fill="#5a7aa0" font-style="italic">fan-in · account for it</text>

  <!-- ============ CP-FREEZE — one merged cell ============ -->
  <rect x="900" y="172" width="176" height="412" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.8"/>
  <text x="988" y="212" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8a6d0a">CP-FREEZE</text>
  <text x="988" y="244" text-anchor="middle" font-size="10" fill="#7a5e12">trigger T7: every</text>
  <text x="988" y="259" text-anchor="middle" font-size="10" fill="#7a5e12">leftover onboarded</text>
  <text x="988" y="274" text-anchor="middle" font-size="10" fill="#7a5e12">to LEFTOVERS</text>
  <text x="988" y="304" text-anchor="middle" font-size="10" fill="#7a5e12">before freeze is</text>
  <text x="988" y="319" text-anchor="middle" font-size="10" fill="#7a5e12">ratification-ready</text>
  <text x="988" y="556" text-anchor="middle" font-size="9.5" fill="#a98c2a" font-style="italic">barrier · fires once</text>

  <!-- ============ GATE-CHECK — one merged cell ============ -->
  <rect x="1084" y="172" width="184" height="412" rx="9" fill="#eef3fa" stroke="#3b6ea5" stroke-width="1.8"/>
  <text x="1176" y="212" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a4a7a">GATE-CHECK</text>
  <text x="1176" y="244" text-anchor="middle" font-size="10" fill="#26425f">1 · deliverable complete</text>
  <text x="1176" y="262" text-anchor="middle" font-size="10" fill="#26425f">2 · coverage at target</text>
  <text x="1176" y="280" text-anchor="middle" font-size="10" fill="#26425f">3 · tally reconciles</text>
  <text x="1176" y="298" text-anchor="middle" font-size="10" fill="#26425f">4 · every leftover onboarded</text>
  <text x="1176" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">all GREEN → GO-TAG</text>
  <text x="1176" y="556" text-anchor="middle" font-size="9.5" fill="#5a7aa0" font-style="italic">objective · pass/fail</text>

  <!-- ============ TAG — one merged cell ============ -->
  <rect x="1276" y="172" width="184" height="412" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="1368" y="212" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2a5a2a">TAGS-APPLIED</text>
  <text x="1368" y="244" text-anchor="middle" font-size="10" fill="#3a6a3a">reporting-v1.3</text>
  <text x="1368" y="259" text-anchor="middle" font-size="10" fill="#3a6a3a">tagged + pushed + verified</text>
  <text x="1368" y="289" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">CLOSED · FROZEN</text>
  <text x="1368" y="319" text-anchor="middle" font-size="10" fill="#3a6a3a">founder signs in a</text>
  <text x="1368" y="334" text-anchor="middle" font-size="10" fill="#3a6a3a">follow-up commit</text>
  <text x="1368" y="556" text-anchor="middle" font-size="9.5" fill="#5a8a5a" font-style="italic">the deliverable ships</text>

  <!-- ============ FLOW ARROWS ============ -->
  <!-- CP1 -> CP2 (fan out) -->
  <line x1="376" y1="244" x2="394" y2="244" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="376" y1="378" x2="394" y2="378" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="376" y1="512" x2="394" y2="512" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <!-- CP2 -> CP3 (fan in) -->
  <line x1="684" y1="244" x2="692" y2="320" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="684" y1="378" x2="692" y2="378" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="684" y1="512" x2="692" y2="436" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <!-- CP3 -> FREEZE -> GATE -> TAG (sequential tail) -->
  <line x1="892" y1="378" x2="900" y2="378" stroke="#b89425" stroke-width="2.6" marker-end="url(#aamber)"/>
  <line x1="1076" y1="378" x2="1084" y2="378" stroke="#3b6ea5" stroke-width="2.6" marker-end="url(#ablue)"/>
  <line x1="1268" y1="378" x2="1276" y2="378" stroke="#4a8a4a" stroke-width="2.6" marker-end="url(#agreen)"/>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="48" y="700" width="1412" height="84" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="754" y="728" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4a3f18">Read across the top: CP1 → CP2 → CP3 → freeze → gate → tag. Only CP2 splits into parallel slices; the rest run once.</text>
  <text x="754" y="750" text-anchor="middle" font-size="12" fill="#5a4d20">Parallel where it pays, sequential where it must — slices speed the build; the single ordered tail guarantees nothing ships ungated.</text>
  <text x="754" y="769" text-anchor="middle" font-size="11.5" fill="#6a5a28" font-style="italic">Same three tiers and the same gate tail as the doctrine cycle — but the deliverable is code, inside a locked Charter.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="822" width="6" height="6" rx="1"/><rect x="699" y="818" width="6" height="10" rx="1"/><rect x="708" y="814" width="6" height="14" rx="1"/></g>
    <text x="722" y="828" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
