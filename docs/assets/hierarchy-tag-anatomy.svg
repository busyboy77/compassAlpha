<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 940" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="940" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Hierarchy-Edge Tag Anatomy</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Every block carries its sender-to-recipient edge; a tier ingests only if the edge terminates at it</text>

  <!-- ============ PART A: TAG ANATOMY ============ -->
  <text x="60" y="142" font-size="16" font-weight="700" fill="#1f2a36">A &#183; The wire format &#8212; a directed edge, a scope, an optional status</text>

  <!-- the tag bar -->
  <rect x="160" y="186" width="1180" height="92" rx="12" fill="#ffffff" stroke="#3b6ea5" stroke-width="2"/>
  <!-- brackets -->
  <text x="200" y="246" font-size="34" font-weight="700" fill="#9aa3b0">[[</text>
  <text x="1300" y="246" font-size="34" font-weight="700" fill="#9aa3b0" text-anchor="end">]]</text>

  <!-- SENDER chip -->
  <rect x="248" y="208" width="190" height="48" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="343" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1a4a7a">MENTOR-2</text>
  <!-- drawn edge arrow sender -> recipient -->
  <line x1="446" y1="232" x2="540" y2="232" stroke="#3b6ea5" stroke-width="2.6" marker-end="url(#ablue)"/>
  <!-- RECIPIENT chip -->
  <rect x="548" y="208" width="160" height="48" rx="9" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="628" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1a4a7a">DOER</text>
  <!-- middot -->
  <text x="730" y="240" text-anchor="middle" font-size="20" fill="#9aa3b0">&#183;</text>
  <!-- SCOPE chip -->
  <rect x="754" y="208" width="300" height="48" rx="9" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="904" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#2a5a2a">Billing/slice-3</text>
  <!-- middot -->
  <text x="1078" y="240" text-anchor="middle" font-size="20" fill="#9aa3b0">&#183;</text>
  <!-- STATUS chip -->
  <rect x="1102" y="208" width="172" height="48" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="1188" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#8a6d0a">BRIEF</text>

  <!-- leader lines + labels -->
  <line x1="343" y1="256" x2="343" y2="318" stroke="#3b6ea5" stroke-width="1.4"/>
  <rect x="240" y="318" width="206" height="62" rx="9" fill="#eef4fa" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="343" y="342" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">SENDER tier</text>
  <text x="343" y="362" text-anchor="middle" font-size="10.5" fill="#5a7aa0">which tier sent it</text>

  <line x1="628" y1="256" x2="628" y2="318" stroke="#3b6ea5" stroke-width="1.4"/>
  <rect x="500" y="318" width="256" height="62" rx="9" fill="#eef4fa" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="628" y="342" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">RECIPIENT tier</text>
  <text x="628" y="362" text-anchor="middle" font-size="10.5" fill="#5a7aa0">the only tier authorized to ingest</text>

  <line x1="904" y1="256" x2="904" y2="318" stroke="#4a8a4a" stroke-width="1.4"/>
  <rect x="788" y="318" width="232" height="62" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="904" y="342" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">SCOPE</text>
  <text x="904" y="362" text-anchor="middle" font-size="10.5" fill="#3a6a3a">&lt;scope&gt; or &lt;scope&gt;/&lt;slice&gt;</text>

  <line x1="1188" y1="256" x2="1188" y2="318" stroke="#b89425" stroke-width="1.4"/>
  <rect x="1066" y="318" width="244" height="62" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.4"/>
  <text x="1188" y="342" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a6d0a">STATUS (optional)</text>
  <text x="1188" y="362" text-anchor="middle" font-size="10.5" fill="#9a7a1a">upward + Doer returns &#183; stage grammar</text>

  <!-- "the edge" brace under sender->recipient -->
  <path d="M248,278 C248,294 708,294 708,278" fill="none" stroke="#6a7585" stroke-width="1.4"/>
  <text x="478" y="306" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a6678" font-style="italic">the edge &#8212; what authorizes ingestion</text>

  <!-- invariant note -->
  <rect x="160" y="402" width="1180" height="40" rx="8" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="427" text-anchor="middle" font-size="12.5" fill="#5a4d20">The shape [[ sender-to-recipient &#183; &lt;scope&gt; [&#183; &lt;status&gt;] ]] is invariant across axes; each axis substitutes its own role names.</text>

  <!-- ============ PART B: DECISION FLOW ============ -->
  <text x="60" y="498" font-size="16" font-weight="700" fill="#1f2a36">B &#183; Tag-gated ingestion &#8212; validate the edge terminates at THIS tier</text>

  <!-- incoming block -->
  <rect x="80" y="540" width="248" height="92" rx="11" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.6"/>
  <text x="204" y="572" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33445a">Block B arrives</text>
  <text x="204" y="594" text-anchor="middle" font-size="11" fill="#6a7585">in this tier&#8217;s inbox</text>
  <text x="204" y="614" text-anchor="middle" font-size="10.5" fill="#6a7585" font-style="italic">voice-match is signal, not authorization</text>

  <!-- decision diamond -->
  <path d="M560,540 L688,586 L560,632 L432,586 Z" fill="#fef8e7" stroke="#b89425" stroke-width="2"/>
  <text x="560" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#8a6d0a">recipient half</text>
  <text x="560" y="596" text-anchor="middle" font-size="12" font-weight="700" fill="#8a6d0a">== THIS tier?</text>

  <line x1="328" y1="586" x2="430" y2="586" stroke="#5a6678" stroke-width="2.4" marker-end="url(#aamber)"/>

  <!-- valid path -->
  <rect x="752" y="488" width="588" height="64" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2"/>
  <text x="1046" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#2a5a2a">INGEST &#183; act on the block</text>
  <text x="1046" y="538" text-anchor="middle" font-size="11" fill="#3a6a3a">the edge terminates here &#8212; valid recipient</text>
  <path d="M620,560 C700,540 700,524 750,520" fill="none" stroke="#4a8a4a" stroke-width="2.6" marker-end="url(#agreen)"/>
  <text x="690" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5a2a">YES</text>

  <!-- reject path -->
  <rect x="752" y="620" width="588" height="92" rx="11" fill="#fdf3f3" stroke="#c44a4a" stroke-width="2"/>
  <text x="1046" y="648" text-anchor="middle" font-size="14" font-weight="700" fill="#8a2a2a">REJECT &#183; do NOT ingest (misroute)</text>
  <text x="1046" y="670" text-anchor="middle" font-size="11" fill="#9a3a3a">edge does not terminate here &#8212; name the intended recipient tier</text>
  <text x="1046" y="690" text-anchor="middle" font-size="11" fill="#9a3a3a">rejection is loud, never silent &#183; optionally re-route to the correct inbox</text>
  <path d="M620,612 C700,632 700,652 750,658" fill="none" stroke="#c44a4a" stroke-width="2.6" marker-end="url(#ared)"/>
  <text x="690" y="680" text-anchor="middle" font-size="12" font-weight="700" fill="#8a2a2a">NO</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="80" y="748" width="1260" height="68" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="710" y="776" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Only the edge authorizes. A block that sounds right but is addressed to another tier is rejected, not ingested.</text>
  <text x="710" y="800" text-anchor="middle" font-size="13" fill="#5a4d20">Self-addressing blocks make misroutes loud instead of silent &#8212; the firewall holds even across relay hops.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="876" width="6" height="8" rx="1"/><rect x="699" y="870" width="6" height="14" rx="1"/><rect x="708" y="864" width="6" height="20" rx="1"/></g>
    <text x="722" y="884" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
