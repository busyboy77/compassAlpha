<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="940" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 940" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="1400" height="940" fill="#fafaf8"/>

  <!-- header -->
  <rect x="0" y="0" width="1400" height="110" fill="#1f2a36"/>
  <text x="700" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">The Four-Layer Constitutional Model</text>
  <text x="700" y="82" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">A small inviolable foundation + everything else explicitly tunable on top</text>

  <!-- ===== LAYER 4 · TOGGLES (top, green) ===== -->
  <rect x="356" y="152" width="688" height="116" rx="14" fill="#000000" opacity="0.06" transform="translate(6,6)"/>
  <rect x="350" y="150" width="700" height="116" rx="14" fill="#4a8a4a"/>
  <!-- toggle icon -->
  <rect x="372" y="198" width="40" height="20" rx="10" fill="#ffffff" opacity="0.25"/><circle cx="402" cy="208" r="8" fill="#ffffff"/>
  <text x="436" y="190" font-size="20" font-weight="700" fill="#ffffff">TOGGLES</text>
  <text x="436" y="214" font-size="13" fill="#eaf4ea">Live switches — flip at runtime / cycle / project boundaries</text>
  <text x="436" y="236" font-size="12" fill="#d4e8d4">operating presets bundle toggles · timing discipline over the tunable surface</text>
  <rect x="936" y="166" width="92" height="24" rx="12" fill="#ffffff" opacity="0.18"/><text x="982" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">[TUNABLE]</text>

  <!-- ===== LAYER 3 · TUNABLES (amber) ===== -->
  <rect x="296" y="294" width="808" height="116" rx="14" fill="#000000" opacity="0.06" transform="translate(6,6)"/>
  <rect x="290" y="292" width="820" height="116" rx="14" fill="#b89425"/>
  <!-- sliders icon -->
  <g stroke="#ffffff" stroke-width="3"><line x1="314" y1="338" x2="356" y2="338"/><line x1="314" y1="352" x2="356" y2="352"/><line x1="314" y1="366" x2="356" y2="366"/></g>
  <circle cx="340" cy="338" r="5" fill="#ffffff"/><circle cx="328" cy="352" r="5" fill="#ffffff"/><circle cx="348" cy="366" r="5" fill="#ffffff"/>
  <text x="376" y="332" font-size="20" font-weight="700" fill="#ffffff">TUNABLES</text>
  <text x="376" y="356" font-size="13" fill="#fbf2d8">Customization surface — the 5-axis trade-off space</text>
  <text x="376" y="378" font-size="12" fill="#f3e6c0">concurrency · context · AI model · lanes · stages · memory</text>
  <rect x="996" y="308" width="92" height="24" rx="12" fill="#ffffff" opacity="0.20"/><text x="1042" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">[TUNABLE]</text>

  <!-- ===== the constitutional line ===== -->
  <line x1="170" y1="424" x2="1230" y2="424" stroke="#8a8a8a" stroke-width="1.6" stroke-dasharray="7 5"/>
  <rect x="498" y="411" width="404" height="26" rx="13" fill="#fafaf8" stroke="#9a9a9a" stroke-width="1"/>
  <text x="700" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#555">the constitutional line — INVARIANT below · TUNABLE above</text>

  <!-- ===== LAYER 2 · GUARDRAILS (red) ===== -->
  <rect x="236" y="442" width="928" height="116" rx="14" fill="#000000" opacity="0.06" transform="translate(6,6)"/>
  <rect x="230" y="440" width="940" height="116" rx="14" fill="#c44a4a"/>
  <!-- wall icon -->
  <g fill="#ffffff"><rect x="312" y="482" width="44" height="10" rx="1"/><rect x="306" y="494" width="20" height="10" rx="1"/><rect x="330" y="494" width="26" height="10" rx="1"/><rect x="312" y="506" width="44" height="10" rx="1"/></g>
  <text x="376" y="482" font-size="20" font-weight="700" fill="#ffffff">GUARDRAILS</text>
  <text x="376" y="506" font-size="13" fill="#fbe4e4">What the framework PREVENTS — failure modes with recovery</text>
  <text x="376" y="528" font-size="12" fill="#f3cccc">context pollution · hallucination drift · role confusion · trust erosion</text>
  <rect x="1050" y="456" width="98" height="24" rx="12" fill="#ffffff" opacity="0.18"/><text x="1099" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">[INVARIANT]</text>

  <!-- ===== LAYER 1 · AXIOMS (bedrock, dark) ===== -->
  <rect x="176" y="578" width="1048" height="140" rx="14" fill="#000000" opacity="0.08" transform="translate(6,6)"/>
  <rect x="170" y="576" width="1060" height="140" rx="14" fill="#2d3a4a"/>
  <!-- shield icon -->
  <path d="M210,612 L242,612 L242,640 Q242,662 226,672 Q210,662 210,640 Z" fill="#ffffff"/>
  <path d="M218,638 l6,6 l12,-14" fill="none" stroke="#2d3a4a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="266" y="618" font-size="22" font-weight="700" fill="#ffffff">AXIOMS</text>
  <text x="266" y="642" font-size="13" fill="#cdd5e0">7 INVARIANT rules — the bedrock · cannot be tuned away</text>
  <text x="266" y="666" font-size="12" fill="#aebccd">tier grammar · firewall · persistence · hard labour · bus · provenance · git</text>
  <text x="266" y="690" font-size="11.5" fill="#8a9bb0" font-style="italic">change only by forking the framework</text>
  <rect x="1098" y="592" width="98" height="24" rx="12" fill="#ffffff" opacity="0.16"/><text x="1147" y="609" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">[INVARIANT]</text>

  <!-- derives-from note (left margin) -->
  <text x="100" y="430" text-anchor="middle" font-size="11.5" fill="#777" font-style="italic" transform="rotate(-90 100 430)">higher layers derive from the ones below</text>

  <!-- caption -->
  <rect x="170" y="760" width="1060" height="44" rx="8" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="700" y="787" text-anchor="middle" font-size="13" fill="#5a4d20">Guardrails defend the Axioms · Tunables sit on the Guardrails · Toggles bundle Tunables — the constitution stays, the customization changes.</text>

  <!-- footer brand mark -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="634" y="858" width="6" height="8" rx="1"/><rect x="643" y="852" width="6" height="14" rx="1"/><rect x="652" y="846" width="6" height="20" rx="1"/></g>
    <text x="666" y="866" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
