<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="inh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="com" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="prop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>

  <rect width="1600" height="1000" fill="#fafaf8"/>

  <!-- faint distribution globe behind the teams (physical spread) -->
  <g opacity="0.07" stroke="#5a8aa8" fill="none" stroke-width="1.5">
    <circle cx="800" cy="720" r="250"/>
    <ellipse cx="800" cy="720" rx="250" ry="86"/>
    <ellipse cx="800" cy="720" rx="105" ry="250"/>
    <ellipse cx="800" cy="720" rx="200" ry="250"/>
    <line x1="550" y1="720" x2="1050" y2="720"/>
  </g>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1600" height="98" fill="#1f2a36"/>
  <text x="800" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Team Federation</text>
  <text x="800" y="74" text-anchor="middle" font-size="14.5" fill="#a0aabb" font-style="italic">One Charter · many distributed teams · Git is the glue</text>

  <!-- legend key (top-left, clear of the arrow band) -->
  <rect x="70" y="214" width="252" height="84" rx="8" fill="#ffffff" stroke="#d8d8d8" stroke-width="1.2"/>
  <text x="86" y="236" font-size="12" font-weight="700" fill="#444">Legend</text>
  <line x1="92" y1="256" x2="118" y2="256" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#inh)"/>
  <text x="128" y="260" font-size="11" fill="#333">inherit the one Charter</text>
  <line x1="92" y1="280" x2="118" y2="280" stroke="#4a8a4a" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#com)"/>
  <text x="128" y="284" font-size="11" fill="#333">commit segment · sub-bump</text>

  <!-- ============ CROWN + THE ONE CHARTER ============ -->
  <polygon points="758,196 758,170 779,183 800,160 821,183 842,170 842,196" fill="#d4af37" stroke="#b4942a" stroke-width="1.5"/>
  <circle cx="779" cy="181" r="2.6" fill="#fff4cf"/><circle cx="800" cy="170" r="2.8" fill="#fff4cf"/><circle cx="821" cy="181" r="2.6" fill="#fff4cf"/>

  <rect x="578" y="200" width="444" height="106" rx="12" fill="#2d3a4a"/>
  <text x="800" y="234" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">FEDERATION CHARTER</text>
  <text x="800" y="258" text-anchor="middle" font-size="12.5" fill="#cdd5e0">the one constitution · invariants · primitives</text>
  <line x1="640" y1="273" x2="960" y2="273" stroke="#445466"/>
  <text x="800" y="292" text-anchor="middle" font-size="11.5" fill="#9fb0c4" font-style="italic">the single source of truth every team is bound to</text>

  <!-- chips hanging off the Charter -->
  <rect x="638" y="320" width="160" height="30" rx="6" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.3"/>
  <text x="718" y="340" text-anchor="middle" font-size="11" fill="#1a4a7a">Compasses · per component</text>
  <rect x="806" y="320" width="156" height="30" rx="6" fill="#eee0f5" stroke="#7a5b9c" stroke-width="1.3"/>
  <text x="884" y="340" text-anchor="middle" font-size="11" fill="#5a3a7a">Axis annexes</text>

  <!-- propagate arrow: Charter -> Git bus -->
  <line x1="800" y1="354" x2="800" y2="426" stroke="#b89425" stroke-width="2.5" marker-end="url(#prop)"/>
  <text x="812" y="394" font-size="11.5" fill="#8a6d0a" font-style="italic">propagate</text>

  <!-- ============ GIT "GLUE" BUS ============ -->
  <rect x="60" y="432" width="1480" height="86" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2.5"/>
  <text x="800" y="466" text-anchor="middle" font-size="22" font-weight="700" fill="#8a6d0a">GitAI</text>
  <text x="800" y="492" text-anchor="middle" font-size="12.5" fill="#7a5e0a" font-style="italic">git = the state of record · coordination · durability · audit — the glue that binds the federation</text>
  <text x="92" y="466" font-size="11" fill="#a98b2a">git pull</text>
  <text x="1508" y="466" text-anchor="end" font-size="11" fill="#a98b2a">git push</text>

  <!-- ============ DISTRIBUTED TEAMS ============ -->
  <!-- bus <-> team arrows (card centers 230 / 610 / 990 / 1370) -->
  <line x1="212" y1="522" x2="212" y2="578" stroke="#3b6ea5" stroke-width="2.2" marker-end="url(#inh)"/>
  <line x1="248" y1="578" x2="248" y2="522" stroke="#4a8a4a" stroke-width="2.2" stroke-dasharray="5 3" marker-end="url(#com)"/>
  <line x1="592" y1="522" x2="592" y2="578" stroke="#3b6ea5" stroke-width="2.2" marker-end="url(#inh)"/>
  <line x1="628" y1="578" x2="628" y2="522" stroke="#4a8a4a" stroke-width="2.2" stroke-dasharray="5 3" marker-end="url(#com)"/>
  <line x1="972" y1="522" x2="972" y2="578" stroke="#3b6ea5" stroke-width="2.2" marker-end="url(#inh)"/>
  <line x1="1008" y1="578" x2="1008" y2="522" stroke="#4a8a4a" stroke-width="2.2" stroke-dasharray="5 3" marker-end="url(#com)"/>
  <line x1="1352" y1="522" x2="1352" y2="578" stroke="#3b6ea5" stroke-width="2.2" marker-end="url(#inh)"/>
  <line x1="1388" y1="578" x2="1388" y2="524" stroke="#9aa3ad" stroke-width="1.6" stroke-dasharray="2 4"/>
  <text x="1398" y="554" font-size="9.5" fill="#8a8a8a" font-style="italic">read-only</text>

  <!-- ===== TEAM A · Auth (blue) ===== -->
  <rect x="65" y="582" width="330" height="298" rx="11" fill="#ffffff" stroke="#3b6ea5" stroke-width="2"/>
  <path d="M65,593 a11,11 0 0 1 11,-11 h308 a11,11 0 0 1 11,11 v27 h-330 z" fill="#3b6ea5"/>
  <text x="230" y="608" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Team A · Auth</text>
  <path d="M88,642 c0,-7 -10,-7 -10,0 c0,5 5,9 5,9 c0,0 5,-4 5,-9 z" fill="#3b6ea5"/><circle cx="83" cy="641" r="2" fill="#fff"/>
  <text x="98" y="647" font-size="10.5" fill="#888" font-style="italic">site A</text>
  <g fill="#3b6ea5"><circle cx="190" cy="692" r="9"/><ellipse cx="190" cy="717" rx="13" ry="15"/><circle cx="230" cy="692" r="9"/><ellipse cx="230" cy="717" rx="13" ry="15"/><circle cx="270" cy="692" r="9"/><ellipse cx="270" cy="717" rx="13" ry="15"/></g>
  <text x="230" y="774" text-anchor="middle" font-size="11.5" fill="#333">builds its segment</text>
  <text x="230" y="791" text-anchor="middle" font-size="11.5" fill="#333">under the one Charter</text>
  <rect x="125" y="832" width="210" height="28" rx="6" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.1"/>
  <text x="230" y="851" text-anchor="middle" font-size="11" fill="#1a4a7a">Compass: Auth</text>

  <!-- ===== TEAM B · Billing (purple) ===== -->
  <rect x="445" y="582" width="330" height="298" rx="11" fill="#ffffff" stroke="#7a5b9c" stroke-width="2"/>
  <path d="M445,593 a11,11 0 0 1 11,-11 h308 a11,11 0 0 1 11,11 v27 h-330 z" fill="#7a5b9c"/>
  <text x="610" y="608" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Team B · Billing</text>
  <path d="M468,642 c0,-7 -10,-7 -10,0 c0,5 5,9 5,9 c0,0 5,-4 5,-9 z" fill="#7a5b9c"/><circle cx="463" cy="641" r="2" fill="#fff"/>
  <text x="478" y="647" font-size="10.5" fill="#888" font-style="italic">site B</text>
  <g fill="#7a5b9c"><circle cx="570" cy="692" r="9"/><ellipse cx="570" cy="717" rx="13" ry="15"/><circle cx="610" cy="692" r="9"/><ellipse cx="610" cy="717" rx="13" ry="15"/><circle cx="650" cy="692" r="9"/><ellipse cx="650" cy="717" rx="13" ry="15"/></g>
  <text x="610" y="774" text-anchor="middle" font-size="11.5" fill="#333">builds its segment</text>
  <text x="610" y="791" text-anchor="middle" font-size="11.5" fill="#333">under the one Charter</text>
  <rect x="505" y="832" width="210" height="28" rx="6" fill="#eee0f5" stroke="#7a5b9c" stroke-width="1.1"/>
  <text x="610" y="851" text-anchor="middle" font-size="11" fill="#5a3a7a">Compass: Billing</text>

  <!-- ===== TEAM C · Reporting (green) ===== -->
  <rect x="825" y="582" width="330" height="298" rx="11" fill="#ffffff" stroke="#4a8a4a" stroke-width="2"/>
  <path d="M825,593 a11,11 0 0 1 11,-11 h308 a11,11 0 0 1 11,11 v27 h-330 z" fill="#4a8a4a"/>
  <text x="990" y="608" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Team C · Reporting</text>
  <path d="M848,642 c0,-7 -10,-7 -10,0 c0,5 5,9 5,9 c0,0 5,-4 5,-9 z" fill="#4a8a4a"/><circle cx="843" cy="641" r="2" fill="#fff"/>
  <text x="858" y="647" font-size="10.5" fill="#888" font-style="italic">site C</text>
  <g fill="#4a8a4a"><circle cx="950" cy="692" r="9"/><ellipse cx="950" cy="717" rx="13" ry="15"/><circle cx="990" cy="692" r="9"/><ellipse cx="990" cy="717" rx="13" ry="15"/><circle cx="1030" cy="692" r="9"/><ellipse cx="1030" cy="717" rx="13" ry="15"/></g>
  <text x="990" y="774" text-anchor="middle" font-size="11.5" fill="#333">builds its segment</text>
  <text x="990" y="791" text-anchor="middle" font-size="11.5" fill="#333">under the one Charter</text>
  <rect x="880" y="832" width="220" height="28" rx="6" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.1"/>
  <text x="990" y="851" text-anchor="middle" font-size="11" fill="#2a5a2a">Compass: Reporting</text>

  <!-- ===== TEAM D · Ops (DECOUPLED, grey dashed) ===== -->
  <rect x="1205" y="582" width="330" height="298" rx="11" fill="#ffffff" stroke="#8a8a8a" stroke-width="2" stroke-dasharray="7 4"/>
  <path d="M1205,593 a11,11 0 0 1 11,-11 h308 a11,11 0 0 1 11,11 v27 h-330 z" fill="#8a8a8a"/>
  <text x="1370" y="608" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Team D · Ops</text>
  <path d="M1228,642 c0,-7 -10,-7 -10,0 c0,5 5,9 5,9 c0,0 5,-4 5,-9 z" fill="#8a8a8a"/><circle cx="1223" cy="641" r="2" fill="#fff"/>
  <text x="1238" y="647" font-size="10.5" fill="#888" font-style="italic">site D</text>
  <g fill="#8a8a8a"><circle cx="1330" cy="692" r="9"/><ellipse cx="1330" cy="717" rx="13" ry="15"/><circle cx="1370" cy="692" r="9"/><ellipse cx="1370" cy="717" rx="13" ry="15"/><circle cx="1410" cy="692" r="9"/><ellipse cx="1410" cy="717" rx="13" ry="15"/></g>
  <text x="1370" y="774" text-anchor="middle" font-size="11.5" font-weight="600" fill="#5a5a5a">DECOUPLED axis</text>
  <text x="1370" y="791" text-anchor="middle" font-size="11" fill="#777">read-only on the Charter</text>
  <rect x="1285" y="832" width="170" height="28" rx="6" fill="#efefef" stroke="#8a8a8a" stroke-width="1.1"/>
  <text x="1370" y="851" text-anchor="middle" font-size="11" fill="#555">runs continuously</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="60" y="900" width="1480" height="42" rx="8" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="800" y="926" text-anchor="middle" font-size="13" fill="#5a4d20">Inherit the one Charter wherever teams sit&#160;&#160;·&#160;&#160;Git is the glue, so the codebase stays coherent&#160;&#160;·&#160;&#160;Federate physically, not just logically</text>

  <!-- ============ FOOTER (Gradus emblem + wordmark) ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="734" y="970" width="6" height="8" rx="1"/><rect x="743" y="964" width="6" height="14" rx="1"/><rect x="752" y="958" width="6" height="20" rx="1"/></g>
    <text x="766" y="978" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
