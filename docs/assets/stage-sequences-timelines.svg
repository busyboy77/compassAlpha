<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="1000" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Stage Sequences &#8212; the Shared Freeze Tail</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Each axis and lane names its own WIP stages &#8212; all converge on the same FREEZE / GATE / TAG invariant tail</text>

  <!-- shared-tail zone backdrop -->
  <rect x="980" y="124" width="476" height="690" rx="12" fill="#f4f2ea" stroke="#a89968" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="1218" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#8a6d0a">THE INVARIANT TAIL &#8212; shared shape</text>
  <text x="1218" y="167" text-anchor="middle" font-size="11.5" fill="#7a5e12" font-style="italic">freeze &#183; gate &#183; tag/sub-bump &#183; FROZEN</text>

  <!-- ===== LANE 1 · BUILD AXIS ===== -->
  <text x="44" y="216" font-size="16" font-weight="700" fill="#2a5a2a">Build axis</text>
  <text x="44" y="234" font-size="11" fill="#3a6a3a" font-style="italic">CP1 to CP3</text>
  <!-- WIP chips -->
  <g>
    <rect x="220" y="196" width="110" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="275" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">WIP-CP1</text>
    <rect x="344" y="196" width="110" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="399" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">WIP-CP2</text>
    <rect x="468" y="196" width="110" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="523" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">WIP-CP3</text>
  </g>
  <line x1="330" y1="216" x2="344" y2="216" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <line x1="454" y1="216" x2="468" y2="216" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <!-- tail -->
  <rect x="600" y="196" width="118" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="659" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6d0a">CP-FREEZE</text>
  <rect x="732" y="196" width="118" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="791" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6d0a">GATE-CHECK</text>
  <rect x="998" y="196" width="98" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1047" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">GO-TAG</text>
  <rect x="1110" y="196" width="130" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1175" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">TAGS-APPLIED</text>
  <rect x="1254" y="196" width="108" height="40" rx="8" fill="#1f2a36"/>
  <text x="1308" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FROZEN</text>
  <line x1="578" y1="216" x2="600" y2="216" stroke="#b89425" stroke-width="2" marker-end="url(#aamber)"/>
  <line x1="850" y1="216" x2="998" y2="216" stroke="#b89425" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="1096" y1="216" x2="1110" y2="216" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="1240" y1="216" x2="1254" y2="216" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- ===== LANE 2 · DOCTRINE AXIS ===== -->
  <text x="44" y="332" font-size="16" font-weight="700" fill="#2a5a2a">Doctrine axis</text>
  <text x="44" y="350" font-size="11" fill="#3a6a3a" font-style="italic">S1 to S5</text>
  <g>
    <rect x="180" y="312" width="64" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="212" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S1</text>
    <rect x="252" y="312" width="64" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="284" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S2a</text>
    <rect x="324" y="312" width="64" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="356" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S2b</text>
    <rect x="396" y="312" width="64" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="428" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S3a</text>
    <rect x="468" y="312" width="64" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="500" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S3b</text>
    <rect x="540" y="312" width="48" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="564" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S4</text>
    <rect x="596" y="312" width="48" height="40" rx="8" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.5"/>
    <text x="620" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a5a2a">S5</text>
  </g>
  <!-- tail -->
  <rect x="664" y="312" width="110" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="719" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a6d0a">CP-FREEZE</text>
  <rect x="788" y="312" width="110" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="843" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a6d0a">GATE-CHECK</text>
  <rect x="998" y="312" width="120" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1058" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4a7a">GO-SUB-BUMP</text>
  <rect x="1132" y="312" width="118" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1191" y="337" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4a7a">TAGS-APPLIED</text>
  <rect x="1264" y="312" width="98" height="40" rx="8" fill="#1f2a36"/>
  <text x="1313" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FROZEN</text>
  <line x1="644" y1="332" x2="664" y2="332" stroke="#b89425" stroke-width="2" marker-end="url(#aamber)"/>
  <line x1="898" y1="332" x2="998" y2="332" stroke="#b89425" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="1118" y1="332" x2="1132" y2="332" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="1250" y1="332" x2="1264" y2="332" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- ===== LANE 3 · POLISH ===== -->
  <text x="44" y="448" font-size="16" font-weight="700" fill="#1a4a7a">Polish lane</text>
  <text x="44" y="466" font-size="11" fill="#5a7aa0" font-style="italic">slim &#183; single-stage</text>
  <g>
    <rect x="220" y="428" width="100" height="40" rx="8" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="270" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#26425f">BRIEF</text>
    <rect x="334" y="428" width="120" height="40" rx="8" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="394" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#26425f">ASSIGNED</text>
    <rect x="468" y="428" width="150" height="40" rx="8" fill="#eef1f6" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="543" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#26425f">IMPLEMENTING</text>
  </g>
  <line x1="320" y1="448" x2="334" y2="448" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="454" y1="448" x2="468" y2="448" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <!-- slim tail: SMOKE -> COMMIT(tag) -> DONE -->
  <rect x="664" y="428" width="110" height="40" rx="8" fill="#fef8e7" stroke="#b89425" stroke-width="1.6"/>
  <text x="719" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6d0a">SMOKE</text>
  <rect x="998" y="428" width="180" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1088" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">COMMIT &#43; polish tag</text>
  <rect x="1264" y="428" width="98" height="40" rx="8" fill="#1f2a36"/>
  <text x="1313" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">DONE</text>
  <line x1="618" y1="448" x2="664" y2="448" stroke="#3b6ea5" stroke-width="2" marker-end="url(#aamber)"/>
  <line x1="774" y1="448" x2="998" y2="448" stroke="#b89425" stroke-width="2" marker-end="url(#ablue)"/>
  <line x1="1178" y1="448" x2="1264" y2="448" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- ===== LANE 4 · SURGICAL STRIKE ===== -->
  <text x="44" y="564" font-size="16" font-weight="700" fill="#8a2a2a">Surgical strike</text>
  <text x="44" y="582" font-size="11" fill="#9a3a3a" font-style="italic">slimmest &#183; mid mentor skipped</text>
  <g>
    <rect x="220" y="544" width="120" height="40" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.5"/>
    <text x="280" y="569" text-anchor="middle" font-size="11" font-weight="700" fill="#8a2a2a">REQUEST</text>
    <rect x="380" y="544" width="120" height="40" rx="8" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.5"/>
    <text x="440" y="569" text-anchor="middle" font-size="11" font-weight="700" fill="#8a2a2a">EXECUTE</text>
  </g>
  <line x1="340" y1="564" x2="380" y2="564" stroke="#c44a4a" stroke-width="2" marker-end="url(#ared)"/>
  <!-- tail: COMMIT (no tag, on trunk) -> DONE -->
  <rect x="998" y="544" width="190" height="40" rx="8" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="1093" y="569" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">COMMIT &#183; on trunk, no tag</text>
  <rect x="1264" y="544" width="98" height="40" rx="8" fill="#1f2a36"/>
  <text x="1313" y="569" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">DONE</text>
  <line x1="500" y1="564" x2="998" y2="564" stroke="#c44a4a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ablue)"/>
  <line x1="1188" y1="564" x2="1264" y2="564" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <text x="744" y="556" text-anchor="middle" font-size="10.5" fill="#9a3a3a" font-style="italic">no freeze ceremony &#8212; Doer dies after the one commit</text>

  <!-- ===== TAIL ANNOTATION BLOCK (inside dashed zone, lower) ===== -->
  <rect x="998" y="622" width="440" height="176" rx="10" fill="#fffdf6" stroke="#b89425" stroke-width="1.4"/>
  <text x="1218" y="648" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6d0a">Three structural requirements of the tail</text>
  <text x="1016" y="676" font-size="11.5" fill="#7a5e12">1 &#183; Monotonic progression &#8212; no un-advancing</text>
  <text x="1016" y="700" font-size="11.5" fill="#7a5e12">without an explicit rollback.</text>
  <text x="1016" y="726" font-size="11.5" fill="#7a5e12">2 &#183; A defined freeze-to-tag tail that gates</text>
  <text x="1016" y="746" font-size="11.5" fill="#7a5e12">ratification (FREEZE &#183; GATE &#183; TAGS-APPLIED).</text>
  <text x="1016" y="772" font-size="11.5" fill="#7a5e12">3 &#183; A terminal FROZEN state &#8212; archival;</text>
  <text x="1016" y="792" font-size="11.5" fill="#7a5e12">nothing happens to the unit after it.</text>

  <!-- divider showing where shared tail begins -->
  <line x1="980" y1="124" x2="980" y2="814" stroke="#b89425" stroke-width="1.6"/>
  <text x="968" y="600" text-anchor="end" font-size="11" fill="#8a6d0a" font-weight="700">WIP stages (tunable per lane)</text>
  <text x="992" y="600" font-size="11" fill="#8a6d0a" font-weight="700">shared invariant tail</text>

  <!-- ============ WHY + WHEN PANEL (lower-left empty zone) ============ -->
  <rect x="44" y="610" width="908" height="202" rx="11" fill="#fbfcff" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="64" y="634" font-size="14.5" font-weight="700" fill="#1a4a7a">Why the tail is the shared invariant &#8212; the gate is the trust boundary</text>
  <text x="64" y="652" font-size="11" fill="#5a6678" font-style="italic">A tag is a promise of &#8220;ratified.&#8221; The freeze-then-gate ordering is what makes that promise true rather than asserted.</text>

  <!-- mechanism: freeze -> gate -> (pass?) -> tag, with reject branch -->
  <rect x="64" y="666" width="108" height="34" rx="7" fill="#fef8e7" stroke="#b89425" stroke-width="1.5"/>
  <text x="118" y="688" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a6d0a">FREEZE</text>
  <rect x="208" y="666" width="116" height="34" rx="7" fill="#fef8e7" stroke="#b89425" stroke-width="1.5"/>
  <text x="266" y="688" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a6d0a">GATE-CHECK</text>
  <rect x="416" y="666" width="100" height="34" rx="7" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.5"/>
  <text x="466" y="688" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a4a7a">TAG</text>
  <rect x="572" y="666" width="108" height="34" rx="7" fill="#1f2a36"/>
  <text x="626" y="688" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">FROZEN</text>
  <line x1="172" y1="683" x2="206" y2="683" stroke="#b89425" stroke-width="2" marker-end="url(#aamber)"/>
  <line x1="324" y1="683" x2="414" y2="683" stroke="#4a8a4a" stroke-width="2.2" marker-end="url(#agreen)"/>
  <text x="369" y="677" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2a5a2a">pass</text>
  <line x1="516" y1="683" x2="570" y2="683" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>
  <!-- reject branch: gate fail loops back, no tag -->
  <path d="M266,700 L266,722 L118,722 L118,702" fill="none" stroke="#c44a4a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ared)"/>
  <text x="384" y="718" font-size="9.5" font-weight="700" fill="#8a2a2a">gate fail loops back &#8212; no tag is written, unit returns to WIP</text>

  <line x1="64" y1="738" x2="932" y2="738" stroke="#dde3ec" stroke-width="1"/>

  <!-- WHEN each tail step fires -->
  <text x="64" y="757" font-size="11.5" font-weight="700" fill="#26425f">When each tail step fires</text>
  <text x="64" y="775" font-size="10.5" fill="#33597f"><tspan font-weight="700">FREEZE</tspan> when the last WIP stage is declared complete &#183; <tspan font-weight="700">GATE</tspan> immediately after, runs acceptance checks</text>
  <text x="64" y="791" font-size="10.5" fill="#33597f"><tspan font-weight="700">TAG / SUB-BUMP</tspan> only once the gate passes &#8212; the ordering is what lets a tag mean &#8220;ratified&#8221;</text>
  <text x="64" y="807" font-size="10.5" fill="#33597f"><tspan font-weight="700">FROZEN</tspan> terminal &amp; archival &#8212; nothing mutates the unit after, so history stays auditable</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="44" y="838" width="1412" height="78" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="866" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">A project may rename, recount, and re-substage the WIP chips freely.</text>
  <text x="750" y="888" text-anchor="middle" font-size="13" fill="#5a4d20">What never changes is the tail shape: a gated freeze, then a tag, then archival &#8212; that is what makes a tag mean &#8220;ratified.&#8221;</text>
  <text x="750" y="908" text-anchor="middle" font-size="12.5" fill="#6a5a28" font-style="italic">Lighter lanes (Polish, Surgical) compress the tail; only Surgical commits on trunk with no freeze tag.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="950" width="6" height="8" rx="1"/><rect x="699" y="944" width="6" height="14" rx="1"/><rect x="708" y="938" width="6" height="20" rx="1"/></g>
    <text x="722" y="958" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
