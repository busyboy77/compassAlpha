<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7a5b9c"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f8a8a"/></marker>
    <marker id="aGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
  </defs>
  <rect width="1600" height="880" fill="#fafaf8"/>

  <rect x="0" y="0" width="1600" height="96" fill="#1f2a36"/>
  <text x="800" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">From Vision to Coherent Code — an AI federation's continuous cycle</text>
  <text x="800" y="70" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">Doctrine and dev are two lobes of one loop, meeting at AI-enforced coherence. The AI grows the Compass, then builds the code — cycle after cycle. The founder only relays.</text>

  <!-- FOUNDER (thin human relay) feeding the vision in -->
  <rect x="40" y="150" width="180" height="116" rx="12" fill="#fef8e7" stroke="#b89425" stroke-width="2"/>
  <circle cx="130" cy="188" r="12" fill="#b89425"/><ellipse cx="130" cy="214" rx="17" ry="14" fill="#b89425"/>
  <text x="130" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#5a4d20">Founder</text>
  <text x="130" y="259" text-anchor="middle" font-size="10" fill="#9a8740" font-style="italic">60K vision · relays only</text>
  <path d="M150 266 C 170 330, 210 360, 300 392" fill="none" stroke="#b89425" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aGold)"/>
  <text x="214" y="320" font-size="10" fill="#8a6d0a" font-style="italic">speak it</text>

  <!-- ============ THE INFINITY LOOP ============ -->
  <!-- left lobe = DOCTRINE, right lobe = DEV; they meet at the coherence hub -->
  <ellipse cx="560" cy="490" rx="258" ry="212" fill="#faf6fd" stroke="#7a5b9c" stroke-width="7"/>
  <ellipse cx="1040" cy="490" rx="258" ry="212" fill="#f4f8fc" stroke="#3b6ea5" stroke-width="7"/>

  <!-- flow direction along the loop (continuous) -->
  <path d="M 560 278 C 690 278, 760 360, 792 452" fill="none" stroke="#7a5b9c" stroke-width="3" marker-end="url(#aP)" opacity="0.9"/>
  <text x="650" y="300" text-anchor="middle" font-size="11" fill="#5a3a7a" font-style="italic">grow the Compass</text>
  <path d="M 808 528 C 840 620, 910 702, 1040 702" fill="none" stroke="#3b6ea5" stroke-width="3" marker-end="url(#aB)" opacity="0.9"/>
  <text x="980" y="724" text-anchor="middle" font-size="11" fill="#1a4a7a" font-style="italic">build the coherent code</text>
  <path d="M 1040 278 C 910 278, 840 360, 808 452" fill="none" stroke="#3b6ea5" stroke-width="3" marker-end="url(#aB)" opacity="0.55" stroke-dasharray="6 4"/>
  <text x="1015" y="300" text-anchor="middle" font-size="10.5" fill="#3b6ea5" font-style="italic">re-lock, then build</text>
  <path d="M 560 702 C 430 702, 360 620, 332 528" fill="none" stroke="#7a5b9c" stroke-width="3" marker-end="url(#aP)" opacity="0.55" stroke-dasharray="6 4"/>
  <text x="470" y="724" text-anchor="middle" font-size="10.5" fill="#7a5b9c" font-style="italic">founder walk, then regrow</text>

  <!-- LEFT lobe content: DOCTRINE -->
  <text x="540" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#5a3a7a">DOCTRINE AXIS</text>
  <text x="540" y="373" text-anchor="middle" font-size="11" fill="#7a5b9c">AI grows the Compass · Charter UNLOCKED</text>
  <g>
    <rect x="452" y="392" width="200" height="30" rx="6" fill="#f1e8f8" stroke="#7a5b9c" stroke-width="1.4"/><text x="552" y="412" text-anchor="middle" font-size="11.5" fill="#3a2a4a">60K · Ideology</text>
    <rect x="452" y="428" width="200" height="30" rx="6" fill="#e6d6f1" stroke="#7a5b9c" stroke-width="1.4"/><text x="552" y="448" text-anchor="middle" font-size="11.5" fill="#3a2a4a">30K · Mechanics</text>
    <rect x="452" y="464" width="200" height="30" rx="6" fill="#dcc6ec" stroke="#7a5b9c" stroke-width="1.4"/><text x="552" y="484" text-anchor="middle" font-size="11.5" fill="#3a2a4a">10K · Schema</text>
    <rect x="452" y="500" width="200" height="30" rx="6" fill="#d0b6e4" stroke="#7a5b9c" stroke-width="1.4"/><text x="552" y="520" text-anchor="middle" font-size="11.5" fill="#3a2a4a">G-R · Grass-root</text>
  </g>
  <text x="552" y="556" text-anchor="middle" font-size="10" fill="#7a5b9c" font-style="italic">AI tiers: Mentor-1 · Mentor-2 · Doer</text>

  <!-- RIGHT lobe content: DEV -> coherent product -->
  <text x="1060" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4a7a">DEV AXIS</text>
  <text x="1060" y="373" text-anchor="middle" font-size="11" fill="#3b6ea5">AI builds coherent code · Charter LOCKED</text>
  <g>
    <rect x="958" y="394" width="92" height="92" rx="7" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
    <path d="M958,401 a7,7 0 0 1 7,-7 h78 a7,7 0 0 1 7,7 v13 h-92 z" fill="#3b6ea5"/><text x="1004" y="409" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Auth</text>
    <rect x="970" y="424" width="68" height="6" rx="2" fill="#cfe0f0"/><rect x="970" y="438" width="68" height="6" rx="2" fill="#cfe0f0"/><rect x="970" y="452" width="46" height="6" rx="2" fill="#cfe0f0"/>
    <rect x="1062" y="394" width="92" height="92" rx="7" fill="#ffffff" stroke="#7a5b9c" stroke-width="1.4"/>
    <path d="M1062,401 a7,7 0 0 1 7,-7 h78 a7,7 0 0 1 7,7 v13 h-92 z" fill="#7a5b9c"/><text x="1108" y="409" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Billing</text>
    <rect x="1074" y="424" width="68" height="6" rx="2" fill="#e3d6ef"/><rect x="1074" y="438" width="68" height="6" rx="2" fill="#e3d6ef"/><rect x="1074" y="452" width="46" height="6" rx="2" fill="#e3d6ef"/>
    <rect x="1166" y="394" width="92" height="92" rx="7" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.4"/>
    <path d="M1166,401 a7,7 0 0 1 7,-7 h78 a7,7 0 0 1 7,7 v13 h-92 z" fill="#4a8a4a"/><text x="1212" y="409" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">Reporting</text>
    <rect x="1178" y="424" width="68" height="6" rx="2" fill="#d3e6d3"/><rect x="1178" y="438" width="68" height="6" rx="2" fill="#d3e6d3"/><rect x="1178" y="452" width="46" height="6" rx="2" fill="#d3e6d3"/>
  </g>
  <text x="1060" y="506" text-anchor="middle" font-size="10.5" fill="#1a4a7a">every module, one canonical way</text>
  <text x="1060" y="524" text-anchor="middle" font-size="10.5" fill="#2a5a8a">no duplication · no drift</text>
  <text x="1060" y="556" text-anchor="middle" font-size="10" fill="#3b6ea5" font-style="italic">AI tiers: Mentor-1 · Mentor-2 · Doer</text>

  <!-- CENTER HUB: AI-enforced coherence (the crossover both lobes pass through) -->
  <rect x="686" y="416" width="228" height="148" rx="14" fill="#d8efef" stroke="#1f8a8a" stroke-width="2.4"/>
  <text x="800" y="446" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a6a">AI-enforced</text>
  <text x="800" y="465" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a6a">codebase coherence</text>
  <line x1="708" y1="478" x2="892" y2="478" stroke="#1f8a8a" opacity="0.4"/>
  <text x="800" y="498" text-anchor="middle" font-size="10" fill="#0f6a6a">the one doctrine the AI</text>
  <text x="800" y="513" text-anchor="middle" font-size="10" fill="#0f6a6a">builds against at every step</text>
  <text x="800" y="534" text-anchor="middle" font-size="9.5" fill="#0f6a6a" font-style="italic">Charter · Invariants · Primitives</text>
  <text x="800" y="551" text-anchor="middle" font-size="9.5" fill="#0f6a6a" font-style="italic">cite-by-substrate</text>

  <!-- WHY AI -->
  <rect x="40" y="752" width="1518" height="64" rx="8" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="800" y="777" text-anchor="middle" font-size="13" font-weight="600" fill="#5a4d20">Why an AI federation: it carries the vision faithfully through every altitude, enforces one canonical way at each step, and sustains coherence as the codebase grows —</text>
  <text x="800" y="797" text-anchor="middle" font-size="12.5" fill="#7a6a30">depth, speed, and consistency a single human pass can't hold. The founder stays a low-load relay; the AI does the building, coherently.</text>

  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="734" y="838" width="6" height="8" rx="1"/><rect x="743" y="832" width="6" height="14" rx="1"/><rect x="752" y="826" width="6" height="20" rx="1"/></g>
    <text x="766" y="846" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>
</svg>
