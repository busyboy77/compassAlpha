<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="680" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="680" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Verify at Citation — the loop before you act</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">Before acting on anything you "remember", run these five steps — the hallucination is caught at verification, not in production</text>

  <!-- step 1 -->
  <rect x="50" y="150" width="240" height="84" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.8"/>
  <text x="170" y="180" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a3a4a">1 · state the claim</text>
  <text x="170" y="202" text-anchor="middle" font-size="10" fill="#3a4a5a">"I believe X is true"</text>
  <text x="170" y="218" text-anchor="middle" font-size="10" fill="#5a6a7a" font-style="italic">say it out loud first</text>
  <line x1="290" y1="192" x2="330" y2="192" stroke="#5a6a7a" stroke-width="2.4" marker-end="url(#ad)"/>

  <!-- step 2 -->
  <rect x="334" y="150" width="240" height="84" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.8"/>
  <text x="454" y="180" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a3a4a">2 · locate the substrate</text>
  <text x="454" y="202" text-anchor="middle" font-size="10" fill="#3a4a5a">which file @ tag should</text>
  <text x="454" y="218" text-anchor="middle" font-size="10" fill="#3a4a5a">contain X?</text>
  <line x1="574" y1="192" x2="614" y2="192" stroke="#5a6a7a" stroke-width="2.4" marker-end="url(#ad)"/>

  <!-- step 3 -->
  <rect x="618" y="150" width="240" height="84" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.8"/>
  <text x="738" y="180" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a3a4a">3 · read the frozen blob</text>
  <text x="738" y="202" text-anchor="middle" font-size="10" fill="#3a4a5a" font-family="JetBrains Mono, monospace">git show &lt;tag&gt;:&lt;file&gt;</text>
  <text x="738" y="218" text-anchor="middle" font-size="10" fill="#5a6a7a" font-style="italic">not the worktree</text>
  <line x1="858" y1="192" x2="898" y2="192" stroke="#5a6a7a" stroke-width="2.4" marker-end="url(#ad)"/>

  <!-- step 4 decision diamond -->
  <polygon points="1080,150 1180,234 1080,318 980,234" fill="#fff" stroke="#5a6a7a" stroke-width="2"/>
  <text x="1080" y="222" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a3a4a">4 · compare</text>
  <text x="1080" y="242" text-anchor="middle" font-size="11" fill="#3a4a5a">claim = blob?</text>

  <!-- match -> proceed (up-right) -->
  <line x1="1180" y1="234" x2="1240" y2="192" stroke="#4a8a4a" stroke-width="2.6" marker-end="url(#ag)"/>
  <text x="1208" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">MATCH</text>
  <rect x="1250" y="150" width="200" height="84" rx="10" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <text x="1350" y="180" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">5a · proceed</text>
  <text x="1350" y="202" text-anchor="middle" font-size="10" fill="#3a6a3a">act, and cite the</text>
  <text x="1350" y="218" text-anchor="middle" font-size="10" fill="#3a6a3a">substrate (file @ tag)</text>

  <!-- mismatch -> correct (down-right) -->
  <line x1="1180" y1="234" x2="1240" y2="300" stroke="#c44a4a" stroke-width="2.6" marker-end="url(#ar)"/>
  <text x="1212" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#8a2a2a">MISMATCH</text>
  <rect x="1250" y="298" width="200" height="84" rx="10" fill="#fdeaea" stroke="#c44a4a" stroke-width="1.8"/>
  <text x="1350" y="328" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a2a2a">5b · correct</text>
  <text x="1350" y="350" text-anchor="middle" font-size="10" fill="#9a3a3a">it was a hallucination —</text>
  <text x="1350" y="366" text-anchor="middle" font-size="10" fill="#9a3a3a">fix the claim, then act</text>

  <!-- correction loops back to substrate truth -->
  <path d="M1250,340 C900,420 700,360 738,246" fill="none" stroke="#c44a4a" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <text x="900" y="404" text-anchor="middle" font-size="10.5" fill="#9a3a3a" font-style="italic">the substrate value replaces the wrong memory</text>

  <!-- CAPTION -->
  <rect x="50" y="448" width="1400" height="184" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.3"/>
  <text x="750" y="478" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2a3a4a">Treat every recollection as a claim to be checked — not a fact to be used.</text>
  <text x="750" y="506" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Why:</tspan> a confident-but-false memory acted on becomes the premise for the next decision, and the drift compounds. Checking at the moment of citation stops it at step 4, before any harm.</text>
  <text x="750" y="526" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">When:</tspan> mandatory for invariant-class claims — architectural facts, primitives, prior decisions, founder rulings. A throwaway aside doesn't need the loop; a load-bearing claim always does.</text>
  <text x="750" y="546" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Where:</tspan> the read is always against the frozen blob at the tag — a worktree can have drifted, so re-verify against the committed artifact, not the checkout in front of you.</text>
  <text x="750" y="574" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">This is the procedure behind "cite by substrate" — the hallucination defense made into a habit.</text>
  <text x="750" y="600" text-anchor="middle" font-size="11" fill="#5a6a7a">A separate failure — an honestly-recorded snapshot that simply rotted — is caught by stale-snapshot detection, not this loop.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="650" width="6" height="6" rx="1"/><rect x="699" y="646" width="6" height="10" rx="1"/><rect x="708" y="642" width="6" height="14" rx="1"/></g>
    <text x="722" y="656" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
