<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 960" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
  </defs>

  <rect width="1500" height="960" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Choosing Your Retrieval Pathway</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Two lanes, one gate &#8212; a zero-setup default for everyone, an opt-in vector lane for the few who need it</text>

  <!-- ============ DECISION GATE ============ -->
  <rect x="530" y="118" width="440" height="96" rx="14" fill="#f0ede4" stroke="#a89968" stroke-width="2"/>
  <text x="750" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3f18">Decision gate</text>
  <text x="750" y="168" text-anchor="middle" font-size="11.5" fill="#5a4d20">Real semantic misses <tspan font-weight="700">AND</tspan> loop control / will provision infra?</text>
  <text x="750" y="194" text-anchor="middle" font-size="11" fill="#6a5a28" font-style="italic">most adopters: no &#8212; and that's the point</text>

  <!-- branch arrows -->
  <path d="M560,214 C460,244 410,256 388,278" fill="none" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <text x="430" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">NO &#183; stay default</text>
  <path d="M940,214 C1060,244 1090,256 1112,278" fill="none" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <text x="1075" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#1a4a7a">YES &#183; go vector</text>

  <!-- =================================================================== -->
  <!-- ============ LANE A · DEFAULT (lexical) ========================== -->
  <!-- =================================================================== -->
  <rect x="60" y="282" width="640" height="358" rx="12" fill="#eef6ee" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="60" y="282" width="640" height="54" rx="12" fill="#e0f0e0"/>
  <rect x="60" y="318" width="640" height="18" fill="#e0f0e0"/>
  <text x="380" y="309" text-anchor="middle" font-size="17" font-weight="700" fill="#2a5a2a">LANE A &#183; DEFAULT &#8212; start here</text>
  <text x="380" y="329" text-anchor="middle" font-size="12.5" fill="#3a6a3a" font-style="italic">lexical / grep-grade</text>

  <!-- HOW chip -->
  <rect x="90" y="352" width="580" height="56" rx="9" fill="#ffffff" stroke="#4a8a4a" stroke-width="1.6"/>
  <text x="106" y="375" font-size="11.5" font-weight="700" fill="#2a5a2a">HOW</text>
  <text x="380" y="375" text-anchor="middle" font-size="11.5" fill="#3a6a3a" font-family="JetBrains Mono, monospace">git grep / ripgrep &#183; path- &amp; tag-scoped</text>
  <text x="380" y="394" text-anchor="middle" font-size="10.5" fill="#5a7a5a" font-style="italic">native to the harness &#8212; nothing to stand up</text>

  <!-- WHY chips -->
  <rect x="90" y="420" width="580" height="32" rx="7" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="380" y="441" text-anchor="middle" font-size="11.5" fill="#2a5a2a">zero setup &#183; no vendor &#183; no embeddings &#183; no added budget</text>
  <rect x="90" y="458" width="580" height="32" rx="7" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="380" y="479" text-anchor="middle" font-size="11.5" fill="#2a5a2a">immediate relief &#8212; pull the slice, not the file</text>
  <rect x="90" y="496" width="580" height="32" rx="7" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.2"/>
  <text x="380" y="517" text-anchor="middle" font-size="11.5" fill="#2a5a2a">every adopter &#183; any harness</text>

  <!-- stamp -->
  <rect x="218" y="556" width="324" height="56" rx="10" fill="#4a8a4a"/>
  <polyline points="250,586 262,598 286,572" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="410" y="582" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">you already have it</text>
  <text x="410" y="601" text-anchor="middle" font-size="10.5" fill="#dff0df">turn it on &#183; stop here</text>

  <!-- =================================================================== -->
  <!-- ============ LANE B · ADVANCED (vector) ========================== -->
  <!-- =================================================================== -->
  <rect x="800" y="282" width="640" height="358" rx="12" fill="#eaf1f8" stroke="#3b6ea5" stroke-width="2"/>
  <rect x="800" y="282" width="640" height="54" rx="12" fill="#dce8f4"/>
  <rect x="800" y="318" width="640" height="18" fill="#dce8f4"/>
  <text x="1120" y="309" text-anchor="middle" font-size="17" font-weight="700" fill="#1a4a7a">LANE B &#183; ADVANCED &#8212; opt-in</text>
  <text x="1120" y="329" text-anchor="middle" font-size="12.5" fill="#3b6ea5" font-style="italic">embeddings / vector &#183; bring-your-own-infra</text>

  <!-- HOW chip -->
  <rect x="830" y="352" width="580" height="40" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.6"/>
  <text x="846" y="377" font-size="11.5" font-weight="700" fill="#1a4a7a">HOW</text>
  <text x="1130" y="377" text-anchor="middle" font-size="11.5" fill="#2a527a">embeddings &#8594; vector store &#8594; query &#8594; pointer</text>

  <!-- WHERE: harness wiring -->
  <rect x="830" y="402" width="282" height="78" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="971" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">Claude Code</text>
  <text x="971" y="444" text-anchor="middle" font-size="10.5" fill="#2a527a">&#8594; via MCP server / tool</text>
  <text x="971" y="462" text-anchor="middle" font-size="10" fill="#5a7aa0" font-style="italic">consume; don't host the index</text>
  <rect x="1128" y="402" width="282" height="78" rx="9" fill="#ffffff" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="1269" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4a7a">Local model (Qwen&#8230;)</text>
  <text x="1269" y="444" text-anchor="middle" font-size="10.5" fill="#2a527a">&#8594; baked into the loop</text>
  <text x="1269" y="462" text-anchor="middle" font-size="10" fill="#5a7aa0" font-style="italic">full loop control &#183; natural fit</text>

  <!-- WHY chip -->
  <rect x="830" y="490" width="580" height="32" rx="7" fill="#dce8f4" stroke="#3b6ea5" stroke-width="1.2"/>
  <text x="1120" y="511" text-anchor="middle" font-size="11.5" fill="#1a4a7a">for real semantic misses only &#183; you provision the infra</text>

  <!-- reference chip (amber) -->
  <rect x="830" y="528" width="580" height="84" rx="9" fill="#fbf3e2" stroke="#c79a3a" stroke-width="1.6"/>
  <text x="1120" y="551" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7a5a18">reference setup (swappable, not mandated)</text>
  <text x="1120" y="572" text-anchor="middle" font-size="10.8" fill="#6a4f18">Contextual Retrieval + embeddings (Voyage / any) + vector store + MCP</text>
  <text x="1120" y="592" text-anchor="middle" font-size="10" fill="#8a6a28" font-style="italic">Anthropic ships no first-party embeddings &#8212; bring your own; every part is replaceable</text>

  <!-- ============ CONSTRAINTS STRIP (binds both) ============ -->
  <rect x="60" y="662" width="1380" height="84" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="690" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">Both lanes obey the same three constraints &#8212; no harness exemption</text>
  <text x="750" y="714" text-anchor="middle" font-size="12.5" fill="#5a4d20"><tspan font-weight="700">tier-partitioned scope</tspan> &#183; <tspan font-weight="700">as-of + re-verify the frozen blob</tspan> &#183; <tspan font-weight="700">pointer-not-truth (rebuildable cache)</tspan></text>
  <text x="750" y="734" text-anchor="middle" font-size="12" fill="#6a5a28" font-style="italic">MCP-wired or baked-in, the partition is a property of the index, not the agent that queries it.</text>

  <!-- arrows from lanes into the strip -->
  <line x1="380" y1="640" x2="380" y2="662" stroke="#4a8a4a" stroke-width="2" marker-end="url(#agreen)"/>
  <line x1="1120" y1="640" x2="1120" y2="662" stroke="#3b6ea5" stroke-width="2" marker-end="url(#ablue)"/>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="900" width="6" height="8" rx="1"/><rect x="699" y="894" width="6" height="14" rx="1"/><rect x="708" y="888" width="6" height="20" rx="1"/></g>
    <text x="722" y="908" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
