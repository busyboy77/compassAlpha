<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="760" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="1500" height="760" fill="#fafaf8"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1500" height="90" fill="#1f2a36"/>
  <text x="750" y="40" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Work-Granularity Lanes</text>
  <text x="750" y="67" text-anchor="middle" font-size="13.5" fill="#a0aabb" font-style="italic">Match the ceremony to the size of the change — the same federation handles a Charter amendment and a one-line fix, at very different weights</text>

  <!-- axis labels -->
  <text x="60" y="128" font-size="12" font-weight="700" fill="#33445a">HEAVIER change &#183; more ceremony</text>
  <text x="1440" y="128" text-anchor="end" font-size="12" font-weight="700" fill="#33445a">LIGHTER change &#183; less ceremony</text>
  <line x1="60" y1="138" x2="1440" y2="138" stroke="#c9c3b4" stroke-width="2"/>
  <polygon points="1440,138 1430,133 1430,143" fill="#c9c3b4"/>

  <!-- descending staircase of 4 lanes -->
  <!-- Lane 1 · Doctrine Cycle (tallest) -->
  <rect x="60" y="160" width="330" height="430" rx="12" fill="#f0ede4" stroke="#a89968" stroke-width="2"/>
  <rect x="60" y="160" width="330" height="46" rx="12" fill="#e7e0cf"/><rect x="60" y="188" width="330" height="18" fill="#e7e0cf"/>
  <text x="225" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3f18">Doctrine Cycle</text>
  <text x="225" y="234" text-anchor="middle" font-size="11" fill="#6a5a28" font-style="italic">cross-module structural change</text>
  <text x="225" y="262" text-anchor="middle" font-size="11.5" fill="#5a4d20">new primitive · new invariant</text>
  <text x="225" y="280" text-anchor="middle" font-size="11.5" fill="#5a4d20">· Charter amendment</text>
  <rect x="84" y="306" width="282" height="30" rx="6" fill="#fff" stroke="#a89968" stroke-width="1.1"/><text x="225" y="326" text-anchor="middle" font-size="10.5" fill="#5a4d20">tiers: full 3-tier (doctrine axis)</text>
  <rect x="84" y="344" width="282" height="30" rx="6" fill="#fff" stroke="#a89968" stroke-width="1.1"/><text x="225" y="364" text-anchor="middle" font-size="10.5" fill="#5a4d20">gates: full + ratification package</text>
  <rect x="84" y="382" width="282" height="30" rx="6" fill="#fff" stroke="#a89968" stroke-width="1.1"/><text x="225" y="402" text-anchor="middle" font-size="10.5" fill="#5a4d20">stages: S1 → S5</text>
  <text x="225" y="446" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4a3f18">⏱ weeks</text>
  <text x="225" y="566" text-anchor="middle" font-size="10" fill="#7a6a38" font-style="italic">the heaviest lane —<tspan x="225" dy="14">every other lane relaxes this</tspan></text>

  <!-- Lane 2 · Phase 3 -->
  <rect x="408" y="240" width="330" height="350" rx="12" fill="#eef4f9" stroke="#3b6ea5" stroke-width="2"/>
  <rect x="408" y="240" width="330" height="46" rx="12" fill="#dce8f4"/><rect x="408" y="268" width="330" height="18" fill="#dce8f4"/>
  <text x="573" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="#1a4a7a">Phase 3 dispatch</text>
  <text x="573" y="314" text-anchor="middle" font-size="11" fill="#3b6ea5" font-style="italic">substantive single-module change</text>
  <text x="573" y="342" text-anchor="middle" font-size="11.5" fill="#26425f">new table · endpoints · a job</text>
  <rect x="432" y="362" width="282" height="30" rx="6" fill="#fff" stroke="#3b6ea5" stroke-width="1.1"/><text x="573" y="382" text-anchor="middle" font-size="10.5" fill="#26425f">tiers: full 3-tier (build axis)</text>
  <rect x="432" y="400" width="282" height="30" rx="6" fill="#fff" stroke="#3b6ea5" stroke-width="1.1"/><text x="573" y="420" text-anchor="middle" font-size="10.5" fill="#26425f">gates: 4 gates + tag</text>
  <rect x="432" y="438" width="282" height="30" rx="6" fill="#fff" stroke="#3b6ea5" stroke-width="1.1"/><text x="573" y="458" text-anchor="middle" font-size="10.5" fill="#26425f">stages: CP1 → CP3</text>
  <text x="573" y="500" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a4a7a">⏱ days–a week</text>

  <!-- Lane 3 · Polish -->
  <rect x="756" y="330" width="330" height="260" rx="12" fill="#f1f6f1" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="756" y="330" width="330" height="46" rx="12" fill="#e0f0e0"/><rect x="756" y="358" width="330" height="18" fill="#e0f0e0"/>
  <text x="921" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#2a5a2a">Polish lane</text>
  <text x="921" y="404" text-anchor="middle" font-size="11" fill="#3a6a3a" font-style="italic">small, stable-surface change</text>
  <text x="921" y="432" text-anchor="middle" font-size="11.5" fill="#2a5a2a">copy · UI tweak · minor bug</text>
  <rect x="780" y="452" width="282" height="30" rx="6" fill="#fff" stroke="#4a8a4a" stroke-width="1.1"/><text x="921" y="472" text-anchor="middle" font-size="10.5" fill="#2a5a2a">tiers: lighter · trimmed gates</text>
  <text x="921" y="516" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a5a2a">⏱ hours</text>

  <!-- Lane 4 · Surgical (shortest) -->
  <rect x="1104" y="410" width="330" height="180" rx="12" fill="#fbf3e2" stroke="#c79a3a" stroke-width="2"/>
  <rect x="1104" y="410" width="330" height="46" rx="12" fill="#f4e6c6"/><rect x="1104" y="438" width="330" height="18" fill="#f4e6c6"/>
  <text x="1269" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#7a5a18">Surgical strike</text>
  <text x="1269" y="484" text-anchor="middle" font-size="11" fill="#8a6a28" font-style="italic">tiny, one-file change</text>
  <text x="1269" y="510" text-anchor="middle" font-size="11.5" fill="#7a5a18">a typo · a constant · a flag</text>
  <text x="1269" y="540" text-anchor="middle" font-size="10.5" fill="#8a6a28">minimal ceremony</text>
  <text x="1269" y="566" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a5a18">⏱ minutes</text>

  <!-- CAPTION -->
  <rect x="60" y="618" width="1380" height="106" rx="10" fill="#eef2f6" stroke="#5a6a7a" stroke-width="1.3"/>
  <text x="750" y="646" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2a3a4a">One federation, four weights — pick the lane that fits the change.</text>
  <text x="750" y="668" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Why:</tspan> over-ceremony a one-line fix and you waste days; under-ceremony a structural change and you race the rules. The triage rule routes by what the change touches.</text>
  <text x="750" y="688" text-anchor="middle" font-size="12" fill="#3a4a5a"><tspan font-weight="700">Where:</tspan> touches primitives/invariants → Doctrine Cycle; a whole module feature → Phase 3; a stable-surface tweak → Polish; a one-file edit → Surgical.</text>
  <text x="750" y="708" text-anchor="middle" font-size="11.5" fill="#5a6a7a" font-style="italic">How: each lighter lane is a relaxation of the Doctrine Cycle — learn the heaviest once, and the rest is subtraction.</text>

  <!-- FOOTER -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="734" width="6" height="6" rx="1"/><rect x="699" y="730" width="6" height="10" rx="1"/><rect x="708" y="726" width="6" height="14" rx="1"/></g>
    <text x="722" y="740" font-size="12" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
