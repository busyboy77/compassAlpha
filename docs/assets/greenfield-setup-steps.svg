<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 1010" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4a8a4a"/></marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/></marker>
    <marker id="aamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b89425"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c44a4a"/></marker>
  </defs>

  <rect width="1500" height="1010" fill="#fafaf8"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1500" height="98" fill="#1f2a36"/>
  <text x="750" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Greenfield Setup &#8212; Seven Steps</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#a0aabb" font-style="italic">Stand up a fresh federation from nothing &#8212; each step produces real artifacts on disk, committed and pushed</text>

  <!-- ============ STEP CHIPS (left column) ============ -->
  <!-- helper: each step is a chip; arrow down to next -->

  <!-- step 1 -->
  <rect x="60" y="132" width="760" height="84" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <circle cx="100" cy="174" r="22" fill="#3b6ea5"/>
  <text x="100" y="181" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">1</text>
  <text x="140" y="166" font-size="15" font-weight="700" fill="#1a4a7a">Create the two repos as siblings</text>
  <text x="140" y="188" font-size="11.5" fill="#5a7aa0">git init substrate + reviewer-state; add a remote to each. Never nested.</text>
  <text x="140" y="206" font-size="11" fill="#33597f" font-style="italic">produces &#8212; two sibling repos with origins</text>

  <!-- step 2 -->
  <rect x="60" y="244" width="760" height="84" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <circle cx="100" cy="286" r="22" fill="#3b6ea5"/>
  <text x="100" y="293" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">2</text>
  <text x="140" y="278" font-size="15" font-weight="700" fill="#1a4a7a">Drop the master into reviewer-state</text>
  <text x="140" y="300" font-size="11.5" fill="#5a7aa0">Copy the master protocol to the reviewer-state root. Customise via tunables, not edits.</text>
  <text x="140" y="318" font-size="11" fill="#33597f" font-style="italic">produces &#8212; master protocol at the root</text>

  <!-- step 3 -->
  <rect x="60" y="356" width="760" height="84" rx="11" fill="#dfeaf5" stroke="#3b6ea5" stroke-width="1.8"/>
  <circle cx="100" cy="398" r="22" fill="#3b6ea5"/>
  <text x="100" y="405" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">3</text>
  <text x="140" y="390" font-size="15" font-weight="700" fill="#1a4a7a">Author the canonical state artifacts</text>
  <text x="140" y="412" font-size="11.5" fill="#5a7aa0">CLAUDE.md, LEDGER, LEFTOVERS, HANDOVER_LOG/PROTOCOL, memory/MEMORY. Commit + push.</text>
  <text x="140" y="430" font-size="11" fill="#33597f" font-style="italic">produces &#8212; the federation&#8217;s running memory</text>

  <!-- step 4 -->
  <rect x="60" y="468" width="760" height="84" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <circle cx="100" cy="510" r="22" fill="#4a8a4a"/>
  <text x="100" y="517" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">4</text>
  <text x="140" y="502" font-size="15" font-weight="700" fill="#2a5a2a">Lay out the bus inbox tree</text>
  <text x="140" y="524" font-size="11.5" fill="#3a6a3a">Inbox-in-destination-folder; a sender writes into the recipient&#8217;s inbox. Add .gitkeep.</text>
  <text x="140" y="542" font-size="11" fill="#2a5a2a" font-style="italic">produces &#8212; the bus tree, ready for the first dispatch</text>

  <!-- step 5 -->
  <rect x="60" y="580" width="760" height="84" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="1.8"/>
  <circle cx="100" cy="622" r="22" fill="#4a8a4a"/>
  <text x="100" y="629" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">5</text>
  <text x="140" y="614" font-size="15" font-weight="700" fill="#2a5a2a">Stamp your three tiers</text>
  <text x="140" y="636" font-size="11.5" fill="#3a6a3a">A CLAUDE.md per tier turns a generic session into Mentor-1 / Mentor-2 / Doer.</text>
  <text x="140" y="654" font-size="11" fill="#2a5a2a" font-style="italic">produces &#8212; tier stamps (Doer brief composed per slice)</text>

  <!-- step 6 -->
  <rect x="60" y="692" width="760" height="84" rx="11" fill="#fef8e7" stroke="#b89425" stroke-width="1.8"/>
  <circle cx="100" cy="734" r="22" fill="#b89425"/>
  <text x="100" y="741" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">6</text>
  <text x="140" y="726" font-size="15" font-weight="700" fill="#8a6d0a">Declare your first axis</text>
  <text x="140" y="748" font-size="11.5" fill="#9a7a1a">A thin AXIS_BUILD.md naming tiers + bindings; everything substantive is inherited.</text>
  <text x="140" y="766" font-size="11" fill="#8a6d0a" font-style="italic">produces &#8212; AXIS_BUILD.md declaration</text>

  <!-- step 7 -->
  <rect x="60" y="804" width="760" height="84" rx="11" fill="#e0f0e0" stroke="#4a8a4a" stroke-width="2.2"/>
  <circle cx="100" cy="846" r="22" fill="#2a5a2a"/>
  <text x="100" y="853" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">7</text>
  <text x="140" y="838" font-size="15" font-weight="700" fill="#2a5a2a">Keep the first dispatch deliberately small</text>
  <text x="140" y="860" font-size="11.5" fill="#3a6a3a">Prove the rhythm with a one-file change &#8212; LAYGO pacing. Then trust the machinery.</text>
  <text x="140" y="878" font-size="11" fill="#2a5a2a" font-style="italic">produces &#8212; first dispatch &#8212; ready for first boot</text>

  <!-- step-to-step arrows -->
  <line x1="40" y1="216" x2="40" y2="244" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="40" y1="328" x2="40" y2="356" stroke="#3b6ea5" stroke-width="2.4" marker-end="url(#ablue)"/>
  <line x1="40" y1="440" x2="40" y2="468" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="40" y1="552" x2="40" y2="580" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>
  <line x1="40" y1="664" x2="40" y2="692" stroke="#b89425" stroke-width="2.4" marker-end="url(#aamber)"/>
  <line x1="40" y1="776" x2="40" y2="804" stroke="#4a8a4a" stroke-width="2.4" marker-end="url(#agreen)"/>

  <!-- ============ FOLDER STRUCTURE (right column) ============ -->
  <rect x="858" y="132" width="582" height="756" rx="12" fill="#ffffff" stroke="#9aa3b0" stroke-width="1.6"/>
  <rect x="858" y="132" width="582" height="40" rx="12" fill="#33445a"/>
  <rect x="858" y="152" width="582" height="20" fill="#33445a"/>
  <text x="1149" y="159" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">The folder structure that emerges</text>

  <text x="884" y="200" font-size="12.5" font-weight="700" fill="#2a5a2a">/path/to/substrate/</text>
  <text x="906" y="220" font-size="11.5" fill="#6a7585" font-style="italic">the project you build (its own remote)</text>

  <text x="884" y="252" font-size="12.5" font-weight="700" fill="#1a4a7a">/path/to/reviewer-state/</text>
  <text x="906" y="274" font-size="11.5" fill="#33597f">COMPASS_ALPHA_FRAMEWORK_v0.1.md   &#8212; master</text>
  <text x="906" y="294" font-size="11.5" fill="#33597f">CLAUDE.md &#183; LEDGER.md &#183; LEFTOVERS.md</text>
  <text x="906" y="314" font-size="11.5" fill="#33597f">HANDOVER_LOG.md &#183; HANDOVER_PROTOCOL.md</text>
  <text x="906" y="334" font-size="11.5" fill="#33597f">AXIS_BUILD.md   &#8212; the first axis</text>
  <text x="906" y="354" font-size="11.5" fill="#33597f">memory/MEMORY.md</text>

  <text x="906" y="386" font-size="12" font-weight="700" fill="#1a4a7a">tier-1-mentor/   &#8212; Mentor-1 home</text>
  <text x="928" y="406" font-size="11.5" fill="#33597f">CLAUDE.md   &#8212; tier stamp</text>
  <text x="928" y="426" font-size="11.5" fill="#33597f">LEDGER.md &#183; LEFTOVERS.md &#183; HANDOVER_LOG.md</text>
  <text x="928" y="446" font-size="11.5" fill="#3a6a3a">inbox/&lt;scope&gt;/   &#8212; Mentor-1 inbox</text>

  <text x="928" y="478" font-size="12" font-weight="700" fill="#1a4a7a">tier-2-orchestrator/   &#8212; Mentor-2 home</text>
  <text x="950" y="498" font-size="11.5" fill="#33597f">CLAUDE.md   &#8212; tier stamp</text>
  <text x="950" y="518" font-size="11.5" fill="#33597f">LEDGER.md &#183; LEFTOVERS.md &#183; HANDOVER_LOG.md</text>
  <text x="950" y="538" font-size="11.5" fill="#3a6a3a">inbox/   &#8212; Mentor-2 inbox</text>

  <text x="950" y="570" font-size="12" font-weight="700" fill="#2a5a2a">&lt;slice&gt;/</text>
  <text x="972" y="590" font-size="11.5" fill="#3a6a3a">inbox/   &#8212; Doer inbox for this slice</text>
  <text x="972" y="610" font-size="11.5" fill="#6a7585" font-style="italic">Doer brief composed here per dispatch</text>

  <!-- tier-tree connecting guides -->
  <line x1="894" y1="392" x2="894" y2="450" stroke="#cfcabc" stroke-width="1.4"/>
  <line x1="916" y1="484" x2="916" y2="542" stroke="#cfcabc" stroke-width="1.4"/>
  <line x1="938" y1="576" x2="938" y2="600" stroke="#cfcabc" stroke-width="1.4"/>

  <!-- naming note inside folder panel -->
  <rect x="884" y="636" width="532" height="92" rx="9" fill="#f4f9f4" stroke="#4a8a4a" stroke-width="1.4"/>
  <text x="900" y="660" font-size="12" font-weight="700" fill="#2a5a2a">Inbox filenames are single-writer by construction</text>
  <text x="900" y="682" font-size="11" fill="#3a6a3a">from-&lt;sender-tier&gt;-&lt;event&gt;[-&lt;discriminator&gt;].md</text>
  <text x="900" y="702" font-size="10.5" fill="#6a7585">e.g. from-mentor1-rulings.md &#183; from-mentor2-s1-brief.md &#183; from-doer-s1-digest.md</text>
  <text x="900" y="720" font-size="10.5" fill="#6a7585" font-style="italic">parallel writers never collide &#183; inbox files ARE the audit trail</text>

  <!-- axis declaration note -->
  <rect x="884" y="742" width="532" height="128" rx="9" fill="#fef8e7" stroke="#b89425" stroke-width="1.4"/>
  <text x="900" y="766" font-size="12" font-weight="700" fill="#8a6d0a">AXIS_BUILD.md (thin &#8212; everything else inherited)</text>
  <text x="900" y="788" font-size="11" fill="#9a7a1a">AXIS NAME: build &#183; DELIVERABLE TYPE: code</text>
  <text x="900" y="808" font-size="11" fill="#9a7a1a">TIER ROLE NAMES: Mentor-1 / Mentor-2 / Doer</text>
  <text x="900" y="828" font-size="11" fill="#9a7a1a">CYCLE: dispatch &#183; CP1 to CP2 to CP3 to close</text>
  <text x="900" y="848" font-size="11" fill="#9a7a1a">CHARTER POSTURE: LOCKED &#183; LOCALITY: host-of-substrate</text>
  <text x="900" y="866" font-size="10.5" fill="#8a6d0a" font-style="italic">rename roles freely &#8212; the framework cares about the three positions, not labels</text>

  <!-- ============ CAPTION STRIP ============ -->
  <rect x="60" y="908" width="1380" height="56" rx="10" fill="#f0ede4" stroke="#a89968" stroke-width="1.3"/>
  <text x="750" y="932" text-anchor="middle" font-size="14" font-weight="700" fill="#4a3f18">About a day of setup &#8212; two repos, stamped tiers, a first axis, a bus tree. Nothing load-bearing stays in your head.</text>
  <text x="750" y="954" text-anchor="middle" font-size="12.5" fill="#5a4d20">Every step produces real artifacts committed and pushed; with all boxes ticked you boot the first session.</text>

  <!-- ============ FOOTER ============ -->
  <a href="https://gradus.pk" xlink:href="https://gradus.pk" target="_blank">
    <g fill="#5a7aa0"><rect x="690" y="982" width="6" height="8" rx="1"/><rect x="699" y="976" width="6" height="14" rx="1"/><rect x="708" y="970" width="6" height="20" rx="1"/></g>
    <text x="722" y="990" font-size="13" fill="#5a7aa0">gradus.pk</text>
  </a>

</svg>
